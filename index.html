<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Daily Mini Games</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", system-ui, sans-serif;
    background: #0d1117;
    color: #e6edf3;
    min-height: 100vh;
    padding: 24px 16px 48px;
  }
  header { text-align: center; padding: 16px 0 28px; }
  h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
  .subtitle { color: #8b949e; font-size: 13px; margin-top: 6px; }
  .games {
    display: grid;
    gap: 12px;
    max-width: 600px;
    margin: 0 auto;
  }
  .game-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 14px;
    padding: 18px;
    text-decoration: none;
    color: inherit;
    display: block;
    transition: transform 0.1s ease, border-color 0.1s ease;
  }
  .game-card:active {
    transform: scale(0.98);
    border-color: #58a6ff;
  }
  .game-title { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .game-date { font-size: 12px; color: #8b949e; }
  .game-desc { font-size: 14px; color: #c9d1d9; margin-top: 10px; line-height: 1.5; }
  .tag {
    display: inline-block;
    font-size: 11px;
    color: #8b949e;
    background: #21262d;
    padding: 2px 8px;
    border-radius: 999px;
    margin-right: 4px;
    margin-top: 8px;
  }
  .empty { text-align: center; color: #8b949e; padding: 40px 0; }
</style>
</head>
<body>
<header>
  <h1>Daily Mini Games</h1>
  <div class="subtitle">毎日ランダムで新しいミニゲーム</div>
</header>
<div class="games" id="games"></div>
<script>
fetch('games.json', { cache: 'no-store' })
  .then(r => r.json())
  .then(games => {
    const c = document.getElementById('games');
    if (!games.length) {
      c.innerHTML = '<div class="empty">まだゲームがありません</div>';
      return;
    }
    games.sort((a, b) => b.date.localeCompare(a.date));
    c.innerHTML = games.map(g => `
      <a href="games/${g.slug}/index.html" class="game-card">
        <div class="game-title">${g.title}</div>
        <div class="game-date">${g.date}</div>
        <div class="game-desc">${g.description}</div>
        <div>${(g.tags || []).map(t => `<span class="tag">#${t}</span>`).join('')}</div>
      </a>
    `).join('');
  })
  .catch(() => {
    document.getElementById('games').innerHTML = '<div class="empty">読み込みエラー</div>';
  });
</script>
</body>
</html>
