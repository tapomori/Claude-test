<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Takoyaki</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    touch-action: manipulation;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
  }
  body {
    background: radial-gradient(ellipse at 50% 55%, #3a1808 0%, #1a0805 55%, #0a0402 100%);
    color: #f5e6d0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    position: fixed; inset: 0;
  }
  canvas { display: block; width: 100%; height: 100%; }
  #ui {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 14px 18px;
    display: flex; justify-content: space-between; align-items: flex-start;
    pointer-events: none;
    font-size: 13px;
    text-shadow: 0 2px 6px rgba(0,0,0,0.8);
  }
  .col { display: flex; flex-direction: column; gap: 4px; }
  .col.right { align-items: flex-end; }
  .stat { display: flex; align-items: baseline; gap: 6px; }
  .label { color: #c89868; font-size: 10px; letter-spacing: 2px; }
  .value { color: #ffe0a0; font-weight: 600; font-size: 18px; letter-spacing: 1px; }
  .combo { color: #ffb060; font-size: 11px; letter-spacing: 2px; }
  #back {
    position: absolute; top: 14px; left: 50%;
    transform: translateX(-50%);
    color: #c89868; text-decoration: none;
    font-size: 11px; letter-spacing: 2px;
    background: rgba(0,0,0,0.35);
    padding: 5px 12px;
    border-radius: 14px;
    border: 1px solid rgba(200,152,104,0.25);
    pointer-events: auto;
    z-index: 10;
  }
  #title {
    position: absolute; bottom: 14px; left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: rgba(245,230,208,0.35);
    letter-spacing: 6px;
    pointer-events: none;
  }
  #over {
    position: absolute; inset: 0;
    display: none;
    flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(8,4,2,0.78);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    pointer-events: auto;
    z-index: 20;
    text-align: center;
  }
  #over.on { display: flex; }
  #over h2 {
    font-size: 22px; color: #ffd070;
    letter-spacing: 8px; margin-bottom: 10px;
    font-weight: 500;
  }
  #over .final {
    font-size: 14px; color: rgba(245,230,208,0.7);
    margin-bottom: 4px; letter-spacing: 2px;
  }
  #over .score {
    font-size: 42px; color: #ffe0a0;
    font-weight: 700; margin-bottom: 26px;
    letter-spacing: 2px;
  }
  #retry {
    padding: 12px 32px;
    background: linear-gradient(180deg, #d8803c 0%, #a04818 100%);
    color: #fff5d8;
    border: none; border-radius: 26px;
    font-size: 13px; letter-spacing: 4px;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(216, 128, 60, 0.4), inset 0 1px 0 rgba(255,255,255,0.3);
  }
  #retry:active { transform: translateY(1px); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div class="col">
    <div class="label">SCORE</div>
    <div class="value" id="score">0</div>
    <div class="combo" id="combo"></div>
  </div>
  <div class="col right">
    <div class="label">LIFE</div>
    <div class="value" id="life">●●●</div>
  </div>
</div>
<a id="back" href="../../index.html">← 一覧へ</a>
<div id="title">た こ 焼</div>
<div id="over">
  <h2>仕舞い</h2>
  <div class="final">FINAL SCORE</div>
  <div class="score" id="final">0</div>
  <button id="retry">もう一鉄板</button>
</div>
<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W = 0, H = 0, DPR = 1;

  const COLS = 2, ROWS = 3;
  const slots = [];
  const particles = [];
  const popups = [];

  const PERFECT_LO = 0.55;
  const PERFECT_HI = 0.74;
  const COOKING_LO = 0.32;
  const BURN_AT = 1.0;
  const BASE_COOK = 0.105;

  let score = 0, lives = 3, combo = 0;
  let time = 0, lastT = 0;
  let gameOver = false;
  let shake = 0;

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2.5);
    W = window.innerWidth;
    H = window.innerHeight;
    cv.width = W * DPR;
    cv.height = H * DPR;
    cv.style.width = W + 'px';
    cv.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    computeLayout();
  }

  function computeLayout() {
    const padX = Math.max(W * 0.08, 16);
    const padTop = H * 0.18;
    const padBot = H * 0.16;
    const gridW = W - padX * 2;
    const gridH = H - padTop - padBot;
    const cellW = gridW / COLS;
    const cellH = gridH / ROWS;
    const r = Math.min(cellW, cellH) * 0.40;

    for (let row = 0; row < ROWS; row++) {
      for (let col = 0; col < COLS; col++) {
        const i = row * COLS + col;
        if (!slots[i]) slots[i] = { ball: null, nextSpawn: 0 };
        slots[i].x = padX + col * cellW + cellW / 2;
        slots[i].y = padTop + row * cellH + cellH / 2;
        slots[i].r = r;
      }
    }
  }

  function curCookRate() {
    return BASE_COOK * (1 + Math.min(time / 75, 1.0) * 0.85);
  }

  function spawn(slot) {
    slot.ball = { progress: 0, side: 1, flipAnim: 0, appear: 0, jiggle: 0 };
  }

  function update(dt) {
    time += dt;
    shake = Math.max(0, shake - dt * 4);
    const rate = curCookRate();

    for (const slot of slots) {
      if (slot.ball) {
        const b = slot.ball;
        b.progress += dt * rate * (b.side === 2 ? 1.08 : 1.0);
        b.appear = Math.min(1, b.appear + dt * 5);
        if (b.flipAnim > 0) b.flipAnim = Math.max(0, b.flipAnim - dt * 4.5);
        if (b.jiggle > 0) b.jiggle = Math.max(0, b.jiggle - dt * 6);

        if (b.progress >= BURN_AT) {
          burst(slot.x, slot.y, [40, 20, 10], 22, 140);
          for (let i = 0; i < 10; i++) {
            particles.push({
              x: slot.x + (Math.random() - 0.5) * slot.r,
              y: slot.y - slot.r * 0.3,
              vx: (Math.random() - 0.5) * 30,
              vy: -50 - Math.random() * 40,
              life: 1.0 + Math.random() * 0.6,
              age: 0,
              color: [60, 50, 45],
              size: 4 + Math.random() * 3,
              fade: 'smoke'
            });
          }
          lives--;
          combo = 0;
          shake = 1;
          vibrate(80);
          slot.ball = null;
          slot.nextSpawn = time + 0.9 + Math.random() * 0.6;
          updateUI();
          if (lives <= 0) endGame();
          continue;
        }

        if (b.progress > 0.18 && b.progress < 0.95 && Math.random() < dt * 9) {
          particles.push({
            x: slot.x + (Math.random() - 0.5) * slot.r * 1.2,
            y: slot.y + (Math.random() - 0.5) * slot.r * 0.5,
            vx: (Math.random() - 0.5) * 16,
            vy: -25 - Math.random() * 35,
            life: 0.5 + Math.random() * 0.4,
            age: 0,
            color: [255, 200, 110],
            size: 1 + Math.random() * 1.6,
            fade: 'spark'
          });
        }
      } else if (slot.nextSpawn > 0 && time >= slot.nextSpawn) {
        spawn(slot);
      }
    }

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.age += dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      if (p.fade === 'smoke') {
        p.vy += 12 * dt;
        p.size += dt * 8;
      } else if (p.fade === 'spark') {
        p.vy += 70 * dt;
      } else {
        p.vy += 200 * dt;
      }
      if (p.age >= p.life) particles.splice(i, 1);
    }

    for (let i = popups.length - 1; i >= 0; i--) {
      popups[i].age += dt;
      if (popups[i].age >= 1.1) popups.splice(i, 1);
    }
  }

  function lerpColor(a, b, t) {
    return [
      a[0] + (b[0] - a[0]) * t,
      a[1] + (b[1] - a[1]) * t,
      a[2] + (b[2] - a[2]) * t
    ];
  }

  function ballColor(p) {
    const stops = [
      [0.00, [248, 226, 188]],
      [0.30, [240, 198, 130]],
      [0.55, [222, 158, 76]],
      [0.74, [176, 96, 38]],
      [0.88, [78, 38, 18]],
      [1.00, [28, 14, 8]]
    ];
    for (let i = 0; i < stops.length - 1; i++) {
      if (p <= stops[i + 1][0]) {
        const t = (p - stops[i][0]) / (stops[i + 1][0] - stops[i][0]);
        return lerpColor(stops[i][1], stops[i + 1][1], t);
      }
    }
    return stops[stops.length - 1][1];
  }

  function rgba(c, a) {
    return `rgba(${c[0] | 0}, ${c[1] | 0}, ${c[2] | 0}, ${a})`;
  }
  function shift(c, d) {
    return [
      Math.max(0, Math.min(255, c[0] + d)),
      Math.max(0, Math.min(255, c[1] + d)),
      Math.max(0, Math.min(255, c[2] + d))
    ];
  }

  function isPerfect(p) {
    return p >= PERFECT_LO && p <= PERFECT_HI;
  }

  function drawPlate() {
    ctx.save();
    if (shake > 0) {
      const s = shake * 6;
      ctx.translate((Math.random() - 0.5) * s, (Math.random() - 0.5) * s);
    }

    // hot glow under plate
    const gx = W / 2, gy = H / 2;
    const glow = ctx.createRadialGradient(gx, gy, 0, gx, gy, Math.max(W, H) * 0.65);
    glow.addColorStop(0, 'rgba(180, 55, 18, 0.45)');
    glow.addColorStop(0.55, 'rgba(90, 24, 8, 0.28)');
    glow.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, W, H);

    // plate body
    const plateX = slots[0].x - slots[0].r * 1.6;
    const plateY = slots[0].y - slots[0].r * 1.6;
    const plateW = (slots[1].x - slots[0].x) + slots[0].r * 3.2;
    const plateH = (slots[4].y - slots[0].y) + slots[0].r * 3.2;
    const rr = slots[0].r * 0.5;
    ctx.beginPath();
    roundRect(plateX, plateY, plateW, plateH, rr);
    const plateGrad = ctx.createLinearGradient(0, plateY, 0, plateY + plateH);
    plateGrad.addColorStop(0, '#2a1610');
    plateGrad.addColorStop(0.5, '#1c0e08');
    plateGrad.addColorStop(1, '#0e0604');
    ctx.fillStyle = plateGrad;
    ctx.fill();
    ctx.strokeStyle = 'rgba(220, 140, 60, 0.18)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // wells (holes)
    for (const slot of slots) {
      const r = slot.r;
      ctx.beginPath();
      ctx.arc(slot.x, slot.y + r * 0.05, r * 1.18, 0, Math.PI * 2);
      ctx.fillStyle = '#070302';
      ctx.fill();

      const wg = ctx.createRadialGradient(slot.x, slot.y + r * 0.3, 0, slot.x, slot.y, r * 1.2);
      wg.addColorStop(0, 'rgba(255, 100, 30, 0.55)');
      wg.addColorStop(0.5, 'rgba(180, 50, 10, 0.32)');
      wg.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = wg;
      ctx.fill();

      // ember flicker
      const flick = 0.7 + 0.3 * Math.sin(time * 7 + slot.x * 0.1);
      ctx.beginPath();
      ctx.arc(slot.x, slot.y + r * 0.1, r * 0.4, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 130, 40, ${0.15 * flick})`;
      ctx.fill();
    }
    ctx.restore();
  }

  function roundRect(x, y, w, h, r) {
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function drawBall(slot) {
    const b = slot.ball;
    if (!b) return;
    const appear = b.appear;
    const flip = b.flipAnim;
    const jig = b.jiggle;

    const r = slot.r * appear;
    const sx = (1 - flip * 0.55) * (1 + jig * 0.05);
    const sy = (1 + flip * 0.05) * (1 - jig * 0.05);
    const rx = r * sx;
    const ry = r * sy;

    // shadow
    ctx.beginPath();
    ctx.ellipse(slot.x, slot.y + r * 0.55, r * 0.85, r * 0.22, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fill();

    const col = ballColor(b.progress);

    // body
    const grad = ctx.createRadialGradient(
      slot.x - rx * 0.3, slot.y - ry * 0.45, 0,
      slot.x, slot.y, rx
    );
    grad.addColorStop(0, rgba(shift(col, 55), 1));
    grad.addColorStop(0.55, rgba(col, 1));
    grad.addColorStop(1, rgba(shift(col, -55), 1));

    ctx.beginPath();
    ctx.ellipse(slot.x, slot.y, rx, ry, 0, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // side 2 marker — browned rim peeking from bottom
    if (b.side === 2) {
      ctx.save();
      ctx.beginPath();
      ctx.ellipse(slot.x, slot.y, rx * 0.96, ry * 0.96, 0, 0, Math.PI * 2);
      ctx.clip();
      const bg = ctx.createLinearGradient(0, slot.y + ry * 0.2, 0, slot.y + ry);
      bg.addColorStop(0, 'rgba(60, 28, 12, 0)');
      bg.addColorStop(1, 'rgba(40, 18, 8, 0.65)');
      ctx.fillStyle = bg;
      ctx.fillRect(slot.x - rx, slot.y - ry, rx * 2, ry * 2);
      ctx.restore();

      ctx.strokeStyle = 'rgba(80, 38, 14, 0.55)';
      ctx.lineWidth = Math.max(1.5, rx * 0.04);
      ctx.beginPath();
      ctx.arc(slot.x, slot.y, rx * 0.93, 0.28, Math.PI - 0.28);
      ctx.stroke();
    }

    // highlight
    ctx.beginPath();
    ctx.ellipse(
      slot.x - rx * 0.32, slot.y - ry * 0.45,
      rx * 0.28, ry * 0.16, -0.35, 0, Math.PI * 2
    );
    ctx.fillStyle = 'rgba(255, 244, 210, 0.45)';
    ctx.fill();

    // perfect glow ring
    if (isPerfect(b.progress)) {
      const pulse = 0.55 + 0.45 * Math.sin(time * 10);
      ctx.beginPath();
      ctx.arc(slot.x, slot.y, r * 1.22, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255, 230, 130, ${0.55 + pulse * 0.4})`;
      ctx.lineWidth = 2.5 + pulse * 2;
      ctx.stroke();

      // outer halo
      ctx.beginPath();
      ctx.arc(slot.x, slot.y, r * 1.45 + pulse * 4, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255, 210, 90, ${0.18 * pulse})`;
      ctx.lineWidth = 4;
      ctx.stroke();
    }

    // burn warning — flash red when about to burn
    if (b.progress > 0.88) {
      const f = (Math.sin(time * 18) + 1) * 0.5;
      ctx.beginPath();
      ctx.arc(slot.x, slot.y, r * 1.18, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255, 60, 30, ${0.55 * f})`;
      ctx.lineWidth = 2.5;
      ctx.stroke();
    }
  }

  function drawParticles() {
    for (const p of particles) {
      const t = p.age / p.life;
      let alpha;
      if (p.fade === 'smoke') alpha = (1 - t) * 0.35;
      else if (p.fade === 'spark') alpha = (1 - t) * 0.85;
      else alpha = 1 - t;
      ctx.fillStyle = rgba(p.color, alpha);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawPopups() {
    for (const p of popups) {
      const t = p.age / 1.1;
      const a = 1 - t;
      const y = p.y - 36 * t;
      ctx.font = `bold ${p.size}px -apple-system, "Hiragino Sans", sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillStyle = `rgba(${p.color[0]}, ${p.color[1]}, ${p.color[2]}, ${a})`;
      ctx.fillText(p.text, p.x, y);
    }
  }

  function draw() {
    ctx.fillStyle = 'rgba(8, 4, 2, 1)';
    ctx.fillRect(0, 0, W, H);
    drawPlate();
    drawParticles();
    for (const slot of slots) drawBall(slot);
    drawPopups();
  }

  function burst(x, y, color, n, speed = 100) {
    for (let i = 0; i < n; i++) {
      const a = (Math.PI * 2 * i) / n + Math.random() * 0.6;
      const s = speed * (0.5 + Math.random());
      particles.push({
        x, y,
        vx: Math.cos(a) * s,
        vy: Math.sin(a) * s - 30,
        life: 0.5 + Math.random() * 0.5,
        age: 0,
        color,
        size: 1.5 + Math.random() * 2.2,
        fade: 'burst'
      });
    }
  }

  function popup(x, y, text, color, size = 18) {
    popups.push({ x, y, text, color, size, age: 0 });
  }

  function findSlot(x, y) {
    let best = null, bd = Infinity;
    for (const slot of slots) {
      const dx = x - slot.x, dy = y - slot.y;
      const d = dx * dx + dy * dy;
      const reach = slot.r * 1.55;
      if (d < reach * reach && d < bd) {
        bd = d;
        best = slot;
      }
    }
    return best;
  }

  function vibrate(ms) {
    if (navigator.vibrate) navigator.vibrate(ms);
  }

  function handleTap(x, y) {
    if (gameOver) return;
    const slot = findSlot(x, y);
    if (!slot || !slot.ball) return;
    const b = slot.ball;
    const p = b.progress;
    if (b.appear < 0.4) return;

    let quality;
    if (p < COOKING_LO) quality = 0.25;
    else if (p < PERFECT_LO) quality = 0.6;
    else if (p <= PERFECT_HI) quality = 1.0;
    else if (p < 0.88) quality = 0.55;
    else quality = 0.2;

    if (b.side === 1) {
      b.side = 2;
      b.progress = 0;
      b.flipAnim = 1;
      b.jiggle = 0;
      const gain = Math.round(2 + 3 * quality);
      score += gain;
      burst(slot.x, slot.y - slot.r * 0.2, [255, 200, 100], 10, 110);
      if (quality >= 1) {
        combo++;
        vibrate(18);
        popup(slot.x, slot.y - slot.r * 1.2, '＋' + gain, [255, 230, 140], 20);
      } else {
        combo = 0;
        vibrate(10);
        popup(slot.x, slot.y - slot.r * 1.2, '＋' + gain, [200, 180, 130], 16);
      }
    } else {
      const base = 5;
      const cm = 1 + combo * 0.18;
      const gain = Math.round((base + 6 * quality) * cm);
      score += gain;
      slot.ball = null;
      slot.nextSpawn = time + 0.5 + Math.random() * 0.5;
      burst(slot.x, slot.y - slot.r * 0.2, [255, 224, 160], 18, 140);
      if (quality >= 1) {
        combo++;
        vibrate([22, 28, 14]);
        popup(slot.x, slot.y - slot.r * 1.2, '＋' + gain, [255, 240, 180], 24);
        if (combo >= 3 && combo % 3 === 0) {
          popup(slot.x, slot.y - slot.r * 1.8, combo + '連', [255, 180, 80], 14);
        }
      } else {
        combo = 0;
        vibrate(14);
        popup(slot.x, slot.y - slot.r * 1.2, '＋' + gain, [220, 200, 140], 18);
      }
    }
    updateUI();
  }

  function updateUI() {
    document.getElementById('score').textContent = score;
    document.getElementById('life').textContent =
      '●'.repeat(Math.max(0, lives)) + '○'.repeat(Math.max(0, 3 - lives));
    const cEl = document.getElementById('combo');
    cEl.textContent = combo >= 2 ? combo + '連' : '';
  }

  function endGame() {
    gameOver = true;
    document.getElementById('final').textContent = score;
    document.getElementById('over').classList.add('on');
  }

  function reset() {
    score = 0; lives = 3; combo = 0; time = 0;
    gameOver = false;
    particles.length = 0;
    popups.length = 0;
    for (const slot of slots) {
      slot.ball = null;
      slot.nextSpawn = 0.2 + Math.random() * 1.3;
    }
    document.getElementById('over').classList.remove('on');
    updateUI();
  }

  function loop(t) {
    const now = t / 1000;
    const dt = lastT ? Math.min(0.05, now - lastT) : 0;
    lastT = now;
    if (!gameOver) update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  cv.addEventListener('touchstart', e => {
    e.preventDefault();
    for (const t of e.changedTouches) handleTap(t.clientX, t.clientY);
  }, { passive: false });

  cv.addEventListener('mousedown', e => {
    handleTap(e.clientX, e.clientY);
  });

  document.getElementById('retry').addEventListener('click', e => {
    e.stopPropagation();
    reset();
  });

  document.getElementById('retry').addEventListener('touchstart', e => {
    e.stopPropagation();
  }, { passive: true });

  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', () => setTimeout(resize, 100));

  resize();
  reset();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
