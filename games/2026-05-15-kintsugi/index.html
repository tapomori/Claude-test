<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a14">
<title>金継ぎ — Kintsugi</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{
    width:100%; height:100%; overflow:hidden;
    background:#070710;
    color:#eee;
    font-family:"Hiragino Mincho ProN","Yu Mincho",-apple-system,BlinkMacSystemFont,serif;
    touch-action:manipulation;
    user-select:none;
    overscroll-behavior:none;
  }
  body{
    background:
      radial-gradient(circle at 50% 35%, #1a1832 0%, #0a0a18 55%, #050509 100%);
  }
  canvas{
    position:absolute;
    inset:0;
    width:100%; height:100%;
    display:block;
  }
  .hud{
    position:absolute;
    top:0; left:0; right:0;
    padding:16px 22px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    pointer-events:none;
    z-index:5;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  .hud .score{
    font-size:13px;
    letter-spacing:0.18em;
    color:#d4af37;
    text-shadow:0 0 12px rgba(212,175,55,0.4);
  }
  .hud .score b{
    font-weight:500;
    font-size:18px;
    margin-left:6px;
  }
  .shatter{display:flex;gap:8px;}
  .shatter span{
    width:11px;height:11px;border-radius:50%;
    border:1px solid rgba(212,175,55,0.55);
    background:transparent;
    transition: all .25s ease;
  }
  .shatter span.lost{
    background:#c0392b;
    border-color:#e74c3c;
    box-shadow:0 0 10px rgba(231,76,60,0.7);
  }
  .back{
    position:absolute; bottom:18px; left:50%;
    transform:translateX(-50%);
    color:#888; text-decoration:none;
    font-size:11px;
    letter-spacing:0.2em;
    border:1px solid rgba(180,180,200,0.18);
    padding:7px 16px; border-radius:30px;
    background:rgba(0,0,0,0.35);
    z-index:5;
    font-family:-apple-system,sans-serif;
  }
  .overlay{
    position:absolute; inset:0;
    background:rgba(5,5,10,0.88);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:22px; z-index:10;
    text-align:center;
    padding:24px;
    backdrop-filter: blur(4px);
  }
  .overlay.hidden{display:none;}
  .overlay h1{
    font-size:38px;
    font-weight:300;
    letter-spacing:0.42em;
    color:#d4af37;
    text-shadow:0 0 24px rgba(212,175,55,0.45);
    margin-right:-0.42em;
  }
  .overlay .sub{
    font-size:11px;
    color:#888;
    letter-spacing:0.36em;
    margin-top:-12px;
    margin-bottom:6px;
    font-family:-apple-system,sans-serif;
  }
  .overlay p{
    font-size:14px;
    line-height:1.9;
    color:#bbb;
    max-width:280px;
  }
  .overlay button{
    margin-top:8px;
    padding:13px 42px;
    background:transparent;
    border:1px solid rgba(212,175,55,0.8);
    color:#d4af37;
    font-size:13px;
    letter-spacing:0.32em;
    border-radius:60px;
    cursor:pointer;
    font-family:inherit;
    transition: all .2s;
  }
  .overlay button:active{
    background:rgba(212,175,55,0.18);
  }
  .overlay .stat{
    color:#d4af37;
    font-size:54px;
    font-weight:200;
    line-height:1;
    text-shadow:0 0 20px rgba(212,175,55,0.55);
  }
  .overlay .statLabel{
    font-size:10px;
    letter-spacing:0.36em;
    color:#999;
    font-family:-apple-system,sans-serif;
    text-transform:uppercase;
  }
</style>
</head>
<body>
  <canvas id="c"></canvas>

  <div class="hud">
    <div class="score">継いだ亀裂<b id="score">0</b></div>
    <div class="shatter" id="shatter">
      <span></span><span></span><span></span>
    </div>
  </div>
  <a class="back" href="../../index.html">← gallery</a>

  <div class="overlay" id="start">
    <h1>金継ぎ</h1>
    <div class="sub">KINTSUGI</div>
    <p>器に走る朱の亀裂を、<br>指でなぞって金で継ぎなさい。<br>三度割れた時、器は失われる。</p>
    <button id="startBtn">はじめる</button>
  </div>

  <div class="overlay hidden" id="end">
    <h1>器、砕ける</h1>
    <div class="statLabel">継いだ亀裂</div>
    <div class="stat" id="endScore">0</div>
    <button id="retryBtn">もう一度</button>
  </div>

<script>
(()=>{
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const shatterEl = document.getElementById('shatter');
  const startOverlay = document.getElementById('start');
  const endOverlay = document.getElementById('end');
  const endScoreEl = document.getElementById('endScore');
  const startBtn = document.getElementById('startBtn');
  const retryBtn = document.getElementById('retryBtn');

  let W=0,H=0,DPR=1;
  const vessel = {cx:0, cy:0, r:0};

  function resize(){
    DPR = Math.min(window.devicePixelRatio||1, 2.5);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.floor(W*DPR);
    canvas.height = Math.floor(H*DPR);
    canvas.style.width = W+'px';
    canvas.style.height = H+'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);

    vessel.cx = W/2;
    vessel.cy = H/2;
    vessel.r = Math.min(W*0.45, H*0.36);
  }
  window.addEventListener('resize', resize);
  resize();

  // state
  let cracks = [];
  let particles = [];
  let goldSeals = [];
  let shockwaves = [];
  let trailPoints = [];
  let score = 0;
  let shatters = 0;
  let running = false;
  let lastTime = 0;
  let spawnTimer = 0;
  let spawnInterval = 3.6;
  let elapsed = 0;

  const touch = {x:0,y:0,active:false,prevX:0,prevY:0};

  const rand = (a,b)=>a+Math.random()*(b-a);
  const dist = (x1,y1,x2,y2)=>{const dx=x2-x1,dy=y2-y1;return Math.sqrt(dx*dx+dy*dy);};
  function pointSegDist(px,py, ax,ay, bx,by){
    const dx=bx-ax, dy=by-ay;
    const lenSq = dx*dx+dy*dy;
    if (lenSq===0) return dist(px,py,ax,ay);
    let t = ((px-ax)*dx + (py-ay)*dy)/lenSq;
    t = Math.max(0,Math.min(1,t));
    return dist(px,py, ax+t*dx, ay+t*dy);
  }

  function createCrack(){
    const angle = Math.random()*Math.PI*2;
    const sx = vessel.cx + Math.cos(angle)*vessel.r;
    const sy = vessel.cy + Math.sin(angle)*vessel.r;
    const segs = 5 + Math.floor(Math.random()*3);
    const points = [{x:sx,y:sy}];
    const baseSegLen = vessel.r * 0.16;
    let curAngle = Math.atan2(vessel.cy-sy, vessel.cx-sx) + rand(-0.4, 0.4);
    let curX = sx, curY = sy;
    for(let i=0;i<segs;i++){
      curAngle += rand(-0.7, 0.7);
      const targetAngle = Math.atan2(vessel.cy-curY, vessel.cx-curX);
      curAngle = curAngle*0.65 + targetAngle*0.35;
      const len = baseSegLen * rand(0.7, 1.25);
      curX += Math.cos(curAngle)*len;
      curY += Math.sin(curAngle)*len;
      // clamp inside vessel
      const dr = dist(curX,curY, vessel.cx, vessel.cy);
      if (dr > vessel.r*0.95){
        // pull back inside
        const a2 = Math.atan2(curY-vessel.cy, curX-vessel.cx);
        curX = vessel.cx + Math.cos(a2)*vessel.r*0.85;
        curY = vessel.cy + Math.sin(a2)*vessel.r*0.85;
      }
      points.push({x:curX,y:curY});
    }
    cracks.push({
      points,
      growthProgress: 0,
      growthSpeed: rand(0.32, 0.5),
      maxGrowth: segs,
      sealedSegs: new Array(segs).fill(false),
      dead: false,
      fade: 1,
      flash: 0,
    });
  }

  function shockwave(x,y,color,scale=1){
    shockwaves.push({x,y,r:6,life:0.9,age:0,color,scale});
  }

  function burstParticles(x,y,count,color,speed=120){
    for (let k=0;k<count;k++){
      const a = Math.random()*Math.PI*2;
      const s = speed*(0.3+Math.random()*0.9);
      particles.push({
        x, y,
        vx: Math.cos(a)*s,
        vy: Math.sin(a)*s,
        life: rand(0.6,1.3),
        age:0,
        size: rand(1.4,3.4),
        color,
      });
    }
  }

  function updateShatterUI(){
    const spans = shatterEl.children;
    for (let i=0;i<spans.length;i++){
      spans[i].classList.toggle('lost', i<shatters);
    }
  }

  function reset(){
    cracks = [];
    particles = [];
    goldSeals = [];
    shockwaves = [];
    score = 0;
    shatters = 0;
    elapsed = 0;
    spawnTimer = 0;
    scoreEl.textContent = '0';
    updateShatterUI();
  }

  function startGame(){
    reset();
    running = true;
    startOverlay.classList.add('hidden');
    endOverlay.classList.add('hidden');
    lastTime = performance.now();
    // gift first crack a tiny delay so player sees it appear
    spawnTimer = spawnInterval - 0.9;
  }

  function endGame(){
    running = false;
    endScoreEl.textContent = score;
    setTimeout(()=>{
      endOverlay.classList.remove('hidden');
    }, 700);
  }

  function update(dt){
    if (!running) return;
    elapsed += dt;
    const adjustedInterval = Math.max(1.15, spawnInterval - elapsed*0.022);
    spawnTimer += dt;
    if (spawnTimer >= adjustedInterval){
      spawnTimer = 0;
      createCrack();
    }

    for (let i=cracks.length-1; i>=0; i--){
      const c = cracks[i];
      if (c.dead){
        c.fade -= dt*1.6;
        if (c.fade <= 0) cracks.splice(i,1);
        continue;
      }
      c.flash = Math.max(0, c.flash - dt*3);

      // seal under finger
      if (touch.active){
        const grown = Math.floor(c.growthProgress);
        for (let j=0;j<grown;j++){
          if (c.sealedSegs[j]) continue;
          const a = c.points[j];
          const b = c.points[j+1];
          const d = pointSegDist(touch.x,touch.y, a.x,a.y, b.x,b.y);
          if (d < 30){
            c.sealedSegs[j] = true;
            c.flash = 1;
            for (let k=0;k<6;k++){
              const t = Math.random();
              particles.push({
                x: a.x + (b.x-a.x)*t,
                y: a.y + (b.y-a.y)*t,
                vx: rand(-50,50),
                vy: rand(-70,-10),
                life: rand(0.4,0.9),
                age: 0,
                size: rand(1.4,3),
                color:'#f3d268',
              });
            }
            if (navigator.vibrate) navigator.vibrate(6);
          }
        }
      }

      // growth (paused if all visible sealed)
      const grownBefore = Math.floor(c.growthProgress);
      let allVisibleSealed = grownBefore > 0;
      for (let j=0;j<grownBefore;j++){
        if (!c.sealedSegs[j]){allVisibleSealed=false; break;}
      }
      const speedMod = allVisibleSealed ? 0.18 : 1.0;
      const elapsedBoost = 1 + Math.min(1.2, elapsed*0.018);
      c.growthProgress = Math.min(c.maxGrowth, c.growthProgress + c.growthSpeed*dt*speedMod*elapsedBoost);

      // resolution at full growth
      if (c.growthProgress >= c.maxGrowth){
        let allSealed = true;
        for (let j=0;j<c.maxGrowth;j++){
          if (!c.sealedSegs[j]){allSealed=false; break;}
        }
        if (allSealed){
          c.dead = true;
          c.fade = 1.4;
          score++;
          scoreEl.textContent = score;
          goldSeals.push({points: c.points.slice(), born: 0});
          shockwave(c.points[c.points.length-1].x, c.points[c.points.length-1].y, '#d4af37');
          burstParticles(c.points[c.points.length-1].x, c.points[c.points.length-1].y, 12, '#f3d268', 100);
          if (navigator.vibrate) navigator.vibrate([10,25,10]);
        } else {
          c.dead = true;
          c.fade = 1.4;
          c.shattered = true;
          shatters++;
          updateShatterUI();
          // strong red shockwave + radial cracks
          shockwave(c.points[c.points.length-1].x, c.points[c.points.length-1].y, '#ff3a45', 1.6);
          burstParticles(c.points[c.points.length-1].x, c.points[c.points.length-1].y, 26, '#ff5560', 200);
          if (navigator.vibrate) navigator.vibrate([55,30,55]);
          if (shatters >= 3){
            // bigger shake / burst
            burstParticles(vessel.cx, vessel.cy, 60, '#ff5560', 280);
            shockwave(vessel.cx, vessel.cy, '#ff3a45', 2.5);
            if (navigator.vibrate) navigator.vibrate([120,40,120,40,200]);
            endGame();
          }
        }
      }
    }

    // particles
    for (const p of particles){
      p.age += dt;
      p.x += p.vx*dt;
      p.y += p.vy*dt;
      p.vy += 70*dt;
      p.vx *= (1 - 0.5*dt);
    }
    particles = particles.filter(p=>p.age<p.life);

    // shockwaves
    for (const s of shockwaves){
      s.age += dt;
      s.r += 240*dt*s.scale;
    }
    shockwaves = shockwaves.filter(s=>s.age<s.life);

    // trail
    if (touch.active){
      trailPoints.push({x:touch.x,y:touch.y,age:0});
    }
    for (const tp of trailPoints) tp.age += dt;
    trailPoints = trailPoints.filter(tp=>tp.age<0.4);
  }

  function draw(){
    // soft trail clear
    ctx.fillStyle = 'rgba(7,7,16,0.55)';
    ctx.fillRect(0,0,W,H);

    // vessel glow
    const grad = ctx.createRadialGradient(vessel.cx, vessel.cy-vessel.r*0.25, vessel.r*0.1, vessel.cx, vessel.cy, vessel.r*1.25);
    grad.addColorStop(0, 'rgba(110,108,150,0.42)');
    grad.addColorStop(0.5, 'rgba(50,48,80,0.22)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(vessel.cx, vessel.cy, vessel.r*1.25, 0, Math.PI*2);
    ctx.fill();

    // ceramic vessel surface
    const surf = ctx.createRadialGradient(vessel.cx-vessel.r*0.3, vessel.cy-vessel.r*0.4, vessel.r*0.1, vessel.cx, vessel.cy, vessel.r);
    surf.addColorStop(0, 'rgba(230,225,235,0.16)');
    surf.addColorStop(0.6, 'rgba(180,170,190,0.08)');
    surf.addColorStop(1, 'rgba(140,130,150,0.18)');
    ctx.fillStyle = surf;
    ctx.beginPath();
    ctx.arc(vessel.cx, vessel.cy, vessel.r, 0, Math.PI*2);
    ctx.fill();

    // rim
    ctx.strokeStyle = 'rgba(220,220,235,0.32)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(vessel.cx, vessel.cy, vessel.r, 0, Math.PI*2);
    ctx.stroke();
    ctx.strokeStyle = 'rgba(150,150,170,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(vessel.cx, vessel.cy, vessel.r*0.93, 0, Math.PI*2);
    ctx.stroke();

    // permanent gold seals
    for (const seal of goldSeals){
      drawGoldPath(seal.points, 1);
    }

    // active cracks
    for (const c of cracks) drawCrack(c);

    // trail
    if (trailPoints.length > 1){
      ctx.save();
      ctx.lineCap='round'; ctx.lineJoin='round';
      for (let i=1;i<trailPoints.length;i++){
        const a = trailPoints[i-1], b = trailPoints[i];
        const alpha = (1 - b.age/0.4)*0.55;
        ctx.strokeStyle = 'rgba(212,175,55,'+alpha.toFixed(3)+')';
        ctx.lineWidth = 6*(1 - b.age/0.4) + 2;
        ctx.shadowColor = '#d4af37';
        ctx.shadowBlur = 14;
        ctx.beginPath();
        ctx.moveTo(a.x,a.y);
        ctx.lineTo(b.x,b.y);
        ctx.stroke();
      }
      ctx.restore();
    }

    // particles
    for (const p of particles){
      const a = 1 - p.age/p.life;
      ctx.save();
      ctx.globalAlpha = a;
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    // shockwaves
    for (const s of shockwaves){
      const a = 1 - s.age/s.life;
      ctx.save();
      ctx.globalAlpha = a*0.7;
      ctx.strokeStyle = s.color;
      ctx.lineWidth = 2.4*s.scale;
      ctx.shadowColor = s.color;
      ctx.shadowBlur = 14;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.stroke();
      ctx.restore();
    }

    // finger
    if (touch.active){
      const g = ctx.createRadialGradient(touch.x, touch.y, 0, touch.x, touch.y, 40);
      g.addColorStop(0, 'rgba(212,175,55,0.45)');
      g.addColorStop(0.6, 'rgba(212,175,55,0.12)');
      g.addColorStop(1, 'rgba(212,175,55,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(touch.x, touch.y, 40, 0, Math.PI*2);
      ctx.fill();
    }
  }

  function drawCrack(c){
    const grown = c.growthProgress;
    const fullSegs = Math.floor(grown);
    const fadeAlpha = c.dead ? Math.max(0, c.fade/1.4) : 1;
    // sealed segments first (so red overlays nothing)
    for (let i=0;i<fullSegs;i++){
      if (!c.sealedSegs[i]) continue;
      drawGoldSegment(c.points[i], c.points[i+1], fadeAlpha);
    }
    // unsealed segments
    for (let i=0;i<fullSegs;i++){
      if (c.sealedSegs[i]) continue;
      const danger = c.shattered ? fadeAlpha : 1;
      drawRedSegment(c.points[i], c.points[i+1], fadeAlpha, danger);
    }
    // growing tip
    if (fullSegs < c.maxGrowth){
      const t = grown - fullSegs;
      if (t > 0.001){
        const a = c.points[fullSegs];
        const b = c.points[fullSegs+1];
        const tip = {x: a.x + (b.x-a.x)*t, y: a.y + (b.y-a.y)*t};
        drawRedSegment(a, tip, fadeAlpha, 1);
        // pulsing tip
        ctx.save();
        ctx.fillStyle = '#ff8090';
        ctx.shadowColor = '#ff3a45';
        ctx.shadowBlur = 14;
        ctx.beginPath();
        ctx.arc(tip.x, tip.y, 2.5 + Math.sin(elapsed*8)*0.6, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
      }
    }
    // flash on seal
    if (c.flash > 0 && !c.dead){
      ctx.save();
      ctx.globalAlpha = c.flash*0.4;
      ctx.strokeStyle = '#fff3c0';
      ctx.lineWidth = 5;
      ctx.shadowColor = '#fff3c0';
      ctx.shadowBlur = 20;
      ctx.beginPath();
      const last = c.points[Math.min(fullSegs, c.maxGrowth-1)];
      ctx.moveTo(c.points[0].x, c.points[0].y);
      for (let i=1;i<=fullSegs;i++){
        ctx.lineTo(c.points[i].x, c.points[i].y);
      }
      ctx.stroke();
      ctx.restore();
    }
  }

  function drawRedSegment(a,b,alpha,danger){
    ctx.save();
    ctx.strokeStyle = 'rgba(255,80,90,'+(alpha*0.92).toFixed(3)+')';
    ctx.lineWidth = 2.4;
    ctx.lineCap = 'round';
    ctx.shadowBlur = 12 + danger*6;
    ctx.shadowColor = '#ff3a45';
    ctx.beginPath();
    ctx.moveTo(a.x,a.y);
    ctx.lineTo(b.x,b.y);
    ctx.stroke();
    // inner bright
    ctx.strokeStyle = 'rgba(255,200,210,'+(alpha*0.7).toFixed(3)+')';
    ctx.lineWidth = 0.8;
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.moveTo(a.x,a.y);
    ctx.lineTo(b.x,b.y);
    ctx.stroke();
    ctx.restore();
  }

  function drawGoldSegment(a,b,alpha){
    ctx.save();
    ctx.lineCap = 'round';
    // outer glow
    ctx.strokeStyle = 'rgba(212,175,55,'+(alpha*0.95).toFixed(3)+')';
    ctx.lineWidth = 4.2;
    ctx.shadowBlur = 18;
    ctx.shadowColor = '#d4af37';
    ctx.beginPath();
    ctx.moveTo(a.x,a.y);
    ctx.lineTo(b.x,b.y);
    ctx.stroke();
    // inner bright
    ctx.strokeStyle = 'rgba(255,238,170,'+(alpha*0.95).toFixed(3)+')';
    ctx.lineWidth = 1.6;
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.moveTo(a.x,a.y);
    ctx.lineTo(b.x,b.y);
    ctx.stroke();
    ctx.restore();
  }

  function drawGoldPath(points, alpha){
    ctx.save();
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = 'rgba(212,175,55,'+(alpha*0.9).toFixed(3)+')';
    ctx.lineWidth = 4;
    ctx.shadowBlur = 16;
    ctx.shadowColor = '#d4af37';
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for (let i=1;i<points.length;i++) ctx.lineTo(points[i].x, points[i].y);
    ctx.stroke();
    ctx.strokeStyle = 'rgba(255,238,170,'+(alpha*0.95).toFixed(3)+')';
    ctx.lineWidth = 1.5;
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for (let i=1;i<points.length;i++) ctx.lineTo(points[i].x, points[i].y);
    ctx.stroke();
    ctx.restore();
  }

  // input
  function setTouchFromEvent(e){
    const r = canvas.getBoundingClientRect();
    const x = e.clientX - r.left;
    const y = e.clientY - r.top;
    touch.prevX = touch.x;
    touch.prevY = touch.y;
    touch.x = x; touch.y = y;
  }

  canvas.addEventListener('pointerdown', (e)=>{
    if (!running) return;
    setTouchFromEvent(e);
    touch.active = true;
    canvas.setPointerCapture(e.pointerId);
  });
  canvas.addEventListener('pointermove', (e)=>{
    if (!touch.active) return;
    setTouchFromEvent(e);
  });
  const release = (e)=>{ touch.active = false; trailPoints = []; };
  canvas.addEventListener('pointerup', release);
  canvas.addEventListener('pointercancel', release);
  canvas.addEventListener('pointerleave', release);

  // prevent context menu & gestures
  canvas.addEventListener('contextmenu', e=>e.preventDefault());

  startBtn.addEventListener('click', startGame);
  retryBtn.addEventListener('click', startGame);

  function loop(now){
    let dt = (now - lastTime)/1000;
    lastTime = now;
    if (dt > 0.08) dt = 0.08;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }
  lastTime = performance.now();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
