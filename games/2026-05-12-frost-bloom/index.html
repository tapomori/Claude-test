<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Frost Bloom</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{
    margin:0;padding:0;height:100%;
    background:radial-gradient(ellipse at 50% 110%, #103048 0%, #061320 65%, #02080f 100%);
    color:#dbeaf6;
    font-family:-apple-system,"Hiragino Sans","Noto Sans JP",system-ui,sans-serif;
    overflow:hidden;
    touch-action:manipulation;
    -webkit-user-select:none;user-select:none;
    overscroll-behavior:none;
  }
  #stage{position:fixed;inset:0;display:block;z-index:1}
  .hud{
    position:fixed;top:env(safe-area-inset-top,0);left:0;right:0;
    padding:14px 18px;display:flex;justify-content:space-between;align-items:center;
    font-size:15px;font-weight:600;letter-spacing:.08em;
    text-shadow:0 1px 4px rgba(0,0,0,.65);
    pointer-events:none;z-index:5;
  }
  #hudTime{
    font-variant-numeric:tabular-nums;
    padding:4px 10px;border-radius:14px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.1);
  }
  .back{
    position:fixed;left:12px;bottom:calc(12px + env(safe-area-inset-bottom,0));
    font-size:12px;padding:7px 14px;border-radius:999px;
    background:rgba(255,255,255,.07);color:#cfe9ff;text-decoration:none;
    border:1px solid rgba(255,255,255,.15);
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    z-index:6;letter-spacing:.06em;
  }
  .overlay{
    position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    flex-direction:column;text-align:center;
    background:rgba(4,14,24,.78);
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    z-index:10;padding:32px 24px;
  }
  .overlay h1{
    margin:0 0 14px;font-size:34px;letter-spacing:.18em;font-weight:800;
    background:linear-gradient(135deg,#ffe7a8 0%,#ff9ec7 50%,#a3d2ff 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 30px rgba(255,180,210,.15);
  }
  .overlay p{margin:5px 0;font-size:14px;line-height:1.7;opacity:.85;max-width:300px}
  .overlay .hint{font-size:12px;opacity:.55;margin-top:10px;letter-spacing:.05em}
  .overlay .score{
    font-size:64px;font-weight:800;margin:8px 0 4px;letter-spacing:.04em;
    color:#fff2c2;text-shadow:0 0 18px rgba(255,210,140,.5);
  }
  .btn{
    margin-top:24px;padding:14px 36px;border:0;border-radius:999px;
    background:linear-gradient(135deg,#ff97c3,#ffba76);
    color:#1a0a18;font-weight:700;font-size:15px;letter-spacing:.08em;
    box-shadow:0 10px 28px rgba(255,140,180,.32);
  }
  .btn:active{transform:translateY(1px) scale(.98)}
  .hidden{display:none}
  .ico{display:inline-block;width:14px;height:14px;border-radius:50%;
       vertical-align:-2px;margin-right:4px;
       background:radial-gradient(circle at 35% 35%,#fff,#ff9ec7 70%);
       box-shadow:0 0 8px rgba(255,158,199,.6)}
  .heart{color:#ff7090}
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div class="hud">
  <div id="hudScore"><span class="ico"></span>0&nbsp;&nbsp;<span class="heart">♥</span> 3</div>
  <div id="hudTime">60</div>
</div>
<a class="back" href="../../index.html">← ギャラリーへ</a>

<div id="title" class="overlay">
  <h1>FROST BLOOM</h1>
  <p>霜の向こうに、花の蕾が眠っています。</p>
  <p>指でこすって霜を払い、咲かせましょう。</p>
  <p>赤いトゲは触れないで。</p>
  <p class="hint">60秒であなたの庭はどこまで咲く？</p>
  <button class="btn" id="startBtn">タッチして始める</button>
</div>

<div id="end" class="overlay hidden">
  <h1 id="endTitle">SCORE</h1>
  <div class="score" id="finalScore">0</div>
  <p id="endMsg"></p>
  <button class="btn" id="retryBtn">もう一度</button>
</div>

<script>
(() => {
  const canvas = document.getElementById('stage');
  const ctx = canvas.getContext('2d');
  const frost = document.createElement('canvas');
  const fctx = frost.getContext('2d');

  let W = 0, H = 0, DPR = 1;

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    frost.width = canvas.width;
    frost.height = canvas.height;
    fctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    paintFrost(1);
  }
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', resize);

  // ----- Frost texture -----
  function paintFrost(strength) {
    fctx.save();
    fctx.globalCompositeOperation = 'source-over';
    fctx.clearRect(0, 0, W, H);
    // base translucent frost
    const grd = fctx.createLinearGradient(0, 0, 0, H);
    grd.addColorStop(0, `rgba(210, 232, 248, ${0.86 * strength})`);
    grd.addColorStop(1, `rgba(190, 220, 245, ${0.82 * strength})`);
    fctx.fillStyle = grd;
    fctx.fillRect(0, 0, W, H);
    // soft white speckles
    for (let i = 0; i < 260; i++) {
      const x = Math.random() * W;
      const y = Math.random() * H;
      const r = 6 + Math.random() * 28;
      fctx.fillStyle = `rgba(255,255,255,${(0.04 + Math.random() * 0.09) * strength})`;
      fctx.beginPath();
      fctx.arc(x, y, r, 0, Math.PI * 2);
      fctx.fill();
    }
    // crystal flecks
    for (let i = 0; i < 70; i++) {
      const x = Math.random() * W, y = Math.random() * H;
      const len = 6 + Math.random() * 20;
      const ang = Math.random() * Math.PI * 2;
      fctx.strokeStyle = `rgba(255,255,255,${0.22 * strength})`;
      fctx.lineWidth = 0.7;
      fctx.beginPath();
      fctx.moveTo(x - Math.cos(ang) * len, y - Math.sin(ang) * len);
      fctx.lineTo(x + Math.cos(ang) * len, y + Math.sin(ang) * len);
      fctx.stroke();
    }
    fctx.restore();
  }

  // ----- Game state -----
  const BUD_THRESHOLD = 100;
  const BUD_COLORS = [
    ['#ffd870', '#ff8a3a'],
    ['#ff9ed8', '#a25dff'],
    ['#7cf0c0', '#3aa0ff'],
    ['#ffe28a', '#ff5ea3'],
    ['#c5f0ff', '#7fa8ff'],
  ];

  let buds = [], thorns = [], particles = [], flakes = [];
  let score = 0, lives = 3, timeLeft = 60, running = false, lastT = 0;
  let bestBudCount = 5, thornCount = 2;

  function rand(a, b) { return a + Math.random() * (b - a); }

  function farEnough(x, y, list, dist) {
    for (const o of list) if (Math.hypot(o.x - x, o.y - y) < dist) return false;
    return true;
  }

  function spawnBud() {
    const margin = 64;
    let x = 0, y = 0, ok = false;
    for (let i = 0; i < 30 && !ok; i++) {
      x = rand(margin, W - margin);
      y = rand(100, H - 140);
      ok = farEnough(x, y, buds, 110) && farEnough(x, y, thorns, 90);
    }
    if (!ok) return;
    const col = BUD_COLORS[(Math.random() * BUD_COLORS.length) | 0];
    buds.push({ x, y, c1: col[0], c2: col[1], exposure: 0, blooming: false, bloomT: 0, wob: Math.random() * Math.PI * 2 });
  }

  function spawnThorn() {
    const margin = 70;
    let x = 0, y = 0, ok = false;
    for (let i = 0; i < 30 && !ok; i++) {
      x = rand(margin, W - margin);
      y = rand(120, H - 160);
      ok = farEnough(x, y, buds, 100) && farEnough(x, y, thorns, 110);
    }
    if (!ok) return;
    thorns.push({ x, y, t: Math.random() * 10, alive: true });
  }

  function spawnFlake() {
    flakes.push({
      x: rand(0, W),
      y: -10,
      vy: rand(0.2, 0.7),
      vx: rand(-0.2, 0.2),
      r: rand(0.6, 1.6),
      alpha: rand(0.3, 0.7),
    });
  }

  function particle(x, y, color, scale = 1) {
    const a = Math.random() * Math.PI * 2;
    const s = (1 + Math.random() * 3.5) * scale;
    return {
      x, y,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s - 1.4 * scale,
      life: 1 + Math.random() * 0.5,
      maxLife: 1.5,
      color,
      r: 1.6 + Math.random() * 3.2,
    };
  }

  function start() {
    score = 0; lives = 3; timeLeft = 60;
    buds = []; thorns = []; particles = []; flakes = [];
    bestBudCount = 5; thornCount = 2;
    paintFrost(1);
    for (let i = 0; i < bestBudCount; i++) spawnBud();
    for (let i = 0; i < thornCount; i++) spawnThorn();
    running = true;
    lastT = performance.now();
    document.getElementById('title').classList.add('hidden');
    document.getElementById('end').classList.add('hidden');
    requestAnimationFrame(loop);
  }

  function end() {
    running = false;
    document.getElementById('finalScore').textContent = score;
    let msg;
    if (score >= 40) { msg = '見事に咲き誇った！'; document.getElementById('endTitle').textContent = 'BLOOMED'; }
    else if (score >= 20) { msg = '春の気配が漂う'; document.getElementById('endTitle').textContent = 'WARMER'; }
    else { msg = 'まだ霜は深い…'; document.getElementById('endTitle').textContent = 'COLD'; }
    document.getElementById('endMsg').textContent = msg;
    document.getElementById('end').classList.remove('hidden');
    if (navigator.vibrate) navigator.vibrate(80);
  }

  // ----- Input (rub the frost) -----
  let lastX = -1, lastY = -1, rubbing = false;

  function rubAt(x, y, prevX, prevY) {
    fctx.save();
    fctx.globalCompositeOperation = 'destination-out';
    fctx.strokeStyle = 'rgba(0,0,0,1)';
    fctx.fillStyle = 'rgba(0,0,0,1)';
    fctx.lineCap = 'round';
    fctx.lineJoin = 'round';
    fctx.lineWidth = 46;
    if (prevX >= 0) {
      fctx.beginPath();
      fctx.moveTo(prevX, prevY);
      fctx.lineTo(x, y);
      fctx.stroke();
    } else {
      fctx.beginPath();
      fctx.arc(x, y, 24, 0, Math.PI * 2);
      fctx.fill();
    }
    fctx.restore();

    // expose nearby buds
    for (const b of buds) {
      if (b.blooming) continue;
      const d = Math.hypot(b.x - x, b.y - y);
      if (d < 56) b.exposure += (56 - d) * 0.6;
    }
    // hit thorns
    for (const t of thorns) {
      if (!t.alive) continue;
      const d = Math.hypot(t.x - x, t.y - y);
      if (d < 30) {
        t.alive = false;
        lives--;
        if (navigator.vibrate) navigator.vibrate([24, 30, 40]);
        for (let i = 0; i < 22; i++) particles.push(particle(t.x, t.y, '#ff5572', 1.6));
        setTimeout(() => { if (running) spawnThorn(); }, 600);
        if (lives <= 0) { end(); return; }
      }
    }
  }

  function pos(ev) {
    if (ev.touches && ev.touches.length) {
      const t = ev.touches[0];
      return { x: t.clientX, y: t.clientY };
    }
    return { x: ev.clientX, y: ev.clientY };
  }

  function onStart(ev) {
    if (!running) return;
    ev.preventDefault();
    rubbing = true;
    const p = pos(ev);
    lastX = p.x; lastY = p.y;
    rubAt(p.x, p.y, -1, -1);
  }
  function onMove(ev) {
    if (!running || !rubbing) return;
    ev.preventDefault();
    if (ev.touches && ev.touches.length) {
      const t = ev.touches[0];
      rubAt(t.clientX, t.clientY, lastX, lastY);
      lastX = t.clientX; lastY = t.clientY;
    } else {
      rubAt(ev.clientX, ev.clientY, lastX, lastY);
      lastX = ev.clientX; lastY = ev.clientY;
    }
  }
  function onEnd(ev) {
    rubbing = false; lastX = -1; lastY = -1;
  }
  canvas.addEventListener('touchstart', onStart, { passive: false });
  canvas.addEventListener('touchmove', onMove, { passive: false });
  canvas.addEventListener('touchend', onEnd);
  canvas.addEventListener('touchcancel', onEnd);
  canvas.addEventListener('mousedown', onStart);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onEnd);

  // ----- Update -----
  function bloomBud(b) {
    b.blooming = true;
    b.bloomT = 0;
    score += 10;
    if (navigator.vibrate) navigator.vibrate(28);
    for (let i = 0; i < 32; i++) particles.push(particle(b.x, b.y, b.c1, 1.4));
    for (let i = 0; i < 22; i++) particles.push(particle(b.x, b.y, b.c2, 1.2));
    // bonus life every 50
    if (score > 0 && score % 50 === 0 && lives < 5) lives++;
  }

  function update(dt) {
    timeLeft -= dt;
    if (timeLeft <= 0) { timeLeft = 0; end(); return; }

    // difficulty curve
    const phase = 1 - timeLeft / 60; // 0..1
    const targetBuds = 5 + Math.floor(phase * 3);
    const targetThorns = 2 + Math.floor(phase * 2);
    while (buds.length < targetBuds) spawnBud();
    while (thorns.filter(t => t.alive).length < targetThorns) spawnThorn();

    // frost regrowth (slow at start, faster later)
    const regrow = 0.04 + phase * 0.06;
    fctx.save();
    fctx.globalCompositeOperation = 'source-over';
    fctx.fillStyle = `rgba(210, 234, 250, ${regrow * dt * 8})`;
    fctx.fillRect(0, 0, W, H);
    fctx.restore();

    // buds
    for (let i = buds.length - 1; i >= 0; i--) {
      const b = buds[i];
      b.wob += dt;
      if (b.blooming) {
        b.bloomT += dt;
        if (b.bloomT > 1.3) {
          buds.splice(i, 1);
        }
      } else {
        b.exposure -= dt * (8 + phase * 6);
        if (b.exposure < 0) b.exposure = 0;
        if (b.exposure >= BUD_THRESHOLD) bloomBud(b);
      }
    }
    // clean dead thorns
    for (let i = thorns.length - 1; i >= 0; i--) {
      if (!thorns[i].alive) thorns.splice(i, 1);
    }
    // particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.985; p.vy = p.vy * 0.985 + 0.06;
      p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
    // flakes (ambient)
    if (flakes.length < 50 && Math.random() < 0.4) spawnFlake();
    for (let i = flakes.length - 1; i >= 0; i--) {
      const f = flakes[i];
      f.x += f.vx; f.y += f.vy;
      if (f.y > H + 8) flakes.splice(i, 1);
    }
  }

  // ----- Draw -----
  function hexA(hex, a) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `rgba(${r},${g},${b},${a})`;
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // ambient halo under each bud, scaled by exposure
    for (const b of buds) {
      const t = b.blooming ? 1 : Math.min(1, b.exposure / BUD_THRESHOLD);
      const r = 90 + (b.blooming ? 30 : 0);
      const g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, r);
      g.addColorStop(0, hexA(b.c1, 0.16 + 0.45 * t));
      g.addColorStop(1, hexA(b.c1, 0));
      ctx.fillStyle = g;
      ctx.fillRect(b.x - r, b.y - r, r * 2, r * 2);
    }

    // buds (under frost)
    for (const b of buds) {
      const t = Math.min(1, b.exposure / BUD_THRESHOLD);
      const blooming = b.blooming;
      const scale = blooming
        ? (0.9 + Math.min(1, b.bloomT * 1.4) * 0.7)
        : (0.55 + t * 0.55);
      const wob = Math.sin(b.wob * 1.4) * 0.05;
      const pet = 6;
      ctx.save();
      ctx.translate(b.x, b.y);
      ctx.rotate(wob + (blooming ? b.bloomT * 0.7 : 0));
      const alpha = blooming ? Math.max(0, 1 - b.bloomT / 1.3) : 0.55 + t * 0.45;
      ctx.globalAlpha = alpha;
      for (let i = 0; i < pet; i++) {
        ctx.save();
        ctx.rotate((i / pet) * Math.PI * 2);
        const py = -16 * scale;
        const g = ctx.createRadialGradient(0, py, 0, 0, py, 18 * scale);
        g.addColorStop(0, b.c1);
        g.addColorStop(1, b.c2);
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.ellipse(0, py, 9 * scale, 17 * scale, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      // core
      const cg = ctx.createRadialGradient(0, 0, 0, 0, 0, 14 * scale);
      cg.addColorStop(0, '#fff7d6');
      cg.addColorStop(0.6, b.c1);
      cg.addColorStop(1, b.c2);
      ctx.fillStyle = cg;
      ctx.beginPath();
      ctx.arc(0, 0, 7.5 * scale, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    ctx.globalAlpha = 1;

    // thorns (under frost; subtle warning red)
    for (const tn of thorns) {
      ctx.save();
      ctx.translate(tn.x, tn.y);
      ctx.rotate(tn.t * 0.4);
      tn.t += 0.01;
      const r = 22;
      const g = ctx.createRadialGradient(0, 0, 0, 0, 0, r);
      g.addColorStop(0, 'rgba(255,90,100,0.95)');
      g.addColorStop(0.7, 'rgba(200,40,60,0.5)');
      g.addColorStop(1, 'rgba(120,20,40,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      for (let i = 0; i < 10; i++) {
        const a = (i / 10) * Math.PI * 2;
        const rr = (i % 2 === 0) ? r : r * 0.42;
        const x = Math.cos(a) * rr, y = Math.sin(a) * rr;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.fill();
      // dark center
      ctx.fillStyle = '#350a14';
      ctx.beginPath();
      ctx.arc(0, 0, 6.5, 0, Math.PI * 2);
      ctx.fill();
      // small spike highlight
      ctx.fillStyle = 'rgba(255,180,180,0.6)';
      ctx.beginPath();
      ctx.arc(-2, -2.5, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // ambient snowflakes (behind frost)
    ctx.save();
    for (const f of flakes) {
      ctx.globalAlpha = f.alpha;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    // frost veil
    ctx.drawImage(frost, 0, 0, W, H);

    // particles (above frost — burst feel)
    ctx.save();
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    // HUD
    document.getElementById('hudScore').innerHTML =
      '<span class="ico"></span>' + score + '&nbsp;&nbsp;<span class="heart">♥</span> ' + lives;
    document.getElementById('hudTime').textContent = Math.ceil(timeLeft).toString().padStart(2, '0');
  }

  function loop(t) {
    if (!running) return;
    const dt = Math.min(0.05, (t - lastT) / 1000);
    lastT = t;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  // bootstrap
  resize();
  document.getElementById('startBtn').addEventListener('click', start);
  document.getElementById('retryBtn').addEventListener('click', start);
  // Prevent global scroll on touch
  document.body.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false });
})();
</script>
</body>
</html>
