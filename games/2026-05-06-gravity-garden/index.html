<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Gravity Garden</title>
<style>
  :root {
    --bg-1: #06030f;
    --bg-2: #11052a;
    --accent: #7df3ff;
    --warn: #ff5d8f;
    --gold: #ffd166;
    --text: #e7e3ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: radial-gradient(circle at 50% 60%, var(--bg-2), var(--bg-1) 70%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
    overflow: hidden;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }
  #stage {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    display: block;
  }
  .top-bar {
    position: fixed;
    top: env(safe-area-inset-top, 0);
    left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px;
    z-index: 5;
    pointer-events: none;
  }
  .back {
    pointer-events: auto;
    color: var(--text);
    text-decoration: none;
    font-size: 14px;
    opacity: 0.7;
    background: rgba(20, 10, 40, 0.5);
    border: 1px solid rgba(125, 243, 255, 0.2);
    padding: 6px 12px;
    border-radius: 999px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .hud {
    pointer-events: none;
    display: flex;
    gap: 14px;
    font-variant-numeric: tabular-nums;
    font-size: 14px;
    letter-spacing: 0.05em;
  }
  .hud .pill {
    background: rgba(20, 10, 40, 0.5);
    border: 1px solid rgba(125, 243, 255, 0.18);
    padding: 6px 12px;
    border-radius: 999px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .hud .pill b { color: var(--accent); font-weight: 600; }
  .hud .pill.lives b { color: var(--warn); }

  .overlay {
    position: fixed; inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    z-index: 10;
    background: rgba(6, 3, 15, 0.55);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 24px;
    transition: opacity 0.4s ease;
  }
  .overlay.hidden { opacity: 0; pointer-events: none; }
  .overlay h1 {
    font-size: 38px;
    font-weight: 300;
    letter-spacing: 0.18em;
    margin-bottom: 6px;
    background: linear-gradient(90deg, #7df3ff, #c89bff, #ffd166);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .overlay p {
    font-size: 14px;
    line-height: 1.7;
    opacity: 0.85;
    max-width: 320px;
    margin: 6px 0;
  }
  .overlay .hint {
    margin-top: 18px;
    font-size: 13px;
    opacity: 0.7;
    color: var(--accent);
  }
  .btn {
    margin-top: 28px;
    padding: 14px 36px;
    border-radius: 999px;
    border: 1px solid rgba(125, 243, 255, 0.45);
    background: linear-gradient(135deg, rgba(125, 243, 255, 0.18), rgba(200, 155, 255, 0.18));
    color: var(--text);
    font-size: 16px;
    letter-spacing: 0.2em;
    cursor: pointer;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    transition: transform 0.15s ease, box-shadow 0.2s ease;
  }
  .btn:active { transform: scale(0.96); box-shadow: 0 0 30px rgba(125, 243, 255, 0.45); }

  .stats {
    margin-top: 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    font-size: 14px;
  }
  .stats .row { display: flex; justify-content: space-between; gap: 36px; }
  .stats .row b { color: var(--gold); font-weight: 500; }

  .pulse {
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>
  <canvas id="stage"></canvas>

  <div class="top-bar">
    <a href="../../index.html" class="back">← 戻る</a>
    <div class="hud">
      <div class="pill">救出 <b id="score">0</b></div>
      <div class="pill lives">残機 <b id="lives">3</b></div>
    </div>
  </div>

  <div class="overlay" id="title">
    <h1>GRAVITY<br/>GARDEN</h1>
    <p>星々がブラックホールに吸い込まれていく。<br/>画面を<b style="color:var(--accent)">長押し</b>すると、指の周りに斥力が生まれて星を押し戻せる。</p>
    <p class="hint pulse">指を離すと斥力は消える</p>
    <button class="btn" id="startBtn">START</button>
  </div>

  <div class="overlay hidden" id="gameover">
    <h1>STARS LOST</h1>
    <div class="stats">
      <div class="row"><span>救出した星</span><b id="finalScore">0</b></div>
      <div class="row"><span>生存時間</span><b id="finalTime">0.0s</b></div>
      <div class="row"><span>最大コンボ</span><b id="finalCombo">0</b></div>
    </div>
    <button class="btn" id="retryBtn">RETRY</button>
  </div>

<script>
(() => {
  const canvas = document.getElementById('stage');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const livesEl = document.getElementById('lives');
  const titleEl = document.getElementById('title');
  const gameoverEl = document.getElementById('gameover');
  const finalScoreEl = document.getElementById('finalScore');
  const finalTimeEl = document.getElementById('finalTime');
  const finalComboEl = document.getElementById('finalCombo');

  let W = 0, H = 0, DPR = 1;
  let cx = 0, cy = 0;          // black hole center
  const HOLE_R = 38;           // visual radius
  const CAPTURE_R = 22;        // gameplay capture radius

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = canvas.clientWidth = window.innerWidth;
    H = canvas.clientHeight = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    cx = W / 2;
    cy = H / 2 + 20;
  }
  window.addEventListener('resize', resize);
  resize();

  const stars = [];
  const particles = [];
  const ripples = [];
  let finger = { x: 0, y: 0, active: false, t: 0 };
  let score = 0;
  let lives = 3;
  let combo = 0;
  let bestCombo = 0;
  let elapsed = 0;
  let lastSpawn = 0;
  let lastFrame = 0;
  let running = false;
  let shake = 0;
  let holeAngle = 0;

  const STAR_COLORS = [
    '#7df3ff', '#c89bff', '#ffd166', '#9affc1', '#ffa3d1'
  ];

  function rand(a, b) { return a + Math.random() * (b - a); }

  function spawnStar() {
    // pick a random edge spawn point
    const side = Math.floor(Math.random() * 4);
    let x, y;
    const m = 30;
    if (side === 0) { x = rand(-m, W + m); y = -m; }
    else if (side === 1) { x = W + m; y = rand(-m, H + m); }
    else if (side === 2) { x = rand(-m, W + m); y = H + m; }
    else { x = -m; y = rand(-m, H + m); }
    // initial velocity: slight perpendicular drift so they spiral nicely
    const dx = cx - x, dy = cy - y;
    const d = Math.hypot(dx, dy) || 1;
    const tang = rand(-0.4, 0.4);
    const vx = (-dy / d) * tang;
    const vy = (dx / d) * tang;
    stars.push({
      x, y, vx, vy,
      r: rand(3.5, 6),
      hue: STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)],
      life: 0,
      saved: 0, // counts how many times currently being protected
      twinkle: Math.random() * Math.PI * 2,
    });
  }

  function burst(x, y, color, count = 14, speed = 4) {
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = rand(speed * 0.4, speed);
      particles.push({
        x, y,
        vx: Math.cos(a) * s,
        vy: Math.sin(a) * s,
        life: rand(0.5, 1.0),
        max: 1.0,
        color,
        size: rand(1.5, 3.5),
      });
    }
  }

  function ripple(x, y, color) {
    ripples.push({ x, y, r: 8, max: 90, life: 0.7, color });
  }

  function start() {
    stars.length = 0;
    particles.length = 0;
    ripples.length = 0;
    score = 0;
    lives = 3;
    combo = 0;
    bestCombo = 0;
    elapsed = 0;
    lastSpawn = 0;
    shake = 0;
    finger.active = false;
    scoreEl.textContent = '0';
    livesEl.textContent = '3';
    titleEl.classList.add('hidden');
    gameoverEl.classList.add('hidden');
    running = true;
    lastFrame = performance.now();
    requestAnimationFrame(loop);
    // seed a few stars
    for (let i = 0; i < 3; i++) spawnStar();
  }

  function gameOver() {
    running = false;
    finalScoreEl.textContent = score;
    finalTimeEl.textContent = elapsed.toFixed(1) + 's';
    finalComboEl.textContent = bestCombo;
    setTimeout(() => gameoverEl.classList.remove('hidden'), 600);
    if (navigator.vibrate) navigator.vibrate([60, 40, 80]);
  }

  function loop(now) {
    if (!running) return;
    const dt = Math.min(0.05, (now - lastFrame) / 1000);
    lastFrame = now;
    elapsed += dt;

    // difficulty: spawn rate increases over time
    const spawnInterval = Math.max(0.45, 1.5 - elapsed * 0.012);
    lastSpawn += dt;
    if (lastSpawn >= spawnInterval) {
      lastSpawn = 0;
      spawnStar();
      if (elapsed > 25 && Math.random() < 0.3) spawnStar();
    }

    // gravity strength scales slowly
    const gStrength = 60 + Math.min(40, elapsed * 0.6);

    update(dt, gStrength);
    render(dt);
    requestAnimationFrame(loop);
  }

  function update(dt, gStrength) {
    holeAngle += dt * 1.4;

    // update stars
    for (let i = stars.length - 1; i >= 0; i--) {
      const s = stars[i];
      s.life += dt;
      s.twinkle += dt * 6;

      // gravity toward hole
      const dx = cx - s.x, dy = cy - s.y;
      const d2 = dx * dx + dy * dy;
      const d = Math.sqrt(d2) || 1;
      const a = gStrength / Math.max(1200, d * 1.2); // gentle but persistent
      s.vx += (dx / d) * a;
      s.vy += (dy / d) * a;

      // repulsion from finger when active
      if (finger.active) {
        const fx = s.x - finger.x, fy = s.y - finger.y;
        const fd = Math.hypot(fx, fy) || 1;
        const RANGE = 130;
        if (fd < RANGE) {
          const force = (1 - fd / RANGE) * 6.2;
          s.vx += (fx / fd) * force;
          s.vy += (fy / fd) * force;
          // saved-by-field flag
          if (fd < 80 && d < 200) {
            s.saved += dt;
            if (s.saved > 0.18) {
              s.saved = -10; // mark as scored
              score++;
              combo++;
              if (combo > bestCombo) bestCombo = combo;
              scoreEl.textContent = score;
              ripple(s.x, s.y, s.hue);
              burst(s.x, s.y, s.hue, 10, 3);
              if (navigator.vibrate) navigator.vibrate(8);
            }
          }
        }
      }

      // damping
      s.vx *= 0.985;
      s.vy *= 0.985;

      s.x += s.vx;
      s.y += s.vy;

      // captured by black hole
      if (d < CAPTURE_R) {
        // big ominous burst
        burst(s.x, s.y, '#5a2a7a', 16, 5);
        burst(cx, cy, '#1a0033', 8, 2);
        stars.splice(i, 1);
        lives--;
        combo = 0;
        livesEl.textContent = Math.max(0, lives);
        shake = 14;
        if (navigator.vibrate) navigator.vibrate(40);
        if (lives <= 0) { gameOver(); return; }
        continue;
      }

      // off-screen far drift remove (rare)
      if (s.x < -200 || s.x > W + 200 || s.y < -200 || s.y > H + 200) {
        if (s.life > 30) stars.splice(i, 1);
      }
    }

    // particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life -= dt;
      if (p.life <= 0) { particles.splice(i, 1); continue; }
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.94;
      p.vy *= 0.94;
    }

    // ripples
    for (let i = ripples.length - 1; i >= 0; i--) {
      const r = ripples[i];
      r.life -= dt;
      r.r += dt * 200;
      if (r.life <= 0) ripples.splice(i, 1);
    }

    if (shake > 0) shake = Math.max(0, shake - dt * 60);
    if (finger.active) finger.t += dt;
  }

  function render(dt) {
    ctx.clearRect(0, 0, W, H);

    // shake offset
    let ox = 0, oy = 0;
    if (shake > 0) {
      ox = (Math.random() - 0.5) * shake;
      oy = (Math.random() - 0.5) * shake;
    }
    ctx.save();
    ctx.translate(ox, oy);

    // backdrop subtle gradient highlight near hole
    const bg = ctx.createRadialGradient(cx, cy, 30, cx, cy, Math.max(W, H) * 0.7);
    bg.addColorStop(0, 'rgba(60, 20, 100, 0.35)');
    bg.addColorStop(0.5, 'rgba(20, 8, 50, 0.05)');
    bg.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    // black hole accretion ring
    const ringR = HOLE_R + 18 + Math.sin(elapsed * 2) * 2;
    const grad = ctx.createRadialGradient(cx, cy, HOLE_R * 0.6, cx, cy, ringR + 30);
    grad.addColorStop(0, 'rgba(255,90,180,0.0)');
    grad.addColorStop(0.4, 'rgba(200,90,255,0.35)');
    grad.addColorStop(0.7, 'rgba(125,243,255,0.18)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, ringR + 30, 0, Math.PI * 2);
    ctx.fill();

    // spiraling arcs
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(holeAngle);
    for (let i = 0; i < 3; i++) {
      ctx.rotate((Math.PI * 2) / 3);
      ctx.strokeStyle = `rgba(200, 150, 255, ${0.18 + i * 0.06})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, ringR + i * 4, 0, Math.PI * 1.1);
      ctx.stroke();
    }
    ctx.restore();

    // event horizon (deep black)
    const innerGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, HOLE_R);
    innerGrad.addColorStop(0, '#000');
    innerGrad.addColorStop(0.7, '#02000a');
    innerGrad.addColorStop(1, 'rgba(20, 5, 40, 0)');
    ctx.fillStyle = innerGrad;
    ctx.beginPath();
    ctx.arc(cx, cy, HOLE_R, 0, Math.PI * 2);
    ctx.fill();

    // ripples
    for (const r of ripples) {
      const t = 1 - r.life / 0.7;
      ctx.strokeStyle = hexA(r.color, 0.6 * (1 - t));
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
      ctx.stroke();
    }

    // finger field
    if (finger.active) {
      const pulse = 1 + Math.sin(finger.t * 8) * 0.05;
      const fr = 130 * pulse;
      const fg = ctx.createRadialGradient(finger.x, finger.y, 10, finger.x, finger.y, fr);
      fg.addColorStop(0, 'rgba(125, 243, 255, 0.35)');
      fg.addColorStop(0.6, 'rgba(125, 243, 255, 0.1)');
      fg.addColorStop(1, 'rgba(125, 243, 255, 0)');
      ctx.fillStyle = fg;
      ctx.beginPath();
      ctx.arc(finger.x, finger.y, fr, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(125, 243, 255, 0.55)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(finger.x, finger.y, fr, 0, Math.PI * 2);
      ctx.stroke();
      // inner dot
      ctx.fillStyle = 'rgba(231, 227, 255, 0.9)';
      ctx.beginPath();
      ctx.arc(finger.x, finger.y, 6, 0, Math.PI * 2);
      ctx.fill();
    }

    // stars
    for (const s of stars) {
      const tw = 0.7 + 0.3 * Math.sin(s.twinkle);
      // glow
      const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 5);
      g.addColorStop(0, hexA(s.hue, 0.85 * tw));
      g.addColorStop(0.4, hexA(s.hue, 0.25 * tw));
      g.addColorStop(1, hexA(s.hue, 0));
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r * 5, 0, Math.PI * 2);
      ctx.fill();
      // core
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r * 0.6, 0, Math.PI * 2);
      ctx.fill();
    }

    // particles
    for (const p of particles) {
      const a = Math.max(0, p.life / p.max);
      ctx.fillStyle = hexA(p.color, a);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }

  function hexA(hex, a) {
    // accept #rrggbb only
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `rgba(${r},${g},${b},${a})`;
  }

  // input
  function getPoint(e) {
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX, y: t.clientY };
  }
  function onDown(e) {
    if (!running) return;
    e.preventDefault();
    const p = getPoint(e);
    finger.x = p.x; finger.y = p.y;
    finger.active = true;
    finger.t = 0;
  }
  function onMove(e) {
    if (!running || !finger.active) return;
    e.preventDefault();
    const p = getPoint(e);
    finger.x = p.x; finger.y = p.y;
  }
  function onUp(e) {
    finger.active = false;
    combo = 0;
  }

  canvas.addEventListener('touchstart', onDown, { passive: false });
  canvas.addEventListener('touchmove', onMove, { passive: false });
  canvas.addEventListener('touchend', onUp);
  canvas.addEventListener('touchcancel', onUp);
  canvas.addEventListener('mousedown', onDown);
  canvas.addEventListener('mousemove', onMove);
  canvas.addEventListener('mouseup', onUp);
  canvas.addEventListener('mouseleave', onUp);

  document.getElementById('startBtn').addEventListener('click', start);
  document.getElementById('retryBtn').addEventListener('click', start);

  // ambient draw on title
  function ambient() {
    if (running) return;
    holeAngle += 0.012;
    render(0.016);
    requestAnimationFrame(ambient);
  }
  ambient();
})();
</script>
</body>
</html>
