<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Koma</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body {
    width:100%; height:100%; overflow:hidden;
    background:#0c0a07;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    overscroll-behavior:none; touch-action:none;
    -webkit-user-select:none; user-select:none;
    -webkit-tap-highlight-color:transparent;
  }
  #c { position:fixed; inset:0; display:block; touch-action:none; }
  .back {
    position:fixed; top:max(10px,env(safe-area-inset-top)); left:14px; z-index:10;
    color:#7d6a4e; text-decoration:none; font-size:13px; letter-spacing:.05em;
    padding:7px 12px; border:1px solid #33291b; border-radius:20px;
    background:rgba(16,12,7,.55); backdrop-filter:blur(4px);
  }
  .back:active { color:#ffcf57; }
</style>
</head>
<body>
<a class="back" href="../../index.html">&larr; 戻る</a>
<canvas id="c"></canvas>
<script>
(function(){
  "use strict";
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0,H=0,DPR=1;

  function resize(){
    DPR = Math.min(window.devicePixelRatio||1, 2.5);
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W*DPR; cv.height = H*DPR;
    cv.style.width = W+'px'; cv.style.height = H+'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  const TAU = Math.PI*2;
  const clamp = (v,a,b)=> v<a?a:(v>b?b:v);
  const lerp = (a,b,t)=> a+(b-a)*t;
  const rnd = (a,b)=> a+Math.random()*(b-a);
  function wrap(a){ while(a> Math.PI) a-=TAU; while(a<-Math.PI) a+=TAU; return a; }
  function vib(ms){ try{ if(navigator.vibrate) navigator.vibrate(ms); }catch(e){} }

  // ---- field ----
  let field = { cx:0, cy:0, R:0 };
  function layoutField(){
    field.cx = W*0.5;
    field.cy = H*0.52;
    field.R0 = Math.min(W,H)*0.37;
  }
  layoutField();

  // ---- game state ----
  let state = 'title';
  let top, lives, score, best, combo, comboT, level, levelT, timeAcc, gustT, gustWarn, flowers, particles, ribbon, invuln, levelFlash, shake, scoreTick;
  try{ best = parseInt(localStorage.getItem('koma_best')||'0',10)||0; }catch(e){ best=0; }

  function freshTop(){
    return { x:field.cx, y:field.cy, vx:0, vy:0, S:0.85, ang:0, lean:0, leanDir:0, r: Math.min(W,H)*0.072 };
  }

  function reset(){
    top = freshTop();
    lives = 3; score = 0; combo = 1; comboT = 0;
    level = 1; levelT = 0; timeAcc = 0;
    gustT = 5.0; gustWarn = null;
    flowers = []; particles = []; ribbon = [];
    invuln = 1.2; levelFlash = 0; shake = 0; scoreTick = 0;
  }

  function curR(){ return Math.max(field.R0 * Math.pow(0.95, level-1), field.R0*0.62); }

  // ---- input ----
  let ptr = { active:false, x:0, y:0, lastA:0, hasA:false };
  function pos(e){
    const t = (e.touches && e.touches[0]) || (e.changedTouches && e.changedTouches[0]) || e;
    return { x:t.clientX, y:t.clientY };
  }
  function down(e){
    e.preventDefault();
    const p = pos(e);
    if(state==='title'){ reset(); state='play'; ptr.active=true; ptr.x=p.x; ptr.y=p.y; ptr.hasA=false; return; }
    if(state==='over'){ if(over.t>0.6){ reset(); state='play'; } return; }
    ptr.active=true; ptr.x=p.x; ptr.y=p.y; ptr.hasA=false;
  }
  function move(e){
    e.preventDefault();
    if(!ptr.active) return;
    const p = pos(e);
    ptr.x=p.x; ptr.y=p.y;
    if(state==='play') feedSpin(p.x,p.y);
    ribbon.push({x:p.x,y:p.y,t:0});
    if(ribbon.length>22) ribbon.shift();
  }
  function up(e){
    e.preventDefault();
    ptr.active=false; ptr.hasA=false;
  }
  cv.addEventListener('touchstart',down,{passive:false});
  cv.addEventListener('touchmove',move,{passive:false});
  cv.addEventListener('touchend',up,{passive:false});
  cv.addEventListener('touchcancel',up,{passive:false});
  cv.addEventListener('mousedown',down,{passive:false});
  window.addEventListener('mousemove',move,{passive:false});
  window.addEventListener('mouseup',up,{passive:false});

  // circular motion of the finger around the top charges spin
  let flickPulse = 0;
  function feedSpin(px,py){
    const dx = px - top.x, dy = py - top.y;
    const dist = Math.hypot(dx,dy);
    const a = Math.atan2(dy,dx);
    if(ptr.hasA && dist>6){
      let dA = wrap(a - ptr.lastA);
      // ignore close-to-center jitter, reward genuine circling
      const distF = clamp(dist/(curR()*0.55),0,1);
      const gain = Math.min(Math.abs(dA),0.55) * distF;
      if(gain>0.0015){
        top.S = Math.min(top.S + gain*1.95, 1.55);
        flickPulse = Math.min(flickPulse + gain*2.2, 1);
        if(gain>0.05 && Math.random()<0.5) vib(6);
      }
    }
    ptr.lastA = a; ptr.hasA = true;
  }

  // ---- spawning ----
  function spawnFlower(){
    const R = curR();
    for(let tries=0; tries<8; tries++){
      const ang = rnd(0,TAU), rr = rnd(R*0.18, R*0.82);
      const x = field.cx + Math.cos(ang)*rr;
      const y = field.cy + Math.sin(ang)*rr;
      if(Math.hypot(x-top.x,y-top.y) > top.r*2.4){
        flowers.push({x,y,life:7.0,grow:0,collected:false}); return;
      }
    }
  }

  function burst(x,y,col,n,sp){
    for(let i=0;i<n;i++){
      const a=rnd(0,TAU), s=rnd(sp*0.3,sp);
      particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rnd(0.5,1.0),max:1,col,sz:rnd(2,4.5),petal:col==='#ffb7d5'});
    }
  }

  // ---- update ----
  function update(dt){
    timeAcc += dt;
    levelT += dt;
    if(levelT > 22){ levelT=0; level++; levelFlash=1.4; vib(15); }

    const R = curR();
    // spin decays; faster when leaning or higher level
    const decay = (0.052 + (level-1)*0.011) * (1 + top.lean*0.9);
    top.S = Math.max(top.S - decay*dt, 0);
    top.ang += (4 + top.S*40) * dt;

    // steering: finger pulls the top, scaled by spin (need momentum to move)
    if(ptr.active){
      const ax = (ptr.x - top.x), ay = (ptr.y - top.y);
      const pull = (1.6 + top.S*4.2);
      top.vx += ax * pull * dt;
      top.vy += ay * pull * dt;
    }
    // gentle wandering drift
    top.vx += rnd(-1,1)*22*dt;
    top.vy += rnd(-1,1)*22*dt;
    // damping
    const damp = Math.pow(0.0025, dt);
    top.vx *= damp; top.vy *= damp;
    top.x += top.vx*dt; top.y += top.vy*dt;

    // gusts
    if(gustWarn){
      gustWarn.t += dt;
      if(gustWarn.t > 0.85){
        const g = 230 + level*22;
        top.vx += Math.cos(gustWarn.a)*g;
        top.vy += Math.sin(gustWarn.a)*g;
        gustWarn = null;
      }
    } else {
      gustT -= dt;
      if(gustT<=0){
        gustT = clamp(7.5 - level*0.45, 2.6, 7.5) + rnd(0,1.5);
        const a = rnd(0,TAU);
        gustWarn = { a, t:0,
          ox: field.cx + Math.cos(a+Math.PI)*(R+30),
          oy: field.cy + Math.sin(a+Math.PI)*(R+30) };
      }
    }

    // lean / wobble: grows when slow, eased away when fast
    const leanTarget = clamp((0.46 - top.S)/0.46, 0, 1);
    top.lean += (leanTarget - top.lean) * (leanTarget>top.lean ? 1.6 : 3.2) * dt;
    if(top.lean>0.02){
      top.leanDir += dt * (2.2 + top.lean*3);
      top.x += Math.cos(top.leanDir) * top.lean*top.lean*70 * dt;
      top.y += Math.sin(top.leanDir) * top.lean*top.lean*70 * dt;
      if(top.lean>0.35 && Math.random()<top.lean*0.5){
        burst(top.x + Math.cos(top.leanDir)*top.r, top.y + Math.sin(top.leanDir)*top.r, '#9a7d4f', 1, 60);
      }
    }

    // boundary
    const dcx = top.x - field.cx, dcy = top.y - field.cy;
    let dC = Math.hypot(dcx,dcy);
    const edge = R - top.r*0.65;
    if(dC > edge){
      const nx = dcx/(dC||1), ny = dcy/(dC||1);
      if(top.S > 0.42 && invuln<=0){
        // cushioned bounce, scrapes off some spin
        top.x = field.cx + nx*edge;
        top.y = field.cy + ny*edge;
        const vn = top.vx*nx + top.vy*ny;
        top.vx -= 1.7*vn*nx; top.vy -= 1.7*vn*ny;
        top.S = Math.max(top.S - 0.16, 0);
        top.lean = Math.min(top.lean+0.12,1);
        burst(top.x,top.y,'#c9a24a',4,150);
        shake = Math.max(shake,4);
        if(Math.random()<0.4) vib(8);
      } else if(invuln<=0){
        loseLife();
        return;
      } else {
        top.x = field.cx + nx*edge;
        top.y = field.cy + ny*edge;
      }
    }
    if(top.lean>=1 && invuln<=0){ loseLife(); return; }

    if(invuln>0) invuln -= dt;

    // flowers
    for(let i=flowers.length-1;i>=0;i--){
      const f = flowers[i];
      f.grow = Math.min(f.grow+dt*4,1);
      f.life -= dt;
      if(!f.collected && top.S>0.4 && Math.hypot(f.x-top.x,f.y-top.y) < top.r+13){
        f.collected = true;
        combo = Math.min(combo+1, 9); comboT = 2.2;
        const gain = 10*combo;
        score += gain;
        top.S = Math.min(top.S+0.13,1.55);
        burst(f.x,f.y,'#ffb7d5',12,210);
        vib(10);
        flowers.splice(i,1);
        continue;
      }
      if(f.life<=0) flowers.splice(i,1);
    }
    if(flowers.length<2 && Math.random()< (0.55+level*0.05)*dt) spawnFlower();

    // passive survival score
    if(top.S>0.3){
      scoreTick += dt;
      if(scoreTick>=0.5){ scoreTick-=0.5; score += 1; }
    }

    if(comboT>0){ comboT-=dt; if(comboT<=0) combo=1; }
    if(levelFlash>0) levelFlash-=dt;
    if(flickPulse>0) flickPulse=Math.max(flickPulse-dt*2.4,0);
    if(shake>0) shake=Math.max(shake-dt*22,0);

    // particles
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i];
      p.life-=dt;
      p.x+=p.vx*dt; p.y+=p.vy*dt;
      p.vx*=0.95; p.vy*=0.95;
      if(p.petal) p.vy+=120*dt;
      if(p.life<=0) particles.splice(i,1);
    }
    for(let i=ribbon.length-1;i>=0;i--){ ribbon[i].t+=dt; if(ribbon[i].t>0.4) ribbon.splice(i,1); }
  }

  function loseLife(){
    lives--;
    burst(top.x,top.y,'#ff7a59',26,330);
    burst(top.x,top.y,'#ffd27a',14,210);
    shake = 12; vib(45);
    if(lives<=0){
      if(score>best){ best=score; try{localStorage.setItem('koma_best',String(best));}catch(e){} }
      over.t=0; state='over';
    } else {
      top = freshTop();
      top.S = 0.78; invuln = 1.3; top.lean=0;
    }
  }

  // ---- draw ----
  function spinColor(S){
    if(S>0.95) return {a:'#5fe9d6', b:'#1d6f7a'};
    if(S>0.45) return {a:'#ffd66a', b:'#9a6a1f'};
    return {a:'#ff6f5b', b:'#7a2320'};
  }

  function drawTop(){
    const R=curR();
    const c = spinColor(top.S);
    const lx = Math.cos(top.leanDir)*top.lean*top.r*0.9;
    const ly = Math.sin(top.leanDir)*top.lean*top.r*0.9;

    // shadow on the floor
    ctx.save();
    ctx.globalAlpha=0.5;
    ctx.fillStyle='#000';
    ctx.beginPath();
    ctx.ellipse(top.x+lx*0.5, top.y+top.r*0.62+ly*0.5, top.r*0.95, top.r*0.34, 0,0,TAU);
    ctx.fill();
    ctx.restore();

    ctx.save();
    ctx.translate(top.x+lx, top.y+ly);

    // motion-blur arcs (more when spinning fast)
    const blur = clamp(top.S,0,1.4);
    ctx.lineWidth = 3;
    for(let k=0;k<5;k++){
      ctx.beginPath();
      const rr = top.r*(0.45+k*0.13);
      const a0 = top.ang*0.6 + k;
      ctx.strokeStyle = c.a;
      ctx.globalAlpha = 0.10*blur;
      ctx.arc(0,0,rr,a0,a0+TAU*0.6);
      ctx.stroke();
    }
    ctx.globalAlpha=1;

    // glow
    const g = ctx.createRadialGradient(0,0,top.r*0.2, 0,0,top.r*1.7);
    g.addColorStop(0, c.a);
    g.addColorStop(0.35, c.b);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.globalAlpha = 0.5 + (top.S<0.45 ? (0.25+0.25*Math.sin(timeAcc*16)) : 0.18);
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(0,0,top.r*1.7,0,TAU); ctx.fill();
    ctx.globalAlpha=1;

    ctx.rotate(top.ang);

    // body
    const bg = ctx.createRadialGradient(-top.r*0.3,-top.r*0.3,2, 0,0,top.r);
    bg.addColorStop(0,'#3a2f1f');
    bg.addColorStop(1,'#15110a');
    ctx.fillStyle=bg;
    ctx.beginPath(); ctx.arc(0,0,top.r,0,TAU); ctx.fill();

    // colored spiral spokes
    const spokes=6;
    for(let i=0;i<spokes;i++){
      ctx.beginPath();
      ctx.moveTo(0,0);
      const a = i/spokes*TAU;
      ctx.fillStyle = i%2 ? c.a : c.b;
      ctx.arc(0,0,top.r*0.86, a, a+TAU/spokes);
      ctx.closePath();
      ctx.globalAlpha=0.55;
      ctx.fill();
    }
    ctx.globalAlpha=1;

    // rings
    ctx.lineWidth=2.5;
    ctx.strokeStyle=c.a;
    ctx.beginPath(); ctx.arc(0,0,top.r*0.62,0,TAU); ctx.stroke();
    ctx.strokeStyle='#efe2c4';
    ctx.beginPath(); ctx.arc(0,0,top.r*0.34,0,TAU); ctx.stroke();

    // hub
    ctx.fillStyle='#efe2c4';
    ctx.beginPath(); ctx.arc(0,0,top.r*0.15,0,TAU); ctx.fill();

    ctx.restore();

    // spin gauge ring around the top
    ctx.save();
    ctx.translate(top.x+lx, top.y+ly);
    ctx.lineWidth=4;
    ctx.strokeStyle='rgba(255,255,255,0.08)';
    ctx.beginPath(); ctx.arc(0,0,top.r*1.32,0,TAU); ctx.stroke();
    const sN = clamp(top.S/1.1,0,1);
    ctx.strokeStyle = c.a;
    ctx.shadowColor=c.a; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.arc(0,0,top.r*1.32, -Math.PI/2, -Math.PI/2 + sN*TAU); ctx.stroke();
    ctx.restore();
  }

  function drawFlower(f){
    const s = f.grow * (f.life<1.2? clamp(f.life/1.2,0,1):1);
    ctx.save();
    ctx.translate(f.x,f.y);
    ctx.rotate(timeAcc*1.5 + f.x);
    ctx.shadowColor='#ff9ec7'; ctx.shadowBlur=14;
    for(let i=0;i<5;i++){
      ctx.rotate(TAU/5);
      ctx.fillStyle='#ffb7d5';
      ctx.beginPath();
      ctx.ellipse(0, -10*s, 5.5*s, 9*s, 0,0,TAU);
      ctx.fill();
    }
    ctx.shadowBlur=0;
    ctx.fillStyle='#ffe9a8';
    ctx.beginPath(); ctx.arc(0,0,4*s,0,TAU); ctx.fill();
    ctx.restore();
  }

  function draw(){
    const sx = shake? rnd(-shake,shake):0;
    const sy = shake? rnd(-shake,shake):0;
    ctx.save();
    ctx.translate(sx,sy);

    // background
    const bg = ctx.createRadialGradient(W*0.5,H*0.5,40, W*0.5,H*0.5,Math.max(W,H)*0.75);
    bg.addColorStop(0,'#1c160d');
    bg.addColorStop(1,'#0a0805');
    ctx.fillStyle=bg;
    ctx.fillRect(-40,-40,W+80,H+80);

    if(state==='title'){ drawTitle(); ctx.restore(); return; }

    const R = curR();
    // playfield ring
    ctx.lineWidth=2;
    ctx.strokeStyle='rgba(255,210,120,0.16)';
    ctx.beginPath(); ctx.arc(field.cx,field.cy,R,0,TAU); ctx.stroke();
    ctx.strokeStyle='rgba(255,210,120,0.06)';
    ctx.beginPath(); ctx.arc(field.cx,field.cy,R*0.55,0,TAU); ctx.stroke();
    // floor texture grooves
    ctx.strokeStyle='rgba(120,90,50,0.05)';
    for(let i=1;i<=6;i++){ ctx.beginPath(); ctx.arc(field.cx,field.cy,R*i/6.5,0,TAU); ctx.stroke(); }

    // gust warning
    if(gustWarn){
      const tt = clamp(gustWarn.t/0.85,0,1);
      ctx.save();
      ctx.globalAlpha = 0.3 + 0.5*Math.sin(timeAcc*22);
      ctx.strokeStyle='#7fd7ff';
      ctx.lineWidth=3;
      const bx=gustWarn.ox, by=gustWarn.oy;
      const ex=field.cx+Math.cos(gustWarn.a)*R*tt;
      const ey=field.cy+Math.sin(gustWarn.a)*R*tt;
      ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(ex,ey); ctx.stroke();
      // arrow head
      ctx.translate(ex,ey); ctx.rotate(gustWarn.a);
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-16,-9); ctx.lineTo(-16,9); ctx.closePath();
      ctx.fillStyle='#7fd7ff'; ctx.fill();
      ctx.restore();
    }

    // ribbon trail of the finger
    for(let i=0;i<ribbon.length-1;i++){
      const r0=ribbon[i], r1=ribbon[i+1];
      ctx.strokeStyle='rgba(255,225,150,'+ (0.32*(1-r0.t/0.4)*(i/ribbon.length)) +')';
      ctx.lineWidth=6*(i/ribbon.length)+1;
      ctx.beginPath(); ctx.moveTo(r0.x,r0.y); ctx.lineTo(r1.x,r1.y); ctx.stroke();
    }

    flowers.forEach(drawFlower);

    // particles
    particles.forEach(p=>{
      const a = clamp(p.life/p.max,0,1);
      ctx.globalAlpha=a;
      ctx.fillStyle=p.col;
      if(p.petal){
        ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.x+timeAcc*4);
        ctx.beginPath(); ctx.ellipse(0,0,p.sz,p.sz*0.55,0,0,TAU); ctx.fill(); ctx.restore();
      } else {
        ctx.beginPath(); ctx.arc(p.x,p.y,p.sz,0,TAU); ctx.fill();
      }
    });
    ctx.globalAlpha=1;

    drawTop();

    // HUD
    ctx.fillStyle='#f4ead0';
    ctx.font='600 30px -apple-system,sans-serif';
    ctx.textAlign='left'; ctx.textBaseline='top';
    ctx.fillText(String(score), 18, 62);
    ctx.font='12px -apple-system,sans-serif';
    ctx.fillStyle='#9a8a66';
    ctx.fillText('LV '+level+'  /  最高 '+best, 19, 98);

    // lives (top icons)
    for(let i=0;i<3;i++){
      const lx = W-28-i*30, ly=34;
      ctx.beginPath(); ctx.arc(lx,ly,9,0,TAU);
      ctx.fillStyle = i<lives ? '#ffd66a' : 'rgba(255,255,255,0.12)';
      ctx.fill();
      if(i<lives){ ctx.fillStyle='#7a5a1f'; ctx.beginPath(); ctx.arc(lx,ly,3.2,0,TAU); ctx.fill(); }
    }

    // combo
    if(combo>1){
      ctx.textAlign='center';
      ctx.font='700 22px -apple-system,sans-serif';
      ctx.fillStyle='#ffb7d5';
      ctx.globalAlpha=clamp(comboT/2.2,0,1);
      ctx.fillText('x'+combo, top.x, top.y - top.r*2.1);
      ctx.globalAlpha=1;
    }

    // low-spin warning vignette
    if(top.S<0.45 && invuln<=0){
      const v = ctx.createRadialGradient(W*0.5,H*0.5,Math.min(W,H)*0.35, W*0.5,H*0.5,Math.max(W,H)*0.65);
      v.addColorStop(0,'rgba(0,0,0,0)');
      v.addColorStop(1,'rgba(255,40,30,'+(0.12+0.12*Math.sin(timeAcc*14))+')');
      ctx.fillStyle=v; ctx.fillRect(0,0,W,H);
    }

    if(levelFlash>0){
      ctx.globalAlpha=clamp(levelFlash/1.4,0,1);
      ctx.textAlign='center';
      ctx.fillStyle='#ffd66a';
      ctx.font='700 34px -apple-system,sans-serif';
      ctx.fillText('LEVEL '+level, W*0.5, H*0.30);
      ctx.globalAlpha=1;
    }

    if(state==='over') drawOver();

    ctx.restore();
  }

  let titleT=0;
  function drawTitle(){
    titleT+=0.016;
    ctx.textAlign='center';
    ctx.fillStyle='#f4ead0';
    ctx.font='700 64px -apple-system,sans-serif';
    ctx.fillText('独楽', W*0.5, H*0.30);
    ctx.fillStyle='#b8a47c';
    ctx.font='600 20px -apple-system,sans-serif';
    ctx.fillText('Koma', W*0.5, H*0.30+58);

    // animated circling hint
    const cx=W*0.5, cy=H*0.56, rr=46;
    ctx.strokeStyle='rgba(255,210,120,0.25)';
    ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(cx,cy,rr,0,TAU); ctx.stroke();
    const a=titleT*3;
    const fx=cx+Math.cos(a)*rr, fy=cy+Math.sin(a)*rr;
    ctx.fillStyle='#ffd66a';
    ctx.shadowColor='#ffd66a'; ctx.shadowBlur=16;
    ctx.beginPath(); ctx.arc(fx,fy,12,0,TAU); ctx.fill();
    ctx.shadowBlur=0;
    // small top in center
    ctx.fillStyle='#3a2f1f';
    ctx.beginPath(); ctx.arc(cx,cy,16,0,TAU); ctx.fill();
    ctx.strokeStyle='#ffd66a'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(cx,cy,9,0,TAU); ctx.stroke();

    ctx.fillStyle='#cdbb91';
    ctx.font='15px -apple-system,sans-serif';
    ctx.fillText('指でぐるぐる回して独楽を回す', W*0.5, H*0.70);
    ctx.fillText('回した方へ寄っていく ／ 勢いが落ちると倒れる', W*0.5, H*0.70+24);
    ctx.fillStyle='#8a7a56';
    ctx.font='13px -apple-system,sans-serif';
    ctx.fillText('花びらを拾って加点 ・ 風に流されるな', W*0.5, H*0.70+52);

    ctx.fillStyle='rgba(255,210,120,'+(0.55+0.45*Math.sin(titleT*4))+')';
    ctx.font='600 18px -apple-system,sans-serif';
    ctx.fillText('タップして開始', W*0.5, H*0.84);
  }

  let over={t:0};
  function drawOver(){
    over.t+=0.016;
    ctx.fillStyle='rgba(8,6,4,0.62)';
    ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.fillStyle='#f4ead0';
    ctx.font='700 56px -apple-system,sans-serif';
    ctx.fillText('終', W*0.5, H*0.32);
    ctx.font='600 20px -apple-system,sans-serif';
    ctx.fillStyle='#b8a47c';
    ctx.fillText('スコア', W*0.5, H*0.44);
    ctx.fillStyle='#ffd66a';
    ctx.font='700 52px -apple-system,sans-serif';
    ctx.fillText(String(score), W*0.5, H*0.44+30);
    ctx.fillStyle='#9a8a66';
    ctx.font='15px -apple-system,sans-serif';
    ctx.fillText('最高 '+best+'  ・  到達 LV'+level, W*0.5, H*0.44+86);
    if(over.t>0.6){
      ctx.fillStyle='rgba(255,210,120,'+(0.55+0.45*Math.sin(over.t*4))+')';
      ctx.font='600 18px -apple-system,sans-serif';
      ctx.fillText('タップでもう一度', W*0.5, H*0.74);
    }
  }

  // ---- loop ----
  let last=performance.now();
  function frame(now){
    let dt=(now-last)/1000; last=now;
    dt=Math.min(dt,0.05);
    if(state==='play') update(dt);
    draw();
    requestAnimationFrame(frame);
  }
  window.addEventListener('resize', ()=>{ layoutField(); });
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
