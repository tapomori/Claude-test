<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>金魚すくい — Kingyo-sukui</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #06121e;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", system-ui, sans-serif;
    color: #eaf6ff;
    touch-action: manipulation;
    overscroll-behavior: none;
    user-select: none; -webkit-user-select: none;
  }
  #stage {
    position: fixed; inset: 0;
    background:
      radial-gradient(120% 80% at 50% -10%, #14385a 0%, #0b2238 38%, #06121e 78%),
      #06121e;
  }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

  .hud {
    position: absolute; left: 0; right: 0; top: 0;
    padding: max(12px, env(safe-area-inset-top)) 16px 0;
    display: flex; align-items: flex-start; justify-content: space-between;
    pointer-events: none;
  }
  .back {
    pointer-events: auto;
    color: #bcd9ee; text-decoration: none; font-size: 13px;
    background: rgba(8,24,38,0.55); border: 1px solid rgba(150,200,230,0.22);
    padding: 7px 12px; border-radius: 999px; backdrop-filter: blur(3px);
  }
  .back:active { transform: scale(0.95); }
  .stat { text-align: right; }
  .score { font-size: 30px; font-weight: 800; letter-spacing: -0.02em; line-height: 1;
           text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
  .best { font-size: 11px; color: #8fb6ce; margin-top: 5px; letter-spacing: 0.04em; }

  .botbar {
    position: absolute; left: 0; right: 0; bottom: 0;
    padding: 0 18px max(14px, env(safe-area-inset-bottom));
    display: flex; align-items: center; justify-content: space-between;
    pointer-events: none;
  }
  .poistock { display: flex; gap: 7px; }
  .poistock i {
    width: 16px; height: 16px; border-radius: 50%;
    border: 2px solid #f4d9a0; background: rgba(244,217,160,0.18);
    display: block; transition: opacity .25s, transform .25s;
  }
  .poistock i.gone { opacity: 0.15; transform: scale(0.7) rotate(20deg); border-style: dashed; }
  .timewrap { flex: 1; margin-left: 16px; height: 7px;
    background: rgba(150,200,230,0.16); border-radius: 999px; overflow: hidden; }
  #timefill { height: 100%; width: 100%;
    background: linear-gradient(90deg,#5fe3c5,#52b6ff);
    transform-origin: left center; transition: transform .15s linear; }

  .overlay {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    padding: 32px; gap: 14px; z-index: 5;
    background: radial-gradient(80% 60% at 50% 45%, rgba(6,18,30,0.34), rgba(6,18,30,0.78));
    transition: opacity .3s;
  }
  .overlay.hide { opacity: 0; pointer-events: none; }
  .title { font-size: 40px; font-weight: 800; letter-spacing: 0.06em;
    background: linear-gradient(180deg,#ffd98a,#ff8d6b);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 3px 12px rgba(255,140,90,0.35)); }
  .romaji { font-size: 13px; letter-spacing: 0.42em; color: #9fc4dc; margin-top: -4px; }
  .how { font-size: 14px; line-height: 1.85; color: #cfe6f5; max-width: 320px; }
  .how b { color: #ffd98a; font-weight: 700; }
  .big { font-size: 56px; font-weight: 800; color: #fff;
    text-shadow: 0 4px 18px rgba(0,0,0,0.5); }
  .sub { font-size: 14px; color: #9fc4dc; }
  .cta {
    margin-top: 8px; font-size: 15px; font-weight: 700; color: #06121e;
    background: linear-gradient(180deg,#ffe6a6,#ffb27a);
    padding: 14px 34px; border-radius: 999px; border: none;
    box-shadow: 0 8px 24px rgba(255,160,90,0.3);
    animation: bob 1.7s ease-in-out infinite;
  }
  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  .credit { position:absolute; bottom: 16px; font-size: 11px; color:#5d809a; letter-spacing:.08em;}
</style>
</head>
<body>
<div id="stage">
  <canvas id="cv"></canvas>

  <div class="hud">
    <a class="back" href="../../index.html">← ギャラリー</a>
    <div class="stat">
      <div class="score" id="score">0</div>
      <div class="best" id="best">BEST 0</div>
    </div>
  </div>

  <div class="botbar">
    <div class="poistock" id="poistock"></div>
    <div class="timewrap"><div id="timefill"></div></div>
  </div>

  <div class="overlay" id="ovStart">
    <div class="title">金魚すくい</div>
    <div class="romaji">KINGYO-SUKUI</div>
    <div class="how">
      画面を<b>押している間</b>はポイが水中。<br>
      金魚の<b>真下にすべり込ませ</b>、<br>
      指を<b>離した瞬間</b>にすくい上げる。<br>
      長く沈め・速く動かすほど紙は破れる。
    </div>
    <button class="cta" id="startBtn">すくいはじめる</button>
    <div class="credit">2026-05-17 · Daily Mini Game</div>
  </div>

  <div class="overlay hide" id="ovEnd">
    <div class="sub" id="endReason">時間切れ</div>
    <div class="big" id="endScore">0</div>
    <div class="sub" id="endBest">BEST 0</div>
    <button class="cta" id="againBtn">もう一度</button>
  </div>
</div>

<script>
(() => {
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  const elScore = document.getElementById('score');
  const elBest  = document.getElementById('best');
  const elTime  = document.getElementById('timefill');
  const elStock = document.getElementById('poistock');
  const ovStart = document.getElementById('ovStart');
  const ovEnd   = document.getElementById('ovEnd');
  const endScore= document.getElementById('endScore');
  const endBest = document.getElementById('endBest');
  const endReason=document.getElementById('endReason');

  let W = 0, H = 0, DPR = 1;
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2.5);
    W = window.innerWidth; H = window.innerHeight;
    cv.width = Math.floor(W * DPR);
    cv.height = Math.floor(H * DPR);
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  const GAME_TIME = 60;
  const POI_STOCK = 3;
  const BEST_KEY = 'kingyo_best_v1';
  let best = +(localStorage.getItem(BEST_KEY) || 0);
  elBest.textContent = 'BEST ' + best;

  const rand = (a, b) => a + Math.random() * (b - a);
  const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
  const TAU = Math.PI * 2;
  function vibe(p){ try { navigator.vibrate && navigator.vibrate(p); } catch(e){} }

  // ---- entities ----
  let fish = [], ripples = [], parts = [], pops = [], lilies = [];
  let poi, state = 'title', score = 0, timeLeft = GAME_TIME, stock = POI_STOCK;
  let shake = 0, flash = 0, elapsed = 0;

  const KINDS = {
    red:    { r: 15, sp: 1.00, pts: 1, col: '#ff5a47', fin: '#ff8a72', weight: 1.0, flee: 0.55 },
    demekin:{ r: 21, sp: 0.62, pts: 2, col: '#2b2f3a', fin: '#555a6b', weight: 1.9, flee: 0.30 },
    gold:   { r: 14, sp: 1.35, pts: 5, col: '#ffd24a', fin: '#fff0b0', weight: 1.1, flee: 1.20 }
  };

  function poiRadius(){ return clamp(Math.min(W, H) * 0.135, 42, 78); }

  function spawnFish(kind) {
    const k = KINDS[kind];
    const margin = 40;
    const x = rand(margin, W - margin);
    const y = rand(H * 0.20, H * 0.86);
    return {
      kind, x, y,
      a: rand(0, TAU),
      sp: rand(34, 46) * k.sp,
      turn: 0, nextTurn: rand(0.5, 1.6),
      wag: rand(0, TAU),
      r: k.r, scared: 0, caught: false, scl: 1
    };
  }

  function makeLilies() {
    lilies = [];
    const n = 3;
    for (let i = 0; i < n; i++) {
      lilies.push({ x: rand(0.12, 0.88) * W, y: rand(0.20, 0.80) * H,
        r: rand(34, 52), a: rand(0, TAU) });
    }
  }

  function resetGame() {
    fish = []; ripples = []; parts = []; pops = [];
    score = 0; timeLeft = GAME_TIME; stock = POI_STOCK;
    shake = 0; flash = 0; elapsed = 0;
    makeLilies();
    const start = ['red','red','red','demekin','red','gold','red','demekin'];
    start.forEach(k => fish.push(spawnFish(k)));
    poi = { x: W/2, y: H*0.62, vx:0, vy:0, sub:false, tear:0, alive:true,
            px:W/2, py:H*0.62, ripT:0, born: 0 };
    updateStock();
    elScore.textContent = '0';
    elTime.style.transform = 'scaleX(1)';
  }

  function updateStock() {
    elStock.innerHTML = '';
    for (let i = 0; i < POI_STOCK; i++) {
      const d = document.createElement('i');
      if (i >= stock) d.className = 'gone';
      elStock.appendChild(d);
    }
  }

  // ---- effects ----
  function ripple(x, y, r0, r1, col, life) {
    ripples.push({ x, y, r: r0, r1, col: col || 'rgba(180,225,255,', t: 0, life: life || 0.7 });
  }
  function splash(x, y, n, col) {
    for (let i = 0; i < n; i++) {
      const a = rand(0, TAU), s = rand(70, 260);
      parts.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s - rand(40,140),
        g: 520, t: 0, life: rand(0.4, 0.9), col, r: rand(2, 5) });
    }
  }
  function pop(x, y, txt, col, big) {
    pops.push({ x, y, txt, col, t: 0, life: big ? 1.1 : 0.85, big: !!big });
  }

  // ---- input ----
  let activeId = null;
  function pt(e) {
    const t = (e.touches && e.touches[0]) || e;
    return { x: t.clientX, y: t.clientY };
  }
  function down(e) {
    e.preventDefault();
    if (state !== 'play') return;
    if (activeId !== null) return;
    activeId = (e.pointerId != null) ? e.pointerId : 1;
    const p = pt(e);
    poi.px = p.x; poi.py = p.y;
    poi.sub = true; poi.born = elapsed;
    ripple(p.x, p.y, poiRadius()*0.5, poiRadius()*2.2, 'rgba(150,215,255,', 0.65);
    vibe(8);
  }
  function move(e) {
    e.preventDefault();
    if (state !== 'play' || !poi.sub) return;
    const p = pt(e);
    poi.px = p.x; poi.py = p.y;
  }
  function up(e) {
    e.preventDefault();
    if (state !== 'play') { activeId = null; return; }
    if (!poi.sub) { activeId = null; return; }
    activeId = null;
    poi.sub = false;
    doScoop();
  }
  cv.addEventListener('pointerdown', down, { passive:false });
  cv.addEventListener('pointermove', move, { passive:false });
  window.addEventListener('pointerup', up, { passive:false });
  window.addEventListener('pointercancel', up, { passive:false });
  // touch fallback
  cv.addEventListener('touchstart', e => { if (window.PointerEvent) return; down(e); }, { passive:false });
  cv.addEventListener('touchmove',  e => { if (window.PointerEvent) return; move(e); }, { passive:false });
  window.addEventListener('touchend',e => { if (window.PointerEvent) return; up(e); }, { passive:false });

  function doScoop() {
    if (!poi.alive) return;
    const R = poiRadius() * 0.92;
    const got = [];
    for (const f of fish) {
      if (f.caught) continue;
      const d = Math.hypot(f.x - poi.x, f.y - poi.y);
      if (d < R - f.r * 0.35) got.push(f);
    }
    // strain: lifting costs paper depending on the catch
    let strain = 6;
    for (const f of got) strain += KINDS[f.kind].weight * 6;
    poi.tear += strain;

    if (got.length === 0) {
      ripple(poi.x, poi.y, R*0.6, R*1.7, 'rgba(150,210,255,', 0.6);
      if (poi.tear >= 100) tearPoi();
      return;
    }

    let gained = 0;
    const mult = got.length;
    for (const f of got) {
      f.caught = true;
      const base = KINDS[f.kind].pts;
      gained += base;
    }
    let total = gained * mult;
    score += total;
    elScore.textContent = score;

    // fly caught fish toward the bowl indicator (top-right)
    splash(poi.x, poi.y, 16 + got.length*5, 'rgba(190,230,255,0.9)');
    ripple(poi.x, poi.y, R*0.7, R*2.4, 'rgba(180,235,255,', 0.8);
    for (const f of got) {
      f.flyT = 0; f.fx = f.x; f.fy = f.y;
    }
    if (mult >= 2) {
      pop(poi.x, poi.y - 36, '×' + mult + ' すくい!', '#ffd98a', true);
      flash = Math.max(flash, 0.4);
      vibe([14, 40, 26]);
    } else {
      pop(poi.x, poi.y - 30, '+' + total, '#dff3ff', false);
      vibe(20);
    }
    if (poi.tear >= 100) tearPoi();
  }

  function tearPoi() {
    poi.alive = false;
    stock--;
    updateStock();
    shake = 1;
    flash = Math.max(flash, 0.65);
    vibe([0, 60, 50, 90]);
    // paper rip particles
    for (let i = 0; i < 30; i++) {
      const a = rand(0, TAU), s = rand(60, 240);
      parts.push({ x: poi.x, y: poi.y, vx: Math.cos(a)*s, vy: Math.sin(a)*s,
        g: 240, t: 0, life: rand(0.6, 1.2), col: 'rgba(244,224,180,0.95)',
        r: rand(3, 7), paper: true, rot: rand(0,TAU), vr: rand(-6,6) });
    }
    pop(poi.x, poi.y - 30, 'ポイが破れた', '#ff7a6a', true);
    if (stock <= 0) {
      setTimeout(() => endGame('ポイがなくなった'), 650);
    } else {
      // new poi after a beat, at last position
      setTimeout(() => {
        if (state !== 'play') return;
        poi.alive = true; poi.tear = 0; poi.sub = false;
        ripple(poi.x, poi.y, 14, poiRadius()*2, 'rgba(255,225,170,', 0.7);
      }, 620);
    }
  }

  // ---- difficulty ----
  function diff() { return clamp(elapsed / GAME_TIME, 0, 1); }

  function maybeSpawn(dt) {
    const target = 7 + Math.floor(diff() * 4);
    const alive = fish.filter(f => !f.caught).length;
    if (alive < target && Math.random() < dt * 1.4) {
      const r = Math.random();
      let kind = 'red';
      if (r < 0.10 + diff()*0.10) kind = 'gold';
      else if (r < 0.34) kind = 'demekin';
      const f = spawnFish(kind);
      // enter from an edge
      const side = Math.floor(rand(0,4));
      if (side===0){ f.x=-30; f.a=rand(-0.6,0.6);}
      else if(side===1){ f.x=W+30; f.a=Math.PI+rand(-0.6,0.6);}
      else if(side===2){ f.y=H*0.16; f.a=rand(0.4,2.7);}
      else { f.y=H*0.9; f.a=rand(-2.7,-0.4);}
      fish.push(f);
    }
  }

  // ---- update ----
  let lastT = performance.now();
  function frame(now) {
    let dt = (now - lastT) / 1000;
    lastT = now;
    dt = Math.min(dt, 0.05);

    if (state === 'play') {
      elapsed += dt;
      timeLeft -= dt;
      elTime.style.transform = 'scaleX(' + clamp(timeLeft / GAME_TIME, 0, 1) + ')';
      if (timeLeft <= 0) { endGame('時間切れ'); }
      update(dt);
    }
    render(dt);
    requestAnimationFrame(frame);
  }

  function update(dt) {
    const D = diff();

    // poi follows finger with springy lag (手触り)
    poi.vx = (poi.px - poi.x) * 0.32;
    poi.vy = (poi.py - poi.y) * 0.32;
    poi.x += poi.vx; poi.y += poi.vy;
    poi.x = clamp(poi.x, 10, W-10);
    poi.y = clamp(poi.y, H*0.12, H-10);
    const speed = Math.hypot(poi.vx, poi.vy) / dt;

    if (poi.alive) {
      if (poi.sub) {
        // soaking + drag tears the wet paper
        const soakRate = 9 + D * 7;
        const dragRate = clamp((speed - 220) / 220, 0, 1) * 26;
        poi.tear += (soakRate + dragRate) * dt;
        poi.ripT += dt;
        if (poi.ripT > 0.16 && speed > 60) {
          poi.ripT = 0;
          ripple(poi.x, poi.y, poiRadius()*0.7, poiRadius()*1.5, 'rgba(150,210,255,', 0.5);
        }
        if (poi.tear >= 100) tearPoi();
      } else {
        // lifted: paper drips & recovers a little
        poi.tear = Math.max(0, poi.tear - 11 * dt);
      }
    }

    maybeSpawn(dt);

    const pr = poiRadius();
    for (const f of fish) {
      if (f.caught) {
        if (f.flyT != null) f.flyT += dt;
        continue;
      }
      const k = KINDS[f.kind];
      f.wag += dt * (7 + f.sp * 0.04);
      f.scared = Math.max(0, f.scared - dt);

      // wandering steer
      f.nextTurn -= dt;
      if (f.nextTurn <= 0) {
        f.turn = rand(-1, 1) * 1.4;
        f.nextTurn = rand(0.5, 1.7);
      }
      f.a += f.turn * dt;

      // flee from a submerged poi
      if (poi.sub && poi.alive) {
        const dx = f.x - poi.x, dy = f.y - poi.y;
        const d = Math.hypot(dx, dy);
        const sense = pr * 2.4;
        if (d < sense) {
          const flee = k.flee * (1 - d / sense);
          const fa = Math.atan2(dy, dx);
          let da = ((fa - f.a + Math.PI*3) % TAU) - Math.PI;
          f.a += da * flee * dt * 6;
          f.scared = 0.5;
        }
      }

      // soft walls
      const m = 26;
      if (f.x < m)      f.a += (0 - f.a) * dt * 3 + dt;
      if (f.x > W - m)  f.a += (Math.PI - f.a) * dt * 3;
      if (f.y < H*0.15) f.a += (Math.abs(Math.sin(f.a))*1.2) * dt * 3 + dt;
      if (f.y > H - m)  f.a -= (Math.abs(Math.sin(f.a))*1.2) * dt * 3;

      const spd = f.sp * (1 + D * 0.9) * (f.scared ? 1.9 : 1);
      f.x += Math.cos(f.a) * spd * dt;
      f.y += Math.sin(f.a) * spd * dt;
      f.x = clamp(f.x, -40, W + 40);
      f.y = clamp(f.y, H*0.13, H + 30);
    }
    // cull fully caught (after fly anim) or far off-screen
    fish = fish.filter(f => {
      if (f.caught && f.flyT != null && f.flyT > 0.55) return false;
      if (f.x < -60 || f.x > W + 60) return false;
      return true;
    });

    for (const r of ripples) r.t += dt;
    ripples = ripples.filter(r => r.t < r.life);
    for (const p of parts) {
      p.t += dt; p.vy += p.g * dt;
      p.x += p.vx * dt; p.y += p.vy * dt;
      if (p.paper) p.rot += p.vr * dt;
    }
    parts = parts.filter(p => p.t < p.life);
    for (const q of pops) { q.t += dt; q.y -= 26 * dt; }
    pops = pops.filter(q => q.t < q.life);

    if (shake > 0) shake = Math.max(0, shake - dt * 3.2);
    if (flash > 0) flash = Math.max(0, flash - dt * 2.0);
  }

  // ---- render ----
  function drawFish(f) {
    const k = KINDS[f.kind];
    let x = f.x, y = f.y, scl = 1, alpha = 1;
    if (f.caught && f.flyT != null) {
      const tt = clamp(f.flyT / 0.55, 0, 1);
      const tx = W - 40, ty = 64;
      x = f.fx + (tx - f.fx) * tt;
      y = f.fy + (ty - f.fy) * tt - Math.sin(tt*Math.PI)*60;
      scl = 1 - tt*0.7; alpha = 1 - tt*0.9;
    }
    ctx.save();
    ctx.globalAlpha = alpha;
    // shadow under water
    ctx.save();
    ctx.translate(x + 5, y + 7);
    ctx.scale(scl, scl);
    ctx.fillStyle = 'rgba(0,12,22,0.30)';
    ctx.beginPath(); ctx.ellipse(0, 0, f.r*1.35, f.r*0.8, f.a, 0, TAU); ctx.fill();
    ctx.restore();

    ctx.translate(x, y);
    ctx.rotate(f.a);
    ctx.scale(scl, scl);

    const wag = Math.sin(f.wag) * 0.5;
    // tail
    ctx.fillStyle = k.fin;
    ctx.globalAlpha = alpha * 0.92;
    ctx.beginPath();
    ctx.moveTo(-f.r*0.7, 0);
    ctx.quadraticCurveTo(-f.r*1.7, -f.r*0.9, -f.r*2.0, -f.r*0.5 + wag*f.r);
    ctx.quadraticCurveTo(-f.r*1.5, 0, -f.r*2.0, f.r*0.5 + wag*f.r);
    ctx.quadraticCurveTo(-f.r*1.7, f.r*0.9, -f.r*0.7, 0);
    ctx.fill();
    ctx.globalAlpha = alpha;

    // body
    const g = ctx.createLinearGradient(-f.r, -f.r, f.r, f.r);
    g.addColorStop(0, k.fin);
    g.addColorStop(0.5, k.col);
    g.addColorStop(1, k.col);
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.ellipse(0, 0, f.r*1.2, f.r*0.74, 0, 0, TAU);
    ctx.fill();

    // top fin
    ctx.fillStyle = k.fin;
    ctx.globalAlpha = alpha * 0.85;
    ctx.beginPath();
    ctx.moveTo(f.r*0.1, -f.r*0.6);
    ctx.quadraticCurveTo(-f.r*0.3, -f.r*1.3 + wag*f.r*0.4, -f.r*0.7, -f.r*0.55);
    ctx.fill();
    ctx.globalAlpha = alpha;

    // eye
    const ey = f.r*0.62;
    if (f.kind === 'demekin') {
      ctx.fillStyle = '#11131a';
      ctx.beginPath(); ctx.arc(f.r*0.62, -f.r*0.20, f.r*0.34, 0, TAU); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(f.r*0.70, -f.r*0.26, f.r*0.10, 0, TAU); ctx.fill();
    } else {
      ctx.fillStyle = '#0c0f16';
      ctx.beginPath(); ctx.arc(f.r*0.66, -f.r*0.16, f.r*0.16, 0, TAU); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.beginPath(); ctx.arc(f.r*0.70, -f.r*0.21, f.r*0.06, 0, TAU); ctx.fill();
    }
    ctx.restore();
  }

  function drawPoi() {
    const R = poiRadius();
    const x = poi.x, y = poi.y;
    const sub = poi.sub && poi.alive;
    const tearN = clamp(poi.tear / 100, 0, 1);

    if (poi.alive) {
      // refraction halo when submerged
      if (sub) {
        const rg = ctx.createRadialGradient(x, y, R*0.4, x, y, R*1.7);
        rg.addColorStop(0, 'rgba(120,200,255,0.10)');
        rg.addColorStop(0.7, 'rgba(110,190,250,0.16)');
        rg.addColorStop(1, 'rgba(110,190,250,0)');
        ctx.fillStyle = rg;
        ctx.beginPath(); ctx.arc(x, y, R*1.7, 0, TAU); ctx.fill();
      }
      // paper disc — soggier (amber) as it tears
      const wet = sub ? 0.55 : 0.30;
      const baseR = 235 - tearN*70, baseG = 226 - tearN*40, baseB = 196 - tearN*120;
      const pg = ctx.createRadialGradient(x-R*0.3, y-R*0.3, R*0.2, x, y, R);
      pg.addColorStop(0, `rgba(255,250,235,${0.16+wet*0.18})`);
      pg.addColorStop(0.75, `rgba(${baseR|0},${baseG|0},${baseB|0},${0.10+wet*0.16})`);
      pg.addColorStop(1, `rgba(${baseR|0},${baseG|0},${baseB|0},0)`);
      ctx.fillStyle = pg;
      ctx.beginPath(); ctx.arc(x, y, R*0.98, 0, TAU); ctx.fill();

      // tear cracks growing from rim
      if (tearN > 0.45) {
        ctx.strokeStyle = `rgba(120,70,40,${(tearN-0.45)*1.5})`;
        ctx.lineWidth = 1.4;
        const cracks = Math.floor((tearN-0.45) * 14);
        for (let i = 0; i < cracks; i++) {
          const a = (i / 7) * TAU + i*0.7;
          const len = R * (0.3 + (tearN-0.45)*0.9);
          ctx.beginPath();
          ctx.moveTo(x + Math.cos(a)*R*0.96, y + Math.sin(a)*R*0.96);
          ctx.lineTo(x + Math.cos(a+0.18)*(R*0.96-len), y + Math.sin(a+0.18)*(R*0.96-len));
          ctx.stroke();
        }
      }

      // bamboo ring — colour shifts with tear gauge (diegetic gauge)
      const gaugeCol = tearN < 0.5
        ? `rgb(${120+tearN*270|0},${225-tearN*40|0},200)`
        : `rgb(255,${225-(tearN-0.5)*350|0},${120-(tearN-0.5)*200|0})`;
      ctx.lineWidth = 5;
      ctx.strokeStyle = 'rgba(225,200,150,0.35)';
      ctx.beginPath(); ctx.arc(x, y, R, 0, TAU); ctx.stroke();
      ctx.strokeStyle = gaugeCol;
      ctx.lineWidth = 5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.arc(x, y, R, -Math.PI/2, -Math.PI/2 + TAU * tearN);
      ctx.stroke();
      ctx.lineCap = 'butt';

      // handle stub
      ctx.strokeStyle = 'rgba(225,200,150,0.6)';
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(x, y + R);
      ctx.lineTo(x, y + R + 26);
      ctx.stroke();
    } else {
      // broken poi: limp dashed ring fading
      ctx.strokeStyle = 'rgba(244,224,180,0.35)';
      ctx.setLineDash([6, 8]);
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(x, y, R*0.8, 0, TAU); ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  function render(dt) {
    ctx.clearRect(0, 0, W, H);

    let sx = 0, sy = 0;
    if (shake > 0) {
      sx = rand(-1,1) * shake * 9;
      sy = rand(-1,1) * shake * 9;
    }
    ctx.save();
    ctx.translate(sx, sy);

    // moving caustic light on the water
    const t = performance.now() / 1000;
    for (let i = 0; i < 3; i++) {
      const cx = W * (0.3 + 0.4*Math.sin(t*0.18 + i*2.1)) ;
      const cy = H * (0.35 + 0.35*Math.cos(t*0.13 + i*1.7));
      const rg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.min(W,H)*0.62);
      rg.addColorStop(0, 'rgba(60,140,200,0.07)');
      rg.addColorStop(1, 'rgba(60,140,200,0)');
      ctx.fillStyle = rg;
      ctx.fillRect(0, 0, W, H);
    }

    // lily pads (ambience)
    for (const lp of lilies) {
      ctx.save();
      ctx.translate(lp.x, lp.y);
      const sw = 1 + Math.sin(t*0.6 + lp.a)*0.03;
      ctx.scale(sw, sw);
      ctx.fillStyle = 'rgba(28,86,70,0.5)';
      ctx.beginPath();
      ctx.arc(0, 0, lp.r, lp.a + 0.4, lp.a + TAU - 0.4);
      ctx.lineTo(0,0);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'rgba(70,150,120,0.25)';
      ctx.lineWidth = 1;
      for (let i=0;i<5;i++){
        ctx.beginPath(); ctx.moveTo(0,0);
        const aa = lp.a + 0.5 + i*((TAU-1)/4);
        ctx.lineTo(Math.cos(aa)*lp.r, Math.sin(aa)*lp.r); ctx.stroke();
      }
      ctx.restore();
    }

    // ripples (under)
    for (const r of ripples) {
      const k = r.t / r.life;
      const rr = r.r + (r.r1 - r.r) * k;
      ctx.strokeStyle = r.col + (0.5 * (1 - k)) + ')';
      ctx.lineWidth = 2 * (1 - k) + 0.5;
      ctx.beginPath(); ctx.arc(r.x, r.y, rr, 0, TAU); ctx.stroke();
    }

    for (const f of fish) drawFish(f);

    if (poi) drawPoi();

    // particles
    for (const p of parts) {
      const k = 1 - p.t / p.life;
      ctx.save();
      if (p.paper) {
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.globalAlpha = k;
        ctx.fillStyle = p.col;
        ctx.fillRect(-p.r, -p.r*0.7, p.r*2, p.r*1.4);
      } else {
        ctx.globalAlpha = k;
        ctx.fillStyle = p.col;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r * (0.4 + k*0.6), 0, TAU); ctx.fill();
      }
      ctx.restore();
    }

    // popups
    for (const q of pops) {
      const k = q.t / q.life;
      ctx.save();
      ctx.globalAlpha = 1 - k*k;
      ctx.fillStyle = q.col;
      ctx.font = (q.big ? 700 : 600) + ' ' + (q.big ? 26 : 19) + 'px -apple-system, system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur = 6;
      ctx.fillText(q.txt, q.x, q.y);
      ctx.restore();
    }

    ctx.restore();

    if (flash > 0) {
      ctx.fillStyle = 'rgba(255,150,90,' + (flash*0.30) + ')';
      ctx.fillRect(0, 0, W, H);
    }

    // bowl indicator (top-right) — shows running tally
    ctx.save();
    ctx.globalAlpha = 0.9;
    ctx.strokeStyle = 'rgba(180,225,255,0.5)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(W - 40, 64, 22, 0.15*Math.PI, 0.85*Math.PI, false);
    ctx.stroke();
    ctx.fillStyle = 'rgba(90,180,235,0.20)';
    ctx.beginPath();
    ctx.arc(W - 40, 64, 20, 0.18*Math.PI, 0.82*Math.PI, false);
    ctx.fill();
    ctx.restore();
  }

  // ---- state ----
  function startGame() {
    resetGame();
    state = 'play';
    ovStart.classList.add('hide');
    ovEnd.classList.add('hide');
    lastT = performance.now();
  }
  function endGame(reason) {
    if (state !== 'play') return;
    state = 'over';
    poi.sub = false;
    if (score > best) {
      best = score;
      localStorage.setItem(BEST_KEY, best);
    }
    elBest.textContent = 'BEST ' + best;
    endScore.textContent = score;
    endBest.textContent = 'BEST ' + best;
    endReason.textContent = reason + ' — すくった金魚';
    ovEnd.classList.remove('hide');
  }

  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('againBtn').addEventListener('click', startGame);

  requestAnimationFrame(frame);
})();
</script>
</body>
