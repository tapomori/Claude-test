<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a0613" />
<title>Ember Vigil</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    width:100%;height:100%;
    background:#0a0613;color:#f6e9c8;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    overflow:hidden;
    touch-action:manipulation;
    -webkit-tap-highlight-color:transparent;
    user-select:none;-webkit-user-select:none;
  }
  #stage{
    position:fixed;inset:0;
    background:
      radial-gradient(120% 70% at 50% 100%, #2a1a32 0%, #120820 45%, #06030d 100%);
    overflow:hidden;
  }
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
  #hud{
    position:absolute;top:0;left:0;right:0;
    padding:14px 18px;
    display:flex;justify-content:space-between;align-items:flex-start;
    pointer-events:none;
    font-variant-numeric:tabular-nums;
    z-index:5;
  }
  #hud .left{display:flex;flex-direction:column;gap:6px;}
  #hud .right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
  .label{
    font-size:11px;letter-spacing:.18em;opacity:.55;text-transform:uppercase;
  }
  .score{font-size:28px;font-weight:600;color:#fbe6a0;text-shadow:0 0 10px #c47a2055;}
  .breath{font-size:13px;opacity:.7;}
  .hearts{display:flex;gap:5px;}
  .heart{
    width:14px;height:14px;
    background:radial-gradient(circle at 35% 30%, #ffaa55, #c84a0a);
    border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
    transform:rotate(-45deg);
    box-shadow:0 0 8px #ff882288;
    transition:opacity .3s, transform .3s;
  }
  .heart.gone{opacity:.12;box-shadow:none;background:#3a2818;}
  #choke-wrap{
    width:90px;height:5px;
    border-radius:3px;
    background:#ffffff14;
    overflow:hidden;
  }
  #choke{
    height:100%;width:0%;
    background:linear-gradient(90deg,#5dd2ff,#3a87ff);
    box-shadow:0 0 8px #4aa8ff66;
    transition:width .12s linear;
  }
  #back{
    position:absolute;left:14px;bottom:14px;
    color:#f6e9c8aa;font-size:12px;letter-spacing:.16em;
    text-decoration:none;padding:8px 12px;
    border:1px solid #ffffff1a;border-radius:20px;
    background:#ffffff08;backdrop-filter:blur(6px);
    pointer-events:auto;z-index:6;
  }
  #hint{
    position:absolute;left:0;right:0;bottom:62px;
    text-align:center;
    color:#f6e9c8aa;font-size:13px;letter-spacing:.18em;
    pointer-events:none;
    animation:fade 2.6s ease-in-out infinite;
    z-index:5;
  }
  @keyframes fade{0%,100%{opacity:.35}50%{opacity:.9}}
  #overlay{
    position:absolute;inset:0;
    display:none;align-items:center;justify-content:center;flex-direction:column;
    background:radial-gradient(circle at 50% 50%, #1a0c2c99, #04020aee);
    z-index:10;text-align:center;padding:24px;
  }
  #overlay.show{display:flex;}
  #overlay h1{
    font-size:28px;letter-spacing:.18em;font-weight:500;
    color:#ffd987;text-shadow:0 0 20px #ff882244;
    margin-bottom:8px;
  }
  #overlay .sub{font-size:13px;letter-spacing:.16em;opacity:.6;margin-bottom:22px;}
  #overlay .final{font-size:54px;font-weight:600;color:#fbe6a0;margin-bottom:4px;text-shadow:0 0 24px #c47a2099;}
  #overlay .meta{font-size:12px;letter-spacing:.18em;opacity:.55;margin-bottom:26px;}
  #overlay button{
    appearance:none;border:none;cursor:pointer;
    padding:14px 28px;border-radius:30px;
    background:linear-gradient(135deg,#ff9a44,#c14a18);
    color:#fff;font-size:14px;letter-spacing:.22em;font-weight:600;
    box-shadow:0 8px 22px #ff771a44, inset 0 1px 0 #ffffff44;
  }
  #overlay button:active{transform:translateY(1px);}
</style>
</head>
<body>
<div id="stage">
  <canvas id="cv"></canvas>
  <div id="hud">
    <div class="left">
      <div class="label">Vigil</div>
      <div class="score" id="score">0</div>
      <div class="breath" id="breath">breath ×1.0</div>
    </div>
    <div class="right">
      <div class="hearts" id="hearts">
        <div class="heart"></div><div class="heart"></div><div class="heart"></div>
      </div>
      <div class="label" style="margin-top:6px;">choke</div>
      <div id="choke-wrap"><div id="choke"></div></div>
    </div>
  </div>
  <div id="hint">TOUCH TO SHIELD &nbsp;·&nbsp; RELEASE TO BREATHE</div>
  <a id="back" href="../../index.html">◂ GALLERY</a>
  <div id="overlay">
    <h1 id="ovTitle">EMBER OUT</h1>
    <div class="sub">the candle has gone</div>
    <div class="final" id="ovScore">0</div>
    <div class="meta" id="ovMeta">longest breath 0.0s</div>
    <button id="restart">RELIGHT</button>
  </div>
</div>
<script>
(() => {
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  let W=0, H=0;

  function resize(){
    W = cv.clientWidth = window.innerWidth;
    H = cv.clientHeight = window.innerHeight;
    cv.width = W * dpr; cv.height = H * dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  // ---- game state ----
  let state;
  function reset(){
    state = {
      t:0,                      // elapsed seconds
      score:0,
      hp:3,
      flame:0.55,               // 0.2 ~ 1.4
      choke:0,                  // 0 ~ 1
      held:false,
      touchX:W/2, touchY:H*0.62,
      lastHitAt:-99,
      lastBreathStart:0,
      breathStreak:0,
      bestBreath:0,
      multiplier:1.0,
      hintAt:0,                 // when last "perfect guard" flash happened
      winds:[],
      particles:[],
      sparks:[],
      smoke:[],
      embers:[],
      shake:0,
      flicker:0,
      gameOver:false,
      nextWindAt:1.6,
      windCount:0,
      shieldPulse:0,
    };
    spawnAmbientEmbers(14);
    updateHUD();
    overlay.classList.remove('show');
    hint.style.display = '';
  }

  function spawnAmbientEmbers(n){
    for(let i=0;i<n;i++){
      state.embers.push({
        x:Math.random()*W, y:H*0.4 + Math.random()*H*0.6,
        vx:(Math.random()-0.5)*8, vy:-10 - Math.random()*16,
        r:Math.random()*1.2 + 0.4,
        life:Math.random()*4 + 2, age:0,
      });
    }
  }

  // ---- candle ----
  function candlePos(){
    return { x: W*0.5, y: H*0.66 };
  }

  // ---- winds ----
  // wind = {dir: 'L'|'R'|'T'|'B', telegraphAt, impactAt, endAt, strength, hit:false}
  function scheduleWind(){
    const t = state.t;
    const dirs = ['L','R','L','R','T'];
    if(state.windCount > 8) dirs.push('B');
    const dir = dirs[(Math.random()*dirs.length)|0];

    // pacing: every 1.8s -> 0.9s
    const base = Math.max(0.9, 1.9 - state.windCount*0.06);
    const jitter = 0.35;
    state.nextWindAt = t + base + (Math.random()-0.5)*jitter;

    const telegraph = Math.max(0.45, 0.78 - state.windCount*0.012);
    const strength = Math.min(1.6, 0.7 + state.windCount*0.04);

    state.winds.push({
      dir, strength,
      telegraphAt: state.nextWindAt - telegraph,
      impactAt: state.nextWindAt,
      endAt: state.nextWindAt + 0.32,
      hit:false, scored:false,
    });
    state.windCount++;
  }

  // ---- input ----
  function getXY(e){
    if(e.touches && e.touches[0]) return [e.touches[0].clientX, e.touches[0].clientY];
    if(e.changedTouches && e.changedTouches[0]) return [e.changedTouches[0].clientX, e.changedTouches[0].clientY];
    return [e.clientX, e.clientY];
  }

  function onDown(e){
    if(state.gameOver) return;
    e.preventDefault();
    const [x,y] = getXY(e);
    state.touchX = x; state.touchY = y;
    if(!state.held){
      state.held = true;
      state.lastBreathDuration = state.t - state.lastBreathStart;
      if(state.lastBreathDuration > state.bestBreath) state.bestBreath = state.lastBreathDuration;
      state.shieldPulse = 1;
    }
    hint.style.display = 'none';
  }
  function onMove(e){
    if(!state.held) return;
    e.preventDefault();
    const [x,y] = getXY(e);
    state.touchX = x; state.touchY = y;
  }
  function onUp(e){
    if(state.gameOver) return;
    e.preventDefault();
    if(state.held){
      state.held = false;
      state.lastBreathStart = state.t;
    }
  }
  cv.addEventListener('pointerdown', onDown);
  cv.addEventListener('pointermove', onMove);
  cv.addEventListener('pointerup',   onUp);
  cv.addEventListener('pointercancel', onUp);
  cv.addEventListener('pointerleave', onUp);
  // fallback touch
  cv.addEventListener('touchstart', onDown, {passive:false});
  cv.addEventListener('touchmove',  onMove, {passive:false});
  cv.addEventListener('touchend',   onUp,   {passive:false});

  // ---- shield region check ----
  function shieldCovers(wind){
    if(!state.held) return false;
    const c = candlePos();
    const dx = state.touchX - c.x;
    const dy = state.touchY - c.y;
    const dist = Math.hypot(dx, dy);
    // must be near candle within ~120px
    if(dist > 170) return false;
    // angle from candle to touch
    const ang = Math.atan2(dy, dx); // -pi..pi
    // wind direction angle (angle FROM which wind comes)
    const wAng = ({
      L: Math.PI,    // wind from left → shield must be left of candle (cos<0)
      R: 0,
      T: -Math.PI/2, // wind from top → shield above candle
      B: Math.PI/2,
    })[wind.dir];
    // angular distance
    let d = Math.abs(ang - wAng);
    if(d > Math.PI) d = 2*Math.PI - d;
    return d < Math.PI/2.6; // ~70° cone
  }

  // ---- update ----
  function vibrate(ms){
    if(navigator.vibrate) try{navigator.vibrate(ms);}catch(_){}
  }

  function update(dt){
    if(state.gameOver) return;
    state.t += dt;
    state.flicker += dt;

    // schedule winds
    if(state.t >= state.nextWindAt){
      scheduleWind();
    }

    // resolve winds
    for(const w of state.winds){
      if(!w.hit && state.t >= w.impactAt){
        w.hit = true;
        const covered = shieldCovers(w);
        if(covered){
          // perfect guard bonus
          state.score += Math.round(40 + 10*w.strength);
          state.shieldPulse = 1;
          state.hintAt = state.t;
          spawnDeflect(w);
          vibrate(15);
        } else {
          // hit
          state.flame = Math.max(0.18, state.flame - 0.32 - w.strength*0.05);
          state.shake = 16 + 6*w.strength;
          state.hp -= 1;
          spawnGust(w, true);
          vibrate(60);
          state.breathStreak = 0;
          state.multiplier = 1.0;
          if(state.hp <= 0) endGame();
        }
      }
    }
    state.winds = state.winds.filter(w => state.t < w.endAt + 0.4);

    // flame growth / suffocation
    if(state.held){
      // shielding suppresses flame slowly, builds choke
      state.flame = Math.max(0.30, state.flame - dt*0.12);
      state.choke = Math.min(1, state.choke + dt*0.18);
      if(state.choke >= 1){
        // suffocate
        state.flame = Math.max(0.18, state.flame - dt*0.6);
        if(state.flame <= 0.20){
          state.hp = 0; endGame();
        }
      }
    } else {
      // breathing: flame grows
      const growRate = 0.18 + Math.min(0.25, (state.t - state.lastBreathStart)*0.06);
      state.flame = Math.min(1.45, state.flame + dt*growRate);
      state.choke = Math.max(0, state.choke - dt*0.42);
      // multiplier grows with breath streak time
      state.breathStreak = state.t - state.lastBreathStart;
      state.multiplier = 1 + Math.min(2.0, state.breathStreak * 0.25);
      // score accrual
      state.score += dt * 12 * state.flame * state.multiplier;
    }

    if(state.flame < 0.22 && state.hp <= 0){ /* handled */ }

    // shake decay
    state.shake *= Math.pow(0.001, dt);
    state.shieldPulse = Math.max(0, state.shieldPulse - dt*2.2);

    // embers ambient
    for(const e of state.embers){
      e.age += dt;
      e.x += e.vx*dt;
      e.y += e.vy*dt;
      e.vy -= 6*dt;
      if(e.age > e.life){
        e.x = Math.random()*W;
        e.y = H*0.95;
        e.vx = (Math.random()-0.5)*8;
        e.vy = -10 - Math.random()*20;
        e.age = 0;
        e.life = Math.random()*4 + 2;
      }
    }

    // sparks decay
    for(const s of state.sparks){
      s.age += dt;
      s.x += s.vx*dt;
      s.y += s.vy*dt;
      s.vy += 120*dt;
    }
    state.sparks = state.sparks.filter(s => s.age < s.life);

    // smoke
    for(const s of state.smoke){
      s.age += dt;
      s.x += s.vx*dt;
      s.y += s.vy*dt;
      s.vy -= 8*dt;
    }
    state.smoke = state.smoke.filter(s => s.age < s.life);

    // particles (gust)
    for(const p of state.particles){
      p.age += dt;
      p.x += p.vx*dt;
      p.y += p.vy*dt;
    }
    state.particles = state.particles.filter(p => p.age < p.life);

    updateHUD();
  }

  function spawnDeflect(w){
    const c = candlePos();
    // sparks spraying away from candle in wind's "from" direction
    const ang = ({L: Math.PI, R:0, T:-Math.PI/2, B: Math.PI/2})[w.dir];
    for(let i=0;i<22;i++){
      const a = ang + (Math.random()-0.5)*1.6;
      const sp = 140 + Math.random()*260;
      state.sparks.push({
        x:c.x + Math.cos(ang)*40, y:c.y + Math.sin(ang)*40 - 10,
        vx:Math.cos(a)*sp, vy:Math.sin(a)*sp - 40,
        r:Math.random()*2 + 1,
        life:0.45 + Math.random()*0.35, age:0,
        color: Math.random()<0.7 ? '#ffd28a' : '#ffe9b0',
      });
    }
  }

  function spawnGust(w, hit){
    const c = candlePos();
    const ang = ({L: Math.PI, R:0, T:-Math.PI/2, B: Math.PI/2})[w.dir];
    // particles streaming inwards
    for(let i=0;i<40;i++){
      const offset = (Math.random()-0.5)*180;
      const startDist = 240;
      let sx = c.x - Math.cos(ang)*startDist;
      let sy = c.y - Math.sin(ang)*startDist - 30;
      // perpendicular
      sx += -Math.sin(ang)*offset;
      sy +=  Math.cos(ang)*offset;
      const sp = 280 + Math.random()*220;
      state.particles.push({
        x:sx, y:sy,
        vx: Math.cos(ang)*sp, vy: Math.sin(ang)*sp,
        r: Math.random()*1.6+0.6,
        life: 0.7, age:0,
        color:'#dde6ff',
      });
    }
    if(hit){
      // smoke puff
      for(let i=0;i<14;i++){
        state.smoke.push({
          x:c.x + (Math.random()-0.5)*16,
          y:c.y - 20 - Math.random()*10,
          vx:(Math.random()-0.5)*30,
          vy:-20 - Math.random()*30,
          r: 6 + Math.random()*8,
          life: 1.2 + Math.random()*0.6, age:0,
        });
      }
    }
  }

  function endGame(){
    state.gameOver = true;
    state.hp = 0;
    // big smoke
    const c = candlePos();
    for(let i=0;i<60;i++){
      state.smoke.push({
        x:c.x + (Math.random()-0.5)*20,
        y:c.y - 30 - Math.random()*10,
        vx:(Math.random()-0.5)*60,
        vy:-30 - Math.random()*60,
        r:8 + Math.random()*12,
        life:1.8 + Math.random()*1.2, age:0,
      });
    }
    vibrate([60,40,120]);
    setTimeout(() => {
      document.getElementById('ovScore').textContent = Math.floor(state.score);
      document.getElementById('ovMeta').textContent =
        'longest breath ' + state.bestBreath.toFixed(1) + 's';
      overlay.classList.add('show');
    }, 750);
  }

  // ---- render ----
  function draw(){
    const c = candlePos();
    const shakeX = (Math.random()-0.5) * state.shake;
    const shakeY = (Math.random()-0.5) * state.shake;

    ctx.clearRect(0,0,W,H);

    // dark vignette pulse with flame
    const glow = ctx.createRadialGradient(c.x, c.y-50, 30, c.x, c.y-50, 360 + state.flame*120);
    glow.addColorStop(0, `rgba(255,170,80,${0.20 + state.flame*0.18})`);
    glow.addColorStop(0.5, `rgba(120,40,60,${0.05 + state.flame*0.05})`);
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0,0,W,H);

    // ambient embers
    for(const e of state.embers){
      const k = 1 - e.age/e.life;
      ctx.globalAlpha = Math.max(0, k) * 0.7;
      ctx.fillStyle = '#ffb56a';
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.r, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // wind telegraph arrows
    for(const w of state.winds){
      if(state.t >= w.telegraphAt && state.t < w.impactAt){
        const k = (state.t - w.telegraphAt) / (w.impactAt - w.telegraphAt);
        drawTelegraph(w, k, c);
      }
    }

    // gust particles (background)
    for(const p of state.particles){
      const k = 1 - p.age/p.life;
      ctx.globalAlpha = k*0.7;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // candle
    ctx.save();
    ctx.translate(shakeX, shakeY);

    // candle body
    const cw = 38, ch = 130;
    const cx = c.x, cy = c.y;
    // base shadow
    ctx.fillStyle = '#00000055';
    ctx.beginPath();
    ctx.ellipse(cx, cy + ch/2 + 8, cw*1.4, 8, 0, 0, Math.PI*2);
    ctx.fill();

    // wax body gradient
    const wax = ctx.createLinearGradient(cx-cw/2, cy, cx+cw/2, cy);
    wax.addColorStop(0,'#3a2a1a');
    wax.addColorStop(0.45,'#d9b07a');
    wax.addColorStop(0.55,'#f1d29a');
    wax.addColorStop(1,'#5b3f24');
    ctx.fillStyle = wax;
    roundRect(cx-cw/2, cy-ch/2, cw, ch, 6);
    ctx.fill();
    // top oval
    ctx.fillStyle = '#a87a4a';
    ctx.beginPath();
    ctx.ellipse(cx, cy-ch/2, cw/2, 5, 0, 0, Math.PI*2);
    ctx.fill();

    // wick
    ctx.strokeStyle = '#2a1a0a';
    ctx.lineWidth = 2.4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx, cy-ch/2);
    ctx.lineTo(cx, cy-ch/2-10);
    ctx.stroke();

    // flame
    drawFlame(cx, cy-ch/2-8, state.flame);

    ctx.restore();

    // smoke
    for(const s of state.smoke){
      const k = 1 - s.age/s.life;
      ctx.globalAlpha = k*0.35;
      ctx.fillStyle = '#cbd6e8';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r*(0.5+s.age*0.6), 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // sparks (deflect)
    for(const s of state.sparks){
      const k = 1 - s.age/s.life;
      ctx.globalAlpha = k;
      ctx.fillStyle = s.color;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r*k, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // shield (palm)
    if(state.held){
      drawShield(state.touchX, state.touchY);
    }
  }

  function roundRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function drawFlame(x, y, size){
    // size is roughly 0.2 .. 1.45
    const h = 60 * size;
    const w = 22 * (0.7 + size*0.5);
    const flick = Math.sin(state.flicker*22)*1.6 + Math.sin(state.flicker*37)*0.9;

    // outer glow
    const g = ctx.createRadialGradient(x, y - h*0.4, 4, x, y - h*0.4, 90*size);
    g.addColorStop(0, 'rgba(255,210,120,0.55)');
    g.addColorStop(0.5, 'rgba(255,120,40,0.18)');
    g.addColorStop(1, 'rgba(255,120,40,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(x, y - h*0.4, 90*size, 0, Math.PI*2);
    ctx.fill();

    // outer flame
    ctx.fillStyle = '#ff7a22';
    ctx.beginPath();
    ctx.moveTo(x - w*0.5, y);
    ctx.quadraticCurveTo(x - w*0.7 + flick*0.5, y - h*0.5, x + flick*0.3, y - h);
    ctx.quadraticCurveTo(x + w*0.7 - flick*0.5, y - h*0.5, x + w*0.5, y);
    ctx.quadraticCurveTo(x, y + 5, x - w*0.5, y);
    ctx.fill();

    // mid flame
    ctx.fillStyle = '#ffc24a';
    ctx.beginPath();
    ctx.moveTo(x - w*0.32, y - 2);
    ctx.quadraticCurveTo(x - w*0.45, y - h*0.5, x + flick*0.5, y - h*0.85);
    ctx.quadraticCurveTo(x + w*0.45, y - h*0.5, x + w*0.32, y - 2);
    ctx.quadraticCurveTo(x, y + 2, x - w*0.32, y - 2);
    ctx.fill();

    // inner flame (hot)
    ctx.fillStyle = '#fff6c0';
    ctx.beginPath();
    ctx.moveTo(x - w*0.18, y - 4);
    ctx.quadraticCurveTo(x - w*0.22, y - h*0.45, x + flick*0.3, y - h*0.6);
    ctx.quadraticCurveTo(x + w*0.22, y - h*0.45, x + w*0.18, y - 4);
    ctx.quadraticCurveTo(x, y, x - w*0.18, y - 4);
    ctx.fill();
  }

  function drawTelegraph(w, k, c){
    // k: 0..1 progress
    const ang = ({L: Math.PI, R:0, T:-Math.PI/2, B: Math.PI/2})[w.dir];
    const dist = 220 - k*40;
    const tx = c.x - Math.cos(ang)*dist;
    const ty = c.y - Math.sin(ang)*dist - 30;
    // arrow chevrons
    ctx.save();
    ctx.translate(tx, ty);
    ctx.rotate(ang);
    const pulse = 0.4 + Math.sin(k*Math.PI*4)*0.3 + k*0.5;
    ctx.globalAlpha = Math.min(1, pulse);
    ctx.strokeStyle = '#9bb6ff';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    for(let i=0;i<3;i++){
      const off = i*16 + k*30;
      ctx.beginPath();
      ctx.moveTo(off - 10, -8);
      ctx.lineTo(off,        0);
      ctx.lineTo(off - 10,   8);
      ctx.stroke();
    }
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  function drawShield(x, y){
    const pulse = 1 + state.shieldPulse*0.4;
    const r = 70 * pulse;
    // soft glow ring
    const g = ctx.createRadialGradient(x, y, r*0.2, x, y, r);
    g.addColorStop(0, 'rgba(180,230,255,0.35)');
    g.addColorStop(0.6, 'rgba(120,170,255,0.18)');
    g.addColorStop(1, 'rgba(80,120,255,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fill();

    // ring outline
    ctx.strokeStyle = `rgba(190,220,255,${0.6 - state.choke*0.4})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x, y, 54, 0, Math.PI*2);
    ctx.stroke();

    // palm silhouette (stylized)
    ctx.fillStyle = 'rgba(20,15,30,0.55)';
    ctx.beginPath();
    ctx.ellipse(x, y+4, 28, 36, 0, 0, Math.PI*2);
    ctx.fill();
    // fingers
    ctx.fillStyle = 'rgba(20,15,30,0.55)';
    for(let i=0;i<4;i++){
      const fx = x - 18 + i*12;
      ctx.beginPath();
      ctx.ellipse(fx, y - 22, 5, 14, 0, 0, Math.PI*2);
      ctx.fill();
    }
    // thumb
    ctx.beginPath();
    ctx.ellipse(x + 26, y + 2, 8, 16, -0.5, 0, Math.PI*2);
    ctx.fill();
  }

  // ---- HUD ----
  const scoreEl = document.getElementById('score');
  const breathEl = document.getElementById('breath');
  const heartsEl = document.getElementById('hearts');
  const chokeEl = document.getElementById('choke');
  const overlay = document.getElementById('overlay');
  const hint = document.getElementById('hint');

  function updateHUD(){
    scoreEl.textContent = Math.floor(state.score);
    breathEl.textContent = 'breath ×' + state.multiplier.toFixed(2);
    chokeEl.style.width = (state.choke*100).toFixed(1) + '%';
    const hs = heartsEl.querySelectorAll('.heart');
    hs.forEach((h,i) => {
      h.classList.toggle('gone', i >= state.hp);
    });
  }

  document.getElementById('restart').addEventListener('click', () => {
    reset();
  });

  // ---- main loop ----
  let lastT = performance.now();
  function loop(t){
    const dt = Math.min(0.05, (t-lastT)/1000);
    lastT = t;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }
  reset();
  requestAnimationFrame(loop);

  // start breath baseline
  state.lastBreathStart = 0;
})();
</script>
</body>
</html>
