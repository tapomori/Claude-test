<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Iro 色</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; background:#0a0710;
    touch-action:manipulation; -webkit-tap-highlight-color:transparent;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif; }
  #c { display:block; width:100vw; height:100vh; touch-action:none; }
  #back { position:fixed; top:env(safe-area-inset-top,8px); left:10px; z-index:10;
    color:#9a8fb5; text-decoration:none; font-size:15px; padding:8px 10px;
    background:rgba(20,14,30,.5); border-radius:12px; backdrop-filter:blur(4px); }
  #back:active { color:#fff; }
</style>
</head>
<body>
<a id="back" href="../../index.html">&larr; 戻る</a>
<canvas id="c"></canvas>
<script>
(function(){
"use strict";
var cv = document.getElementById("c");
var ctx = cv.getContext("2d");
var W=0,H=0,DPR=1;

function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2.5);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W*DPR; cv.height = H*DPR;
  cv.style.width = W+"px"; cv.style.height = H+"px";
  ctx.setTransform(DPR,0,0,DPR,0,0);
  layout();
}
window.addEventListener("resize", resize);

// ---- palette (dye pigments) ----
var PIG = [
  { n:"藍", c:[40,92,200] },
  { n:"紅", c:[222,42,72] },
  { n:"黄", c:[246,202,46] },
  { n:"白", c:[244,244,250] }
];
var BASE = [224,228,236];   // 水 / undyed
var K = 0.30;               // how much one drop pulls toward a pigment

// ---- layout ----
var bowl={x:0,y:0,r:0}, target={x:0,y:0,r:0}, rinse={x:0,y:0,w:0,h:0}, btn=[];
function layout(){
  bowl.x=W/2; bowl.y=H*0.40; bowl.r=Math.min(W,H)*0.235;
  target.x=W/2; target.y=H*0.135; target.r=Math.min(W,H)*0.082;
  rinse.w=W*0.30; rinse.h=Math.max(40,H*0.058);
  rinse.x=W/2; rinse.y=H*0.645;
  var rb=Math.min(W*0.105,46), gap=(W-rb*2*4)/5;
  btn=[];
  for(var i=0;i<4;i++){
    btn.push({ x:gap+rb+i*(rb*2+gap), y:H*0.84, r:rb, p:PIG[i] });
  }
}

// ---- state ----
var GS_PLAY=0, GS_OVER=1;
var state, score, timeLeft, combo, level;
var cur, tgt, tgtSteps;
var startTime, lastMs;
var drops=[], ripples=[], parts=[], floats=[];
var bowlPulse=0, swirlPhase=0, swirlSpd=0.5, flash=0;

function vib(p){ if(navigator.vibrate){ try{navigator.vibrate(p);}catch(e){} } }

function makeTarget(){
  var c=BASE.slice();
  var steps = 2 + Math.min(5, Math.floor(level/2));
  var seq=[], last=-1;
  for(var i=0;i<steps;i++){
    var k; do{ k=Math.floor(Math.random()*4); }while(k===last && Math.random()<0.6);
    last=k;
    var pg=PIG[k].c;
    c=[ c[0]+(pg[0]-c[0])*K, c[1]+(pg[1]-c[1])*K, c[2]+(pg[2]-c[2])*K ];
    seq.push(k);
  }
  tgt=c; tgtSteps=steps;
}

function dist(a,b){
  var dr=a[0]-b[0], dg=a[1]-b[1], db=a[2]-b[2];
  return Math.sqrt(0.30*dr*dr + 0.59*dg*dg + 0.11*db*db);
}
function tol(){ return Math.max(15, 27 - level*1.1); }
function nearness(){ // 0..1 for the ring
  var d=dist(cur,tgt);
  return Math.max(0, Math.min(1, 1 - d/170));
}

function reset(){
  state=GS_PLAY; score=0; timeLeft=60; combo=0; level=1;
  cur=BASE.slice(); drops=[]; ripples=[]; parts=[]; floats=[];
  makeTarget();
  startTime=performance.now(); lastMs=startTime;
}

function addDrop(b){
  // animated droplet from button to bowl
  drops.push({ x:b.x, y:b.y, c:b.p.c.slice(), t:0,
    sx:b.x, sy:b.y, ex:bowl.x, ey:bowl.y-bowl.r*0.15 });
  vib(8);
}
function applyPigment(c){
  cur=[ cur[0]+(c[0]-cur[0])*K, cur[1]+(c[1]-cur[1])*K, cur[2]+(c[2]-cur[2])*K ];
  ripples.push({ r:bowl.r*0.15, a:0.6 });
  bowlPulse=1; swirlSpd=2.4;
  checkMatch();
}
function rinseBowl(){
  cur=BASE.slice();
  ripples.push({ r:bowl.r*0.1, a:0.5 });
  combo=0; swirlSpd=1.8; vib(14);
}

function checkMatch(){
  if(dist(cur,tgt) < tol()){
    var d=dist(cur,tgt);
    var acc = Math.round((1 - d/tol())*60);          // closeness bonus
    var cmb = combo;
    var gain = 100 + acc + cmb*25;
    score += gain; combo++; level++;
    timeLeft = Math.min(60, timeLeft + 2 + Math.min(3,cmb));
    floats.push({ x:bowl.x, y:bowl.y-bowl.r*0.4, t:0, s:"+"+gain });
    burst(bowl.x, bowl.y, cur);
    bowlPulse=1.4; flash=0.5; swirlSpd=3.2;
    vib([0,18,40,22]);
    cur=BASE.slice();
    makeTarget();
  }
}

function burst(x,y,col){
  for(var i=0;i<26;i++){
    var a=Math.random()*Math.PI*2, sp=2+Math.random()*4.5;
    parts.push({ x:x,y:y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
      life:1, col:col.slice(), sz:2+Math.random()*3 });
  }
}

// ---- input ----
function pt(e){
  var t=e.touches&&e.touches[0]?e.touches[0]:e;
  var rc=cv.getBoundingClientRect();
  return { x:t.clientX-rc.left, y:t.clientY-rc.top };
}
function onDown(e){
  if(e.target && e.target.id==="back") return;
  e.preventDefault();
  var p=pt(e);
  if(state===GS_OVER){ reset(); return; }
  // pigment buttons
  for(var i=0;i<btn.length;i++){
    var b=btn[i], dx=p.x-b.x, dy=p.y-b.y;
    if(dx*dx+dy*dy < (b.r+8)*(b.r+8)){ b.press=1; addDrop(b); return; }
  }
  // rinse
  if(Math.abs(p.x-rinse.x)<rinse.w/2 && Math.abs(p.y-rinse.y)<rinse.h/2){
    rinse.press=1; rinseBowl(); return;
  }
}
cv.addEventListener("touchstart", onDown, {passive:false});
cv.addEventListener("mousedown", onDown, {passive:false});

// ---- helpers ----
function rgb(c){ return "rgb("+(c[0]|0)+","+(c[1]|0)+","+(c[2]|0)+")"; }
function rgba(c,a){ return "rgba("+(c[0]|0)+","+(c[1]|0)+","+(c[2]|0)+","+a+")"; }
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x-w/2+r,y-h/2);
  ctx.arcTo(x+w/2,y-h/2,x+w/2,y+h/2,r);
  ctx.arcTo(x+w/2,y+h/2,x-w/2,y+h/2,r);
  ctx.arcTo(x-w/2,y+h/2,x-w/2,y-h/2,r);
  ctx.arcTo(x-w/2,y-h/2,x+w/2,y-h/2,r);
  ctx.closePath();
}

// ---- update ----
function update(dt){
  if(state===GS_PLAY){
    timeLeft -= dt;
    if(timeLeft<=0){ timeLeft=0; state=GS_OVER; vib([0,30,60,30,60,80]); }
  }
  swirlPhase += swirlSpd*dt;
  swirlSpd += (0.5-swirlSpd)*Math.min(1,dt*2);
  bowlPulse += (0 - bowlPulse)*Math.min(1,dt*5);
  flash += (0 - flash)*Math.min(1,dt*3);

  for(var i=drops.length-1;i>=0;i--){
    var d=drops[i]; d.t += dt*2.4;
    if(d.t>=1){ applyPigment(d.c); drops.splice(i,1); }
  }
  for(var i=ripples.length-1;i>=0;i--){
    var r=ripples[i]; r.r += dt*bowl.r*2.4; r.a -= dt*1.3;
    if(r.a<=0) ripples.splice(i,1);
  }
  for(var i=parts.length-1;i>=0;i--){
    var p=parts[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; p.vx*=0.97;
    p.life -= dt*1.4;
    if(p.life<=0) parts.splice(i,1);
  }
  for(var i=floats.length-1;i>=0;i--){
    var f=floats[i]; f.t+=dt; f.y-=dt*46;
    if(f.t>1.2) floats.splice(i,1);
  }
  for(var i=0;i<btn.length;i++){ if(btn[i].press) btn[i].press*=0.82; if(btn[i].press<0.03)btn[i].press=0; }
  if(rinse.press){ rinse.press*=0.82; if(rinse.press<0.03)rinse.press=0; }
}

// ---- draw ----
function draw(){
  // background
  var bg=ctx.createRadialGradient(W/2,H*0.4,0,W/2,H*0.4,Math.max(W,H)*0.8);
  bg.addColorStop(0,"#160f22"); bg.addColorStop(1,"#080510");
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // ---- target swatch ----
  ctx.save();
  ctx.font="600 13px sans-serif"; ctx.textAlign="center"; ctx.fillStyle="#7d7196";
  ctx.fillText("目標の色", target.x, target.y-target.r-12);
  ctx.beginPath(); ctx.arc(target.x,target.y,target.r+6,0,Math.PI*2);
  ctx.strokeStyle="rgba(255,255,255,.10)"; ctx.lineWidth=2; ctx.stroke();
  var tg=ctx.createRadialGradient(target.x-target.r*0.3,target.y-target.r*0.3,1,target.x,target.y,target.r);
  tg.addColorStop(0, rgba(tgt,1));
  tg.addColorStop(1, rgb([tgt[0]*0.7,tgt[1]*0.7,tgt[2]*0.7]));
  ctx.fillStyle=tg;
  ctx.beginPath(); ctx.arc(target.x,target.y,target.r,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // ---- HUD ----
  ctx.textAlign="left"; ctx.fillStyle="#cdbfe6"; ctx.font="700 20px sans-serif";
  ctx.fillText(score, 14, target.y+6);
  ctx.textAlign="right"; ctx.font="700 20px sans-serif";
  ctx.fillStyle = timeLeft<10 ? "#ff6f8b" : "#cdbfe6";
  ctx.fillText(Math.ceil(timeLeft)+"s", W-14, target.y+6);
  if(combo>1){
    ctx.textAlign="center"; ctx.fillStyle="#ffd36b"; ctx.font="700 16px sans-serif";
    ctx.fillText(combo+" れんさ", bowl.x, bowl.y+bowl.r+46);
  }

  // ---- closeness ring ----
  var nz=nearness();
  ctx.beginPath();
  ctx.arc(bowl.x,bowl.y,bowl.r+15,-Math.PI/2,-Math.PI/2+Math.PI*2*nz);
  ctx.strokeStyle = rgba(tgt, 0.85);
  ctx.lineWidth=6; ctx.lineCap="round"; ctx.stroke();
  ctx.beginPath(); ctx.arc(bowl.x,bowl.y,bowl.r+15,0,Math.PI*2);
  ctx.strokeStyle="rgba(255,255,255,.06)"; ctx.lineWidth=6; ctx.stroke();

  // ---- bowl ----
  var pr = 1 + bowlPulse*0.05;
  var R = bowl.r*pr;
  ctx.save();
  ctx.beginPath(); ctx.arc(bowl.x,bowl.y,R,0,Math.PI*2); ctx.clip();
  var grad=ctx.createRadialGradient(
    bowl.x-R*0.3, bowl.y-R*0.35, R*0.1, bowl.x, bowl.y, R*1.05);
  grad.addColorStop(0, rgb([Math.min(255,cur[0]*1.18+12),Math.min(255,cur[1]*1.18+12),Math.min(255,cur[2]*1.18+12)]));
  grad.addColorStop(0.55, rgb(cur));
  grad.addColorStop(1, rgb([cur[0]*0.62,cur[1]*0.62,cur[2]*0.62]));
  ctx.fillStyle=grad; ctx.fillRect(bowl.x-R,bowl.y-R,R*2,R*2);
  // liquid swirl
  for(var s=0;s<3;s++){
    var ang=swirlPhase*(0.6+s*0.25)+s*2.1;
    var sx=bowl.x+Math.cos(ang)*R*0.32, sy=bowl.y+Math.sin(ang*1.3)*R*0.30;
    var sg=ctx.createRadialGradient(sx,sy,1,sx,sy,R*0.7);
    sg.addColorStop(0,"rgba(255,255,255,0.10)");
    sg.addColorStop(1,"rgba(255,255,255,0)");
    ctx.fillStyle=sg; ctx.fillRect(bowl.x-R,bowl.y-R,R*2,R*2);
  }
  // ripples
  for(var i=0;i<ripples.length;i++){
    var rp=ripples[i];
    ctx.beginPath(); ctx.arc(bowl.x,bowl.y,rp.r,0,Math.PI*2);
    ctx.strokeStyle="rgba(255,255,255,"+rp.a*0.5+")"; ctx.lineWidth=3; ctx.stroke();
  }
  ctx.restore();
  // rim
  ctx.beginPath(); ctx.arc(bowl.x,bowl.y,R,0,Math.PI*2);
  ctx.strokeStyle="rgba(255,255,255,.16)"; ctx.lineWidth=3; ctx.stroke();
  ctx.beginPath(); ctx.arc(bowl.x-R*0.28,bowl.y-R*0.32,R*0.55,Math.PI*0.95,Math.PI*1.55);
  ctx.strokeStyle="rgba(255,255,255,.22)"; ctx.lineWidth=4; ctx.lineCap="round"; ctx.stroke();
  if(flash>0.01){
    ctx.beginPath(); ctx.arc(bowl.x,bowl.y,R,0,Math.PI*2);
    ctx.fillStyle="rgba(255,255,255,"+flash*0.4+")"; ctx.fill();
  }

  // ---- particles ----
  for(var i=0;i<parts.length;i++){
    var p=parts[i];
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=rgb(p.col);
    ctx.beginPath(); ctx.arc(p.x,p.y,p.sz,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  // ---- falling drops ----
  for(var i=0;i<drops.length;i++){
    var d=drops[i];
    var e=d.t<1?d.t:1, ee=e*e*(3-2*e);
    var x=d.sx+(d.ex-d.sx)*ee, y=d.sy+(d.ey-d.sy)*ee;
    ctx.fillStyle=rgb(d.c);
    ctx.beginPath();
    ctx.ellipse(x,y,5,7+e*3,0,0,Math.PI*2); ctx.fill();
  }

  // ---- floats ----
  for(var i=0;i<floats.length;i++){
    var f=floats[i];
    ctx.globalAlpha=Math.max(0,1-f.t/1.2);
    ctx.fillStyle="#ffe08a"; ctx.font="700 22px sans-serif"; ctx.textAlign="center";
    ctx.fillText(f.s, f.x, f.y);
  }
  ctx.globalAlpha=1;

  // ---- rinse button ----
  ctx.save();
  ctx.globalAlpha = rinse.press?0.7:1;
  roundRect(rinse.x, rinse.y + (rinse.press?2:0), rinse.w, rinse.h, rinse.h/2);
  ctx.fillStyle="rgba(60,46,84,.55)"; ctx.fill();
  ctx.strokeStyle="rgba(255,255,255,.12)"; ctx.lineWidth=1.5; ctx.stroke();
  ctx.fillStyle="#b9a9d6"; ctx.font="600 15px sans-serif"; ctx.textAlign="center";
  ctx.fillText("すすぐ", rinse.x, rinse.y+5);
  ctx.restore();

  // ---- pigment buttons ----
  for(var i=0;i<btn.length;i++){
    var b=btn[i], off=b.press?3:0;
    ctx.beginPath(); ctx.arc(b.x,b.y+off+5,b.r,0,Math.PI*2);
    ctx.fillStyle="rgba(0,0,0,.35)"; ctx.fill();
    var pg=ctx.createRadialGradient(b.x-b.r*0.3,b.y-b.r*0.3+off,1,b.x,b.y+off,b.r);
    pg.addColorStop(0, rgb([Math.min(255,b.p.c[0]*1.2),Math.min(255,b.p.c[1]*1.2),Math.min(255,b.p.c[2]*1.2)]));
    pg.addColorStop(1, rgb(b.p.c));
    ctx.beginPath(); ctx.arc(b.x,b.y+off,b.r,0,Math.PI*2);
    ctx.fillStyle=pg; ctx.fill();
    ctx.strokeStyle="rgba(255,255,255,.22)"; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle = (b.p.n==="白"||b.p.n==="黄")?"#3a2f1c":"#fff";
    ctx.font="700 20px 'Hiragino Sans',sans-serif"; ctx.textAlign="center";
    ctx.fillText(b.p.n, b.x, b.y+off+7);
  }

  // hint (first round only)
  if(level===1 && combo===0 && score===0){
    ctx.fillStyle="rgba(190,178,214,.7)"; ctx.font="14px sans-serif"; ctx.textAlign="center";
    ctx.fillText("色をたらして 目標の色に近づけよう", bowl.x, bowl.y-bowl.r-30);
  }

  // ---- game over ----
  if(state===GS_OVER){
    ctx.fillStyle="rgba(8,5,16,.78)"; ctx.fillRect(0,0,W,H);
    ctx.textAlign="center";
    ctx.fillStyle="#fff"; ctx.font="700 30px sans-serif";
    ctx.fillText("そめあがり", W/2, H*0.40);
    ctx.fillStyle="#ffd36b"; ctx.font="700 44px sans-serif";
    ctx.fillText(score, W/2, H*0.40+58);
    ctx.fillStyle="#b9a9d6"; ctx.font="16px sans-serif";
    ctx.fillText("染めた色 "+(level-1)+" 色", W/2, H*0.40+92);
    ctx.fillStyle="#cdbfe6"; ctx.font="600 17px sans-serif";
    ctx.fillText("タップでもう一度", W/2, H*0.40+136);
  }
}

var raf;
function loop(now){
  var dt=(now-lastMs)/1000; if(dt>0.05)dt=0.05; lastMs=now;
  update(dt); draw();
  raf=requestAnimationFrame(loop);
}

resize();
reset();
lastMs=performance.now();
raf=requestAnimationFrame(loop);
})();
</script>
</body>
</html>
