<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#06030f">
<title>Aurora Lock</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
  html,body{width:100%;height:100%;overflow:hidden;background:#06030f;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue",sans-serif;color:#fff;touch-action:manipulation;overscroll-behavior:none}
  #stage{position:fixed;inset:0}
  canvas{display:block;width:100%;height:100%}

  #hud{position:fixed;top:max(12px,env(safe-area-inset-top));left:12px;right:12px;display:flex;justify-content:space-between;pointer-events:none;font-weight:700;font-size:13px;letter-spacing:.12em}
  #hud .pill{background:rgba(0,0,0,.45);padding:7px 14px;border-radius:22px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.08);text-shadow:0 0 8px rgba(255,255,255,.4)}
  #hud .pill.warn{color:#f88;border-color:rgba(255,80,80,.4)}

  #back{position:fixed;bottom:max(14px,env(safe-area-inset-bottom));left:14px;padding:8px 16px;background:rgba(0,0,0,.45);color:#bbb;font-size:12px;border-radius:22px;text-decoration:none;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.08);letter-spacing:.05em}
  #back:active{background:rgba(0,0,0,.7)}

  #message{position:fixed;top:42%;left:50%;transform:translate(-50%,-50%) scale(.9);text-align:center;pointer-events:none;opacity:0;transition:opacity .25s,transform .25s}
  #message.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
  #message h1{font-size:42px;font-weight:900;letter-spacing:.06em;text-shadow:0 0 24px currentColor}
  #message p{margin-top:8px;font-size:14px;opacity:.8;letter-spacing:.08em}

  #intro{position:fixed;inset:0;background:rgba(6,3,15,.94);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;padding:24px;text-align:center;transition:opacity .35s}
  #intro.hide{opacity:0;pointer-events:none}
  #intro h1{font-size:42px;font-weight:900;background:linear-gradient(135deg,#5cf 0%,#f5c 50%,#fc5 100%);-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:.08em;line-height:1}
  #intro .sub{margin-top:6px;font-size:11px;letter-spacing:.5em;color:#aaa;padding-left:.5em}
  #intro p{margin:24px 0 0;opacity:.85;max-width:280px;line-height:1.7;font-size:14px;color:#cfd}
  #intro .hint{font-size:12px;opacity:.6;margin-top:12px}
  #intro button{margin-top:32px;padding:14px 44px;background:linear-gradient(135deg,#5cf,#f5c);border:0;border-radius:30px;color:#0a0312;font-size:15px;font-weight:800;letter-spacing:.18em;box-shadow:0 8px 32px rgba(255,100,200,.3),0 0 0 1px rgba(255,255,255,.2) inset;cursor:pointer}
  #intro button:active{transform:scale(.96)}

  .restart{position:fixed;bottom:max(14px,env(safe-area-inset-bottom));right:14px;padding:8px 16px;background:rgba(0,0,0,.45);color:#bbb;font-size:12px;border-radius:22px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.08);cursor:pointer}
</style>
</head>
<body>
  <div id="stage"><canvas id="c"></canvas></div>

  <div id="hud">
    <span class="pill" id="lvl">LV 1</span>
    <span class="pill" id="time">⏱ 60</span>
  </div>
  <a href="../../index.html" id="back">← ギャラリー</a>
  <button class="restart" id="rst" style="display:none">⟳ リトライ</button>
  <div id="message"><h1 id="msg-text"></h1><p id="msg-sub"></p></div>

  <div id="intro">
    <h1>AURORA</h1>
    <h1>LOCK</h1>
    <div class="sub">PHASE LOCK PUZZLE</div>
    <p>回る輪の三角を、頂上のゲートに揃えろ。<br>輪をタップで <b>回転を反転</b>。</p>
    <div class="hint">三つの位相が重なった瞬間、解錠。</div>
    <button id="start">▶ START</button>
  </div>

<script>
(()=>{
  const c=document.getElementById('c');
  const ctx=c.getContext('2d');
  let W,H,DPR,minDim,cx,cy;

  function resize(){
    DPR=Math.min(window.devicePixelRatio||1,2);
    W=window.innerWidth;H=window.innerHeight;
    c.width=W*DPR;c.height=H*DPR;
    c.style.width=W+'px';c.style.height=H+'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
    minDim=Math.min(W,H);
    cx=W/2;cy=H/2+minDim*0.02;
    layoutRings();
  }
  window.addEventListener('resize',resize);
  window.addEventListener('orientationchange',()=>setTimeout(resize,80));

  const COLORS=[
    {h:195,name:'cyan'},
    {h:325,name:'rose'},
    {h:50,name:'amber'},
    {h:155,name:'mint'},
  ];

  let rings=[],particles=[],auroraT=0;
  let level=1,timeLeft=60,lastTime=0;
  let running=false,awaitingRestart=false;
  let gateAngle=-Math.PI/2,gateWidth=0.6;
  let alignFrames=0,clearLock=false;
  let baseRadius,ringSpacing,maxOuterR;
  let bgStars=[];

  function vibe(p){if(navigator.vibrate)navigator.vibrate(p)}

  function layoutRings(){
    baseRadius=minDim*0.085;
    ringSpacing=Math.min(minDim*0.075, (minDim*0.40-baseRadius)/4);
    maxOuterR=baseRadius+4*ringSpacing;
    rings.forEach((r,i)=>{r.radius=baseRadius+(i+1)*ringSpacing});
  }

  function buildLevel(n){
    const count=Math.min(2+Math.floor((n-1)/2),4);
    gateWidth=Math.max(0.20, 0.62 - n*0.045);
    rings=[];
    for(let i=0;i<count;i++){
      const sp=(0.55+i*0.22+n*0.06);
      const dir=(Math.random()<0.5)?1:-1;
      rings.push({
        radius:baseRadius+(i+1)*ringSpacing,
        angle:Math.random()*Math.PI*2 - Math.PI,
        speed:sp*dir,
        color:COLORS[i%COLORS.length],
        flash:0,
        spawn:1,
      });
    }
    alignFrames=0;clearLock=false;
  }

  function spawnParticles(x,y,hue,n,sp=1,life=1){
    for(let i=0;i<n;i++){
      const a=Math.random()*Math.PI*2;
      const s=(Math.random()*3+1)*sp;
      particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:life,decay:.018+Math.random()*.022,hue:hue+(Math.random()-.5)*30,size:Math.random()*3+1.4});
    }
  }

  function angleDiff(a,b){
    let d=a-b;
    while(d>Math.PI)d-=Math.PI*2;
    while(d<-Math.PI)d+=Math.PI*2;
    return d;
  }

  function checkAlignment(){
    return rings.every(r=>Math.abs(angleDiff(r.angle,gateAngle))<=gateWidth/2);
  }

  function showMessage(t,sub,dur=1200,hue){
    const el=document.getElementById('message');
    document.getElementById('msg-text').textContent=t;
    document.getElementById('msg-sub').textContent=sub||'';
    el.style.color=hue!=null?`hsl(${hue},90%,75%)`:'#fff';
    el.classList.add('show');
    clearTimeout(showMessage._t);
    showMessage._t=setTimeout(()=>el.classList.remove('show'),dur);
  }

  function levelClear(){
    if(clearLock)return;
    clearLock=true;
    spawnParticles(cx,cy,280,90,2.2,1.2);
    rings.forEach(r=>{
      const px=cx+Math.cos(r.angle)*r.radius;
      const py=cy+Math.sin(r.angle)*r.radius;
      spawnParticles(px,py,r.color.h,28,1.6,1);
    });
    vibe([24,40,90]);
    showMessage('UNLOCKED','+5s · LV '+level+' clear',1100,200);
    timeLeft=Math.min(timeLeft+5, 99);
    level++;
    setTimeout(()=>{buildLevel(level);clearLock=false;},620);
  }

  function gameOver(){
    running=false;
    awaitingRestart=true;
    showMessage('TIME OUT','LV '+level+' · タップで再挑戦',6000,15);
    document.getElementById('rst').style.display='block';
  }

  function startGame(){
    level=1;timeLeft=60;
    buildLevel(1);
    running=true;awaitingRestart=false;
    document.getElementById('rst').style.display='none';
    document.getElementById('message').classList.remove('show');
    lastTime=performance.now();
  }

  function update(dt){
    auroraT+=dt;
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i];
      p.x+=p.vx;p.y+=p.vy;p.vx*=.965;p.vy*=.965;
      p.life-=p.decay;
      if(p.life<=0)particles.splice(i,1);
    }
    if(!running)return;
    timeLeft-=dt;
    if(timeLeft<=0){timeLeft=0;gameOver();return;}
    const tEl=document.getElementById('time');
    tEl.textContent='⏱ '+Math.ceil(timeLeft);
    tEl.classList.toggle('warn',timeLeft<10);
    document.getElementById('lvl').textContent='LV '+level;
    rings.forEach(r=>{
      r.angle+=r.speed*dt;
      while(r.angle>Math.PI)r.angle-=Math.PI*2;
      while(r.angle<-Math.PI)r.angle+=Math.PI*2;
      r.flash*=Math.pow(.001,dt);
      r.spawn=Math.max(0,r.spawn-dt*2);
    });
    if(!clearLock&&checkAlignment()){
      alignFrames++;
      if(alignFrames>6)levelClear();
    }else alignFrames=0;
  }

  function drawAurora(){
    // soft moving aurora bands
    const g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#0a0420');
    g.addColorStop(.5,'#100432');
    g.addColorStop(1,'#06030f');
    ctx.fillStyle=g;
    ctx.fillRect(0,0,W,H);

    ctx.save();
    ctx.globalCompositeOperation='lighter';
    for(let i=0;i<3;i++){
      const yOff=H*0.5 + Math.sin(auroraT*0.3+i*1.7)*H*0.2;
      const hue=[200,300,160][i];
      const grad=ctx.createRadialGradient(W/2+Math.sin(auroraT*0.4+i)*W*0.3,yOff,10,W/2,yOff,minDim*0.7);
      grad.addColorStop(0,`hsla(${hue},80%,60%,0.18)`);
      grad.addColorStop(1,`hsla(${hue},80%,60%,0)`);
      ctx.fillStyle=grad;
      ctx.fillRect(0,0,W,H);
    }
    ctx.restore();

    // background star sparkle
    if(bgStars.length===0){
      for(let i=0;i<60;i++)bgStars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+.3,p:Math.random()*Math.PI*2});
    }
    ctx.save();
    bgStars.forEach(s=>{
      const a=0.3+0.4*Math.sin(auroraT*2+s.p);
      ctx.globalAlpha=a;
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
    });
    ctx.restore();
  }

  function drawCenterCore(){
    const t=auroraT;
    const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,baseRadius*1.1);
    grad.addColorStop(0,'rgba(255,255,255,0.6)');
    grad.addColorStop(.4,'rgba(170,90,255,0.3)');
    grad.addColorStop(1,'rgba(60,30,120,0)');
    ctx.fillStyle=grad;
    ctx.beginPath();ctx.arc(cx,cy,baseRadius*1.1,0,Math.PI*2);ctx.fill();
    const r=7+Math.sin(t*3)*1.5;
    ctx.shadowColor='#fff';ctx.shadowBlur=24;
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;

    // tiny ticks at the gate edges from the core
    ctx.strokeStyle='rgba(255,255,255,0.12)';
    ctx.lineWidth=1;
    for(let i=0;i<8;i++){
      const a=i*Math.PI/4;
      ctx.beginPath();
      ctx.moveTo(cx+Math.cos(a)*baseRadius*0.4,cy+Math.sin(a)*baseRadius*0.4);
      ctx.lineTo(cx+Math.cos(a)*baseRadius*0.85,cy+Math.sin(a)*baseRadius*0.85);
      ctx.stroke();
    }
  }

  function drawGate(){
    const r=maxOuterR + 22;
    ctx.save();
    // halo arc
    ctx.beginPath();
    ctx.arc(cx,cy,r,gateAngle-gateWidth/2,gateAngle+gateWidth/2);
    ctx.lineWidth=5;
    ctx.lineCap='round';
    ctx.shadowColor='#fff';ctx.shadowBlur=22;
    ctx.strokeStyle='rgba(255,255,255,0.95)';
    ctx.stroke();
    // outline
    ctx.beginPath();
    ctx.arc(cx,cy,r,gateAngle-gateWidth/2,gateAngle+gateWidth/2);
    ctx.lineWidth=1.2;
    ctx.shadowBlur=0;
    ctx.strokeStyle='rgba(255,255,255,0.5)';
    ctx.stroke();
    // tick legs
    [gateAngle-gateWidth/2,gateAngle+gateWidth/2].forEach(a=>{
      const x1=cx+Math.cos(a)*(r-10),y1=cy+Math.sin(a)*(r-10);
      const x2=cx+Math.cos(a)*(r+10),y2=cy+Math.sin(a)*(r+10);
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);
      ctx.lineWidth=2;ctx.strokeStyle='rgba(255,255,255,0.85)';
      ctx.stroke();
    });
    // label dot at the very top
    ctx.beginPath();
    ctx.arc(cx+Math.cos(gateAngle)*(r+18),cy+Math.sin(gateAngle)*(r+18),3,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.7)';
    ctx.fill();
    ctx.restore();
  }

  function drawRing(r,idx){
    const aligned=Math.abs(angleDiff(r.angle,gateAngle))<=gateWidth/2;
    const proximity=1-Math.min(1,Math.abs(angleDiff(r.angle,gateAngle))/Math.PI);

    ctx.save();
    // ring track
    ctx.beginPath();
    ctx.arc(cx,cy,r.radius,0,Math.PI*2);
    ctx.lineWidth=2;
    ctx.strokeStyle=`hsla(${r.color.h},80%,65%,${0.2+proximity*0.25+r.flash*0.4})`;
    ctx.shadowColor=`hsl(${r.color.h},80%,60%)`;
    ctx.shadowBlur=8+proximity*16+r.flash*20;
    ctx.stroke();
    ctx.restore();

    // tail trail (short arc trailing the marker, indicates rotation direction)
    ctx.save();
    const tailLen=0.5;
    const tailStart=r.angle - Math.sign(r.speed)*tailLen;
    const tailEnd=r.angle;
    const a0=Math.min(tailStart,tailEnd),a1=Math.max(tailStart,tailEnd);
    ctx.beginPath();
    ctx.arc(cx,cy,r.radius,a0,a1);
    ctx.lineWidth=4;
    ctx.lineCap='round';
    ctx.strokeStyle=`hsla(${r.color.h},90%,65%,0.55)`;
    ctx.shadowColor=`hsl(${r.color.h},90%,55%)`;
    ctx.shadowBlur=12;
    ctx.stroke();
    ctx.restore();

    // marker
    const mx=cx+Math.cos(r.angle)*r.radius;
    const my=cy+Math.sin(r.angle)*r.radius;
    ctx.save();
    ctx.translate(mx,my);
    ctx.rotate(r.angle+Math.PI/2);

    // halo
    const haloR=20+proximity*14+r.flash*22+r.spawn*30;
    const radial=ctx.createRadialGradient(0,0,0,0,0,haloR);
    radial.addColorStop(0,`hsla(${r.color.h},95%,72%,${0.55+proximity*0.4})`);
    radial.addColorStop(1,`hsla(${r.color.h},95%,55%,0)`);
    ctx.fillStyle=radial;
    ctx.beginPath();ctx.arc(0,0,haloR,0,Math.PI*2);ctx.fill();

    // triangle marker
    ctx.beginPath();
    const sz=11;
    ctx.moveTo(0,-sz);
    ctx.lineTo(sz*0.85,sz*0.7);
    ctx.lineTo(-sz*0.85,sz*0.7);
    ctx.closePath();
    ctx.fillStyle=aligned?`hsl(${r.color.h},100%,80%)`:`hsl(${r.color.h},90%,62%)`;
    ctx.shadowColor=`hsl(${r.color.h},100%,70%)`;
    ctx.shadowBlur=aligned?22:10;
    ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.8)';
    ctx.lineWidth=1.2;
    ctx.shadowBlur=0;
    ctx.stroke();
    ctx.restore();
  }

  function drawParticles(){
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    particles.forEach(p=>{
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
      ctx.fillStyle=`hsla(${p.hue},90%,68%,${p.life})`;
      ctx.shadowColor=`hsl(${p.hue},90%,60%)`;
      ctx.shadowBlur=14;
      ctx.fill();
    });
    ctx.restore();
  }

  function render(){
    drawAurora();
    drawCenterCore();
    rings.forEach(drawRing);
    drawGate();
    drawParticles();
  }

  function loop(now){
    const dt=Math.min((now-lastTime)/1000,0.05);
    lastTime=now;
    update(dt);
    render();
    requestAnimationFrame(loop);
  }

  function tap(x,y){
    if(awaitingRestart){startGame();return;}
    if(!running)return;
    const dx=x-cx,dy=y-cy;
    const d=Math.sqrt(dx*dx+dy*dy);
    let best=-1,bestDist=Infinity;
    rings.forEach((r,i)=>{
      const diff=Math.abs(r.radius-d);
      if(diff<bestDist){bestDist=diff;best=i;}
    });
    const tol=Math.max(ringSpacing*0.55, 22);
    if(best>=0 && bestDist<tol && d<maxOuterR+ringSpacing){
      const r=rings[best];
      r.speed=-r.speed;
      r.flash=1;
      const px=cx+Math.cos(r.angle)*r.radius;
      const py=cy+Math.sin(r.angle)*r.radius;
      spawnParticles(px,py,r.color.h,16,1.2);
      vibe(10);
    }else{
      spawnParticles(x,y,220,5,0.6);
    }
  }

  c.addEventListener('touchstart',e=>{
    e.preventDefault();
    const rect=c.getBoundingClientRect();
    for(const t of e.changedTouches)tap(t.clientX-rect.left,t.clientY-rect.top);
  },{passive:false});
  c.addEventListener('mousedown',e=>{
    const rect=c.getBoundingClientRect();
    tap(e.clientX-rect.left,e.clientY-rect.top);
  });

  document.getElementById('start').addEventListener('click',()=>{
    document.getElementById('intro').classList.add('hide');
    startGame();
  });
  document.getElementById('rst').addEventListener('click',e=>{
    e.stopPropagation();
    startGame();
  });

  resize();
  requestAnimationFrame(t=>{lastTime=t;requestAnimationFrame(loop);});
})();
</script>
</body>
</html>
