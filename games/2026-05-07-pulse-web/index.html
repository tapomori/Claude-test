<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Pulse Web</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;width:100%;overflow:hidden;background:#05060d;color:#e8eef9;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;touch-action:manipulation;user-select:none;-webkit-user-select:none}
  #stage{position:fixed;inset:0;display:block}
  #hud{position:fixed;top:0;left:0;right:0;padding:14px 18px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;z-index:5;font-weight:600}
  #hud .pill{background:rgba(15,22,40,0.55);backdrop-filter:blur(8px);padding:8px 14px;border-radius:999px;font-size:13px;letter-spacing:.06em;border:1px solid rgba(120,180,255,0.18)}
  #hud .pill b{color:#7ce6ff;font-weight:700;margin-left:6px}
  #back{position:fixed;top:14px;left:14px;color:#9fb6da;text-decoration:none;font-size:13px;background:rgba(15,22,40,0.55);backdrop-filter:blur(8px);padding:8px 12px;border-radius:999px;border:1px solid rgba(120,180,255,0.18);pointer-events:auto;z-index:6}
  #overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;background:radial-gradient(circle at 50% 50%,rgba(20,30,60,0.88),rgba(5,6,13,0.96));z-index:10;transition:opacity .3s}
  #overlay.hide{opacity:0;pointer-events:none}
  #overlay h1{font-size:38px;font-weight:800;letter-spacing:.04em;background:linear-gradient(135deg,#7ce6ff,#a78bfa,#ff8db1);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:14px}
  #overlay p{font-size:14px;line-height:1.7;color:#a9bedb;max-width:300px;margin-bottom:8px}
  #overlay small{display:block;margin-top:18px;color:#6c7d99;font-size:11px;letter-spacing:.08em}
  #overlay .btn{margin-top:28px;padding:14px 40px;font-size:15px;font-weight:700;letter-spacing:.1em;border-radius:999px;border:1px solid rgba(124,230,255,0.45);background:rgba(124,230,255,0.08);color:#e8f7ff;cursor:pointer}
  #overlay .btn:active{transform:scale(.96)}
  #toast{position:fixed;top:54%;left:50%;transform:translate(-50%,-50%);font-size:48px;font-weight:800;color:#fff;text-shadow:0 0 24px rgba(124,230,255,.7);opacity:0;transition:opacity .25s,transform .35s;pointer-events:none;z-index:8;letter-spacing:.04em}
  #toast.show{opacity:1;transform:translate(-50%,calc(-50% - 24px))}
  .legend{display:flex;gap:14px;margin-top:14px;font-size:11px;color:#7d8fab}
  .legend span{display:flex;align-items:center;gap:6px}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:50%}
  .legend i.c{background:#7ce6ff;box-shadow:0 0 8px #7ce6ff}
  .legend i.d{background:#ff5d7c;box-shadow:0 0 8px #ff5d7c}
</style>
</head>
<body>
<a id="back" href="../../index.html">← 戻る</a>
<canvas id="stage"></canvas>
<div id="hud">
  <div></div>
  <div class="pill">LV<b id="lv">1</b></div>
  <div class="pill">残り<b id="taps">3</b></div>
</div>
<div id="toast"></div>
<div id="overlay">
  <h1>PULSE WEB</h1>
  <p>画面をタップすると<b style="color:#7ce6ff">波紋</b>が広がる。</p>
  <p>波紋が<b style="color:#7ce6ff">青ノード</b>に触れると発火し、さらに新しい波紋を生む。連鎖で全部光らせよう。</p>
  <p><b style="color:#ff5d7c">赤ノード</b>に触れたらゲームオーバー。</p>
  <div class="legend"><span><i class="c"></i>光らせる</span><span><i class="d"></i>避ける</span></div>
  <button class="btn" id="start">START</button>
  <small>tap to ripple ／ chain to win</small>
</div>

<script>
(()=>{
  const cv=document.getElementById('stage'),ctx=cv.getContext('2d');
  const lvEl=document.getElementById('lv'),tapsEl=document.getElementById('taps');
  const overlay=document.getElementById('overlay'),startBtn=document.getElementById('start');
  const toast=document.getElementById('toast');
  let W=0,H=0,DPR=1;
  function resize(){
    DPR=Math.min(window.devicePixelRatio||1,2);
    W=window.innerWidth;H=window.innerHeight;
    cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  window.addEventListener('resize',resize);resize();

  const RIPPLE_SPEED=320; // px/sec
  const RIPPLE_LIFE=1.4;  // seconds
  const RIPPLE_MAX=()=>RIPPLE_SPEED*RIPPLE_LIFE;
  const NODE_R=14;
  const CHAIN_DELAY=0.18;

  let state={
    nodes:[], ripples:[], particles:[],
    level:1, tapsLeft:3, playing:false, ended:false,
    lastT:0, chainCount:0, lastChainT:0,
  };

  function rand(a,b){return a+Math.random()*(b-a)}

  function makeLevel(n){
    const margin=60, top=110, bottom=H-60;
    const cyanCount=Math.min(3+n,12);
    const dangerCount=Math.max(0,Math.min(Math.floor((n-1)/2),3));
    const tapBudget=Math.max(2,Math.ceil(cyanCount/3)+(n>=3?0:1));
    const nodes=[];
    let attempts=0;
    while(nodes.length<cyanCount+dangerCount && attempts<800){
      attempts++;
      const x=rand(margin,W-margin),y=rand(top,bottom);
      let ok=true;
      for(const o of nodes){
        const d=Math.hypot(o.x-x,o.y-y);
        if(d<70){ok=false;break}
      }
      if(!ok) continue;
      const isDanger=nodes.filter(n=>n.danger).length<dangerCount && Math.random()<dangerCount/(cyanCount+dangerCount);
      nodes.push({x,y,danger:isDanger?true:false,lit:false,litT:0,pulse:0});
    }
    // ensure exact counts
    let dCount=nodes.filter(n=>n.danger).length;
    while(dCount<dangerCount){
      const cand=nodes.filter(n=>!n.danger);
      cand[Math.floor(Math.random()*cand.length)].danger=true;dCount++;
    }
    while(dCount>dangerCount){
      const cand=nodes.filter(n=>n.danger);
      cand[Math.floor(Math.random()*cand.length)].danger=false;dCount--;
    }
    return {nodes,tapBudget};
  }

  function startLevel(n){
    const lv=makeLevel(n);
    state.nodes=lv.nodes;
    state.tapsLeft=lv.tapBudget;
    state.ripples=[];
    state.particles=[];
    state.level=n;
    state.playing=true;
    state.ended=false;
    state.chainCount=0;
    lvEl.textContent=n;
    tapsEl.textContent=state.tapsLeft;
  }

  function showToast(text,color){
    toast.textContent=text;
    toast.style.color=color||'#fff';
    toast.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t=setTimeout(()=>toast.classList.remove('show'),900);
  }

  function endGame(win){
    state.playing=false;state.ended=true;
    const h=overlay.querySelector('h1');
    const ps=overlay.querySelectorAll('p');
    if(win){
      h.textContent='CLEAR!';
      ps[0].innerHTML='Lv'+state.level+' まで到達！';
      ps[1].innerHTML='波紋の<b style="color:#7ce6ff">綺麗な連鎖</b>でしたね。';
      ps[2].innerHTML='もう一度挑戦して、より少ないタップを目指そう。';
    } else {
      h.textContent='OVER';
      ps[0].innerHTML='Lv'+state.level+' で力尽きた。';
      ps[1].innerHTML='波紋の<b style="color:#7ce6ff">射程</b>と<b style="color:#ff5d7c">赤の位置</b>を意識して。';
      ps[2].innerHTML='中継ノードを上手く使えば届きにくい場所にも届く。';
    }
    startBtn.textContent='AGAIN';
    setTimeout(()=>overlay.classList.remove('hide'),320);
  }

  function spawnRipple(x,y,fromChain){
    state.ripples.push({
      x,y,t:0,maxT:RIPPLE_LIFE,fromChain:!!fromChain,
      hits:new Set()
    });
    // burst particles
    const col=fromChain?'#a78bfa':'#7ce6ff';
    for(let i=0;i<12;i++){
      const a=Math.random()*Math.PI*2,sp=rand(40,160);
      state.particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,t:0,life:rand(.4,.8),col,size:rand(2,4)});
    }
    if(navigator.vibrate)navigator.vibrate(fromChain?8:14);
  }

  function igniteNode(node,delay){
    setTimeout(()=>{
      if(state.ended)return;
      if(node.danger){
        // explosion of red
        for(let i=0;i<40;i++){
          const a=Math.random()*Math.PI*2,sp=rand(60,260);
          state.particles.push({x:node.x,y:node.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,t:0,life:rand(.5,1.1),col:'#ff5d7c',size:rand(2,5)});
        }
        if(navigator.vibrate)navigator.vibrate([30,40,80]);
        endGame(false);
        return;
      }
      if(node.lit)return;
      node.lit=true;node.litT=0;node.pulse=1;
      state.chainCount++;
      const now=performance.now()/1000;
      if(now-state.lastChainT<0.6 && state.chainCount>1){
        if(state.chainCount===3) showToast('NICE CHAIN','#a78bfa');
        else if(state.chainCount===5) showToast('GREAT!','#ff8db1');
        else if(state.chainCount>=7) showToast('PERFECT','#ffd86b');
      }
      state.lastChainT=now;
      spawnRipple(node.x,node.y,true);

      // check win
      const remaining=state.nodes.filter(n=>!n.danger && !n.lit).length;
      if(remaining===0){
        setTimeout(()=>{
          if(state.ended)return;
          showToast('LEVEL '+state.level+' CLEAR','#7ce6ff');
          if(state.level>=10){
            endGame(true);
          } else {
            setTimeout(()=>startLevel(state.level+1),900);
          }
        },400);
      }
    },delay*1000);
  }

  cv.addEventListener('pointerdown',(e)=>{
    if(!state.playing)return;
    if(state.tapsLeft<=0)return;
    const rect=cv.getBoundingClientRect();
    const x=e.clientX-rect.left,y=e.clientY-rect.top;
    state.tapsLeft--;
    state.chainCount=0;
    state.lastChainT=performance.now()/1000;
    spawnRipple(x,y,false);
    tapsEl.textContent=state.tapsLeft;
    // After this tap, if no taps left and chain finishes without clearing → game over
    setTimeout(()=>{
      if(!state.playing||state.ended)return;
      if(state.tapsLeft<=0){
        // wait until ripples settle
        const check=()=>{
          if(state.ended)return;
          const remaining=state.nodes.filter(n=>!n.danger && !n.lit).length;
          if(state.ripples.length===0){
            if(remaining>0)endGame(false);
          } else {
            setTimeout(check,200);
          }
        };
        setTimeout(check,RIPPLE_LIFE*1000+200);
      }
    },50);
  });

  function tick(now){
    if(!state.lastT)state.lastT=now;
    const dt=Math.min(0.05,(now-state.lastT)/1000);
    state.lastT=now;

    // background
    ctx.fillStyle='rgba(5,6,13,0.28)';
    ctx.fillRect(0,0,W,H);

    // subtle grid
    ctx.save();
    ctx.globalAlpha=0.06;
    ctx.strokeStyle='#7ce6ff';
    ctx.lineWidth=1;
    const gs=44;
    for(let x=(performance.now()/80)%gs; x<W; x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
    for(let y=(performance.now()/80)%gs; y<H; y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
    ctx.restore();

    // ripples
    for(let i=state.ripples.length-1;i>=0;i--){
      const r=state.ripples[i];
      r.t+=dt;
      if(r.t>=r.maxT){state.ripples.splice(i,1);continue}
      const radius=r.t*RIPPLE_SPEED;
      const alpha=1-(r.t/r.maxT);
      ctx.save();
      ctx.lineWidth=3;
      ctx.strokeStyle=r.fromChain?`rgba(167,139,250,${alpha*.85})`:`rgba(124,230,255,${alpha*.95})`;
      ctx.beginPath();ctx.arc(r.x,r.y,radius,0,Math.PI*2);ctx.stroke();
      // inner soft
      ctx.lineWidth=10;
      ctx.strokeStyle=r.fromChain?`rgba(167,139,250,${alpha*.18})`:`rgba(124,230,255,${alpha*.22})`;
      ctx.stroke();
      ctx.restore();

      // collision with nodes
      for(const n of state.nodes){
        if(n.lit && !n.danger)continue;
        if(r.hits.has(n))continue;
        const d=Math.hypot(n.x-r.x,n.y-r.y);
        if(radius>=d-NODE_R*0.4 && d<=RIPPLE_MAX()+NODE_R){
          r.hits.add(n);
          igniteNode(n,CHAIN_DELAY);
        }
      }
    }

    // particles
    for(let i=state.particles.length-1;i>=0;i--){
      const p=state.particles[i];
      p.t+=dt;
      if(p.t>=p.life){state.particles.splice(i,1);continue}
      p.x+=p.vx*dt;p.y+=p.vy*dt;
      p.vx*=0.94;p.vy*=0.94;
      const a=1-(p.t/p.life);
      ctx.fillStyle=p.col;
      ctx.globalAlpha=a;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size*a,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
    }

    // nodes
    for(const n of state.nodes){
      n.pulse=Math.max(0,n.pulse-dt*2);
      const t=performance.now()/1000;
      const breath=0.5+0.5*Math.sin(t*2+n.x*0.01);
      ctx.save();
      if(n.danger){
        // red core w/ warning ring
        const glow=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,40);
        glow.addColorStop(0,'rgba(255,93,124,0.55)');
        glow.addColorStop(1,'rgba(255,93,124,0)');
        ctx.fillStyle=glow;
        ctx.beginPath();ctx.arc(n.x,n.y,40,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#ff5d7c';
        ctx.beginPath();ctx.arc(n.x,n.y,NODE_R-2,0,Math.PI*2);ctx.fill();
        ctx.strokeStyle='rgba(255,93,124,'+(.5+breath*.4)+')';
        ctx.lineWidth=2;
        ctx.beginPath();ctx.arc(n.x,n.y,NODE_R+5+breath*4,0,Math.PI*2);ctx.stroke();
        // X mark
        ctx.strokeStyle='#fff';ctx.lineWidth=2;
        ctx.beginPath();
        ctx.moveTo(n.x-5,n.y-5);ctx.lineTo(n.x+5,n.y+5);
        ctx.moveTo(n.x+5,n.y-5);ctx.lineTo(n.x-5,n.y+5);
        ctx.stroke();
      } else if(n.lit){
        n.litT+=dt;
        const glow=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,50);
        glow.addColorStop(0,'rgba(124,230,255,0.7)');
        glow.addColorStop(1,'rgba(124,230,255,0)');
        ctx.fillStyle=glow;
        ctx.beginPath();ctx.arc(n.x,n.y,50,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#e8f9ff';
        const pr=NODE_R+n.pulse*8;
        ctx.beginPath();ctx.arc(n.x,n.y,pr,0,Math.PI*2);ctx.fill();
        ctx.strokeStyle='rgba(255,255,255,'+(.6+n.pulse*.4)+')';
        ctx.lineWidth=2;
        ctx.beginPath();ctx.arc(n.x,n.y,pr+2,0,Math.PI*2);ctx.stroke();
      } else {
        // unlit cyan
        ctx.fillStyle='rgba(124,230,255,'+(.18+breath*.18)+')';
        ctx.beginPath();ctx.arc(n.x,n.y,NODE_R+4,0,Math.PI*2);ctx.fill();
        ctx.strokeStyle='rgba(124,230,255,0.85)';
        ctx.lineWidth=2;
        ctx.beginPath();ctx.arc(n.x,n.y,NODE_R,0,Math.PI*2);ctx.stroke();
        ctx.fillStyle='rgba(124,230,255,0.35)';
        ctx.beginPath();ctx.arc(n.x,n.y,NODE_R-5,0,Math.PI*2);ctx.fill();
      }
      ctx.restore();
    }

    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  startBtn.addEventListener('click',()=>{
    overlay.classList.add('hide');
    startLevel(1);
  });
})();
</script>
</body>
</html>
