<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0b14">
<title>円相 — Ensō</title>
<style>
  :root { --gold:#f4c77b; --teal:#6fe3d8; --red:#ff5d6c; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%; overflow:hidden;
    background:#0b0b14; color:#e8e6f0;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    -webkit-user-select:none; user-select:none;
    -webkit-tap-highlight-color:transparent;
    touch-action:manipulation; overscroll-behavior:none;
  }
  #c { display:block; width:100vw; height:100vh; touch-action:none; }
  a.back {
    position:fixed; top:max(10px,env(safe-area-inset-top)); left:max(12px,env(safe-area-inset-left));
    z-index:10; color:#9b97b8; text-decoration:none; font-size:13px;
    padding:7px 12px; border:1px solid rgba(155,151,184,.35);
    border-radius:999px; background:rgba(11,11,20,.45); backdrop-filter:blur(4px);
  }
  a.back:active { color:#e8e6f0; }
</style>
</head>
<body>
<a class="back" href="../../index.html">‹ 一覧へ</a>
<canvas id="c"></canvas>
<script>
(() => {
  "use strict";
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W = 0, H = 0, DPR = 1, CX = 0, CY = 0, minR = 30, maxR = 160;

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2.5);
    W = window.innerWidth; H = window.innerHeight;
    cv.width = Math.round(W * DPR); cv.height = Math.round(H * DPR);
    cv.style.width = W + 'px'; cv.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    CX = W / 2; CY = H * 0.5;
    maxR = Math.min(W, H) * 0.42;
    minR = Math.max(26, Math.min(W, H) * 0.085);
  }
  window.addEventListener('resize', resize);
  resize();

  // ---- audio (soft, optional) ----
  let AC = null;
  function ensureAudio(){ if(!AC){ try{ AC = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } }
  function blip(freq, dur, vol, type){
    if(!AC) return;
    try{
      const o = AC.createOscillator(), g = AC.createGain();
      o.type = type || 'sine'; o.frequency.value = freq;
      g.gain.value = 0.0001;
      o.connect(g); g.connect(AC.destination);
      const t = AC.currentTime;
      g.gain.exponentialRampToValueAtTime(vol, t + 0.012);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.start(t); o.stop(t + dur + 0.02);
    }catch(e){}
  }
  function vibe(ms){ try{ navigator.vibrate && navigator.vibrate(ms); }catch(e){} }

  // ---- state ----
  let state = 'menu';        // menu | play | over
  let R = 90, targetR = 90;  // ensō radius
  let holding = false, ptrId = null, px = 0, py = 0;
  let score = 0, best = 0, combo = 0, bestCombo = 0;
  let lives = 3, successes = 0, level = 1;
  let gate = null, gap = 0;
  let particles = [], ripples = [], floats = [];
  let shakeT = 0, shakeMag = 0, flash = 0, flashCol = '#f4c77b';
  let brushPhase = 0;
  let last = performance.now(), tMenu = 0;

  try { best = parseInt(localStorage.getItem('enso_best') || '0', 10) || 0; } catch(e) {}

  function radiusFromPointer(x, y){
    const d = Math.hypot(x - CX, y - CY);
    return Math.max(minR, Math.min(maxR, d));
  }

  function newGate(){
    level = 1 + Math.floor(successes / 5);
    const dur = Math.max(820, 2000 - level * 110);
    const tol = Math.max(13, 40 - level * 2.4);
    const lo = minR + 22, hi = maxR - 14;
    let Rg, tries = 0;
    const minJump = Math.min(level * 13, (hi - lo) * 0.55);
    do { Rg = lo + Math.random() * (hi - lo); tries++; }
    while (gate && Math.abs(Rg - gate.Rg0) < minJump && tries < 8);
    if (!gate) Rg = lo + Math.random() * (hi - lo);
    const drift = level >= 3 ? (Math.random() * 2 - 1) * Math.min(level * 5, 46) : 0;
    gate = { Rg0: Rg, Rg: Rg, tol, dur, age: 0, drift, judged: false, startR: maxR * 1.34 };
  }

  function startGame(){
    score = 0; combo = 0; lives = 3; successes = 0; level = 1;
    particles = []; ripples = []; floats = [];
    targetR = R = (minR + maxR) * 0.5;
    gate = null; gap = 600; state = 'play';
  }

  function addFloat(txt, x, y, col){
    floats.push({ txt, x, y, life: 1, col });
  }

  function judge(){
    const g = gate; g.judged = true;
    const diff = Math.abs(R - g.Rg);
    const ang0 = brushPhase;
    if (diff <= g.tol){
      const perfect = diff <= g.tol * 0.34;
      successes++; combo++;
      bestCombo = Math.max(bestCombo, combo);
      const mult = 1 + Math.min(combo - 1, 9) * 0.5;
      const gained = Math.round((perfect ? 150 : 100) * mult);
      score += gained;
      flash = perfect ? 0.9 : 0.55;
      flashCol = perfect ? '#fff2cf' : '#f4c77b';
      ripples.push({ r: g.Rg, a: 0.9, w: perfect ? 6 : 4, col: '#f4c77b' });
      if (perfect) ripples.push({ r: g.Rg, a: 0.7, w: 2, col: '#fff' });
      const n = perfect ? 34 : 22;
      for (let i = 0; i < n; i++){
        const a = ang0 + (i / n) * Math.PI * 2;
        const sp = 70 + Math.random() * 130;
        particles.push({
          x: CX + Math.cos(a) * g.Rg, y: CY + Math.sin(a) * g.Rg,
          vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
          life: 1, sz: 2 + Math.random() * 2.6,
          col: perfect ? '#fff2cf' : '#f4c77b'
        });
      }
      addFloat((perfect ? '完 ' : '') + '+' + gained + (combo > 1 ? '  ×' + combo : ''),
               CX, CY - g.Rg - 26, perfect ? '#fff2cf' : '#f4c77b');
      vibe(perfect ? [12, 22, 12] : 14);
      blip(660, 0.12, 0.05, 'sine');
      if (perfect) blip(990, 0.16, 0.045, 'sine');
    } else {
      combo = 0; lives--;
      flash = 0.6; flashCol = '#ff5d6c';
      shakeT = 1; shakeMag = 16;
      ripples.push({ r: R, a: 0.8, w: 5, col: '#ff5d6c' });
      const n = 26;
      for (let i = 0; i < n; i++){
        const a = Math.random() * Math.PI * 2;
        const sp = 60 + Math.random() * 150;
        particles.push({
          x: CX + Math.cos(a) * R, y: CY + Math.sin(a) * R,
          vx: Math.cos(a) * sp, vy: Math.sin(a) * sp + 40,
          life: 1, sz: 2 + Math.random() * 3, col: '#ff5d6c'
        });
      }
      addFloat('miss', CX, CY - R - 26, '#ff5d6c');
      vibe(70);
      blip(180, 0.18, 0.05, 'triangle');
      if (lives <= 0){
        best = Math.max(best, score);
        try { localStorage.setItem('enso_best', String(best)); } catch(e) {}
        setTimeout(() => { state = 'over'; }, 700);
      }
    }
    gap = 460;
  }

  // ---- input ----
  function down(e){
    const t = e.changedTouches ? e.changedTouches[0] : e;
    if (state === 'menu'){ ensureAudio(); startGame(); }
    else if (state === 'over'){ ensureAudio(); startGame(); }
    if (state === 'play'){
      holding = true; ptrId = (t.identifier !== undefined ? t.identifier : 'm');
      px = t.clientX; py = t.clientY;
      targetR = radiusFromPointer(px, py);
    }
    e.preventDefault();
  }
  function move(e){
    if (!holding || state !== 'play') return;
    let t = null;
    if (e.changedTouches){
      for (const tt of e.changedTouches){ if (tt.identifier === ptrId){ t = tt; break; } }
      if (!t) return;
    } else t = e;
    px = t.clientX; py = t.clientY;
    targetR = radiusFromPointer(px, py);
    e.preventDefault();
  }
  function up(e){
    if (e.changedTouches){
      let m = false;
      for (const tt of e.changedTouches){ if (tt.identifier === ptrId){ m = true; break; } }
      if (!m) return;
    }
    holding = false; ptrId = null;
    e.preventDefault();
  }
  cv.addEventListener('touchstart', down, { passive: false });
  cv.addEventListener('touchmove', move, { passive: false });
  cv.addEventListener('touchend', up, { passive: false });
  cv.addEventListener('touchcancel', up, { passive: false });
  cv.addEventListener('mousedown', down);
  window.addEventListener('mousemove', move);
  window.addEventListener('mouseup', up);

  // ---- draw helpers ----
  function ring(r, col, w, a){
    ctx.beginPath(); ctx.arc(CX, CY, Math.max(0.5, r), 0, Math.PI * 2);
    ctx.strokeStyle = col; ctx.lineWidth = w; ctx.globalAlpha = a; ctx.stroke();
    ctx.globalAlpha = 1;
  }
  function drawEnso(r, col, glow){
    // calligraphic stroke: a near-closed arc with a tapered gap and a leading ink head
    const start = brushPhase, end = brushPhase + Math.PI * 2 - 0.42;
    ctx.save();
    ctx.shadowColor = col; ctx.shadowBlur = glow;
    ctx.lineCap = 'round';
    const seg = 40;
    for (let i = 0; i < seg; i++){
      const a0 = start + (end - start) * (i / seg);
      const a1 = start + (end - start) * ((i + 1) / seg);
      const taper = Math.sin((i / seg) * Math.PI);          // thin at ends, fat mid
      ctx.beginPath();
      ctx.arc(CX, CY, r, a0, a1 + 0.002);
      ctx.strokeStyle = col;
      ctx.lineWidth = 3 + taper * 6;
      ctx.globalAlpha = 0.5 + taper * 0.5;
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
    // ink head
    const hx = CX + Math.cos(end) * r, hy = CY + Math.sin(end) * r;
    ctx.beginPath(); ctx.arc(hx, hy, 5.5, 0, Math.PI * 2);
    ctx.fillStyle = col; ctx.fill();
    ctx.restore();
  }
  function rr(x, y, w, h, rad){
    ctx.beginPath();
    ctx.moveTo(x + rad, y);
    ctx.arcTo(x + w, y, x + w, y + h, rad);
    ctx.arcTo(x + w, y + h, x, y + h, rad);
    ctx.arcTo(x, y + h, x, y, rad);
    ctx.arcTo(x, y, x + w, y, rad);
    ctx.closePath();
  }

  // ---- loop ----
  function frame(now){
    let dt = (now - last) / 1000; last = now;
    if (dt > 0.05) dt = 0.05;
    tMenu += dt;

    // background
    const g = ctx.createRadialGradient(CX, CY, 10, CX, CY, Math.max(W, H) * 0.75);
    g.addColorStop(0, '#15152a'); g.addColorStop(1, '#08080f');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

    let ox = 0, oy = 0;
    if (shakeT > 0){
      shakeT = Math.max(0, shakeT - dt * 3.4);
      ox = (Math.random() * 2 - 1) * shakeMag * shakeT;
      oy = (Math.random() * 2 - 1) * shakeMag * shakeT;
    }
    ctx.save();
    ctx.translate(ox, oy);

    // faint guide rings
    ring(minR, '#2a2a44', 1, 0.5);
    ring(maxR, '#2a2a44', 1, 0.5);

    brushPhase += dt * 0.55;

    if (state === 'menu'){
      const demoR = (minR + maxR) * 0.5 + Math.sin(tMenu * 1.3) * (maxR - minR) * 0.34;
      // ghost gate
      ring((minR + maxR) * 0.5, 'rgba(111,227,216,.35)', 2, 1);
      drawEnso(demoR, '#f4c77b', 16);
      const fx = CX, fy = CY + demoR;
      ctx.beginPath(); ctx.arc(fx, fy, 9, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,.85)'; ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,.35)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(CX, CY); ctx.lineTo(fx, fy); ctx.stroke();

      ctx.restore();
      ctx.textAlign = 'center';
      ctx.fillStyle = '#f4c77b';
      ctx.font = '600 ' + Math.round(Math.min(W, H) * 0.16) + 'px serif';
      ctx.fillText('円相', CX, H * 0.2);
      ctx.fillStyle = '#bdb9d6';
      ctx.font = '600 15px sans-serif';
      ctx.fillText('Ensō', CX, H * 0.2 + 26);
      ctx.fillStyle = '#e8e6f0';
      ctx.font = '15px sans-serif';
      ctx.fillText('指と中心の距離が、輪の大きさ。', CX, H * 0.78);
      ctx.fillStyle = '#9b97b8';
      ctx.font = '13px sans-serif';
      ctx.fillText('迫る輪に重なった その一瞬、', CX, H * 0.78 + 24);
      ctx.fillText('大きさが合っていれば澄む。', CX, H * 0.78 + 44);
      const pulse = 0.55 + 0.45 * Math.sin(tMenu * 3);
      ctx.globalAlpha = pulse;
      ctx.fillStyle = '#fff';
      ctx.font = '600 16px sans-serif';
      ctx.fillText('タップして始める', CX, H * 0.88);
      ctx.globalAlpha = 1;
      requestAnimationFrame(frame); return;
    }

    // smooth radius
    R += (targetR - R) * Math.min(1, dt * 14);

    if (state === 'play'){
      if (gap > 0){
        gap -= dt * 1000;
        if (gap <= 0 && lives > 0) newGate();
      } else if (gate && !gate.judged){
        gate.age += dt * 1000;
        const p = Math.min(1, gate.age / gate.dur);
        gate.Rg = gate.Rg0 + gate.drift * p;
        if (gate.age >= gate.dur) judge();
      }
    }

    // active gate visuals
    if (gate){
      const g0 = gate;
      const p = Math.min(1, g0.age / g0.dur);
      const RgN = g0.Rg;
      // tolerance band
      ctx.beginPath();
      ctx.arc(CX, CY, RgN, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(111,227,216,.16)';
      ctx.lineWidth = g0.tol * 2; ctx.stroke();
      // target ring
      ring(RgN, '#6fe3d8', 2.5, g0.judged ? 0.25 : 0.9);
      // collapsing telegraph ring
      if (!g0.judged){
        const cr = g0.startR + (RgN - g0.startR) * p;
        ring(cr, '#bff3ec', 2, 0.5 + p * 0.4);
        // closing tick marks
        ctx.save();
        ctx.strokeStyle = '#dffaf6'; ctx.lineWidth = 2; ctx.globalAlpha = 0.5;
        for (let k = 0; k < 4; k++){
          const a = k * Math.PI / 2 + brushPhase * 0.4;
          ctx.beginPath();
          ctx.moveTo(CX + Math.cos(a) * (cr - 6), CY + Math.sin(a) * (cr - 6));
          ctx.lineTo(CX + Math.cos(a) * (cr + 6), CY + Math.sin(a) * (cr + 6));
          ctx.stroke();
        }
        ctx.restore();
      }
    }

    // ripples
    for (let i = ripples.length - 1; i >= 0; i--){
      const rp = ripples[i];
      rp.r += dt * 220; rp.a -= dt * 1.6;
      if (rp.a <= 0){ ripples.splice(i, 1); continue; }
      ring(rp.r, rp.col, rp.w, Math.max(0, rp.a));
    }

    // ensō (player)
    if (state === 'play'){
      const near = gate && !gate.judged ? Math.abs(R - gate.Rg) <= gate.tol : false;
      drawEnso(R, near ? '#ffe4a8' : '#f4c77b', near ? 26 : 14);
      // center dot
      ctx.beginPath(); ctx.arc(CX, CY, 3, 0, Math.PI * 2);
      ctx.fillStyle = '#6b6790'; ctx.fill();
    }

    // particles
    for (let i = particles.length - 1; i >= 0; i--){
      const pt = particles[i];
      pt.life -= dt * 1.5;
      if (pt.life <= 0){ particles.splice(i, 1); continue; }
      pt.x += pt.vx * dt; pt.y += pt.vy * dt;
      pt.vx *= 0.97; pt.vy *= 0.97;
      ctx.globalAlpha = Math.max(0, pt.life);
      ctx.fillStyle = pt.col;
      ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.sz, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;

    // floating score text
    for (let i = floats.length - 1; i >= 0; i--){
      const f = floats[i];
      f.life -= dt * 1.1; f.y -= dt * 38;
      if (f.life <= 0){ floats.splice(i, 1); continue; }
      ctx.globalAlpha = Math.max(0, f.life);
      ctx.fillStyle = f.col; ctx.textAlign = 'center';
      ctx.font = '600 19px sans-serif';
      ctx.fillText(f.txt, f.x, f.y);
    }
    ctx.globalAlpha = 1;

    ctx.restore(); // shake

    // flash
    if (flash > 0){
      flash = Math.max(0, flash - dt * 2.2);
      ctx.globalAlpha = flash * 0.32;
      ctx.fillStyle = flashCol; ctx.fillRect(0, 0, W, H);
      ctx.globalAlpha = 1;
    }

    // HUD
    if (state === 'play' || state === 'over'){
      ctx.textAlign = 'right';
      ctx.fillStyle = '#e8e6f0';
      ctx.font = '600 30px sans-serif';
      ctx.fillText(String(score), W - 16, 44);
      ctx.fillStyle = '#9b97b8';
      ctx.font = '12px sans-serif';
      ctx.fillText('BEST ' + best + '   Lv.' + level, W - 16, 64);
      // lives (ink dots)
      for (let i = 0; i < 3; i++){
        ctx.beginPath();
        ctx.arc(W - 22 - i * 22, 84, 6, 0, Math.PI * 2);
        ctx.fillStyle = i < lives ? '#f4c77b' : 'rgba(244,199,123,.22)';
        ctx.fill();
      }
      if (combo > 1 && state === 'play'){
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(244,199,123,.85)';
        ctx.font = '600 15px sans-serif';
        ctx.fillText('連 ×' + combo, CX, H - 24);
      }
    }

    // game over
    if (state === 'over'){
      ctx.fillStyle = 'rgba(8,8,15,.6)'; ctx.fillRect(0, 0, W, H);
      ctx.textAlign = 'center';
      ctx.fillStyle = '#f4c77b';
      ctx.font = '600 ' + Math.round(Math.min(W, H) * 0.12) + 'px serif';
      ctx.fillText('終', CX, H * 0.36);
      ctx.fillStyle = '#e8e6f0';
      ctx.font = '600 44px sans-serif';
      ctx.fillText(String(score), CX, H * 0.5);
      ctx.fillStyle = '#9b97b8';
      ctx.font = '14px sans-serif';
      ctx.fillText('BEST ' + best + '   最長連 ×' + bestCombo, CX, H * 0.5 + 30);
      const pulse = 0.55 + 0.45 * Math.sin(tMenu * 3);
      ctx.globalAlpha = pulse; ctx.fillStyle = '#fff';
      ctx.font = '600 16px sans-serif';
      ctx.fillText('タップでもう一度', CX, H * 0.64);
      ctx.globalAlpha = 1;
    }

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
