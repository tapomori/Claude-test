<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0a0c1a">
<title>Cipher Tap</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
  html, body { height: 100%; background: #0a0c1a; color: #e0e7ff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif; overflow: hidden; touch-action: manipulation; }
  body { background: radial-gradient(ellipse at top, #182250 0%, #0a0c1a 70%); }

  #app { display: flex; flex-direction: column; height: 100%; max-width: 520px; margin: 0 auto; padding: 14px 14px env(safe-area-inset-bottom, 14px); position: relative; }

  .top { display: flex; justify-content: space-between; align-items: center; }
  .back { color: #7ad7ff; text-decoration: none; font-size: 13px; opacity: 0.75; padding: 6px 10px 6px 0; }
  .stats { display: flex; gap: 14px; font-size: 12px; letter-spacing: 0.05em; }
  .stats span { opacity: 0.85; }
  .stats b { color: #ffe28a; font-weight: 700; font-size: 14px; margin-left: 4px; }
  .lives { color: #ff6e8a !important; }

  .pattern-area { margin-top: 22px; padding: 16px 8px; min-height: 80px; display: flex; align-items: center; justify-content: center; }
  .pattern { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; justify-content: center; }
  .glyph { font-size: 46px; font-weight: 700; color: #4a5494; transition: transform 0.18s, color 0.18s, text-shadow 0.18s; line-height: 0.9; min-width: 22px; text-align: center; }
  .glyph.active { color: #ffd96a; text-shadow: 0 0 22px rgba(255, 217, 106, 0.85); transform: scale(1.25); }
  .glyph.done { color: #6affb0; opacity: 0.55; }
  .glyph.miss { color: #ff5e7a; animation: shake 0.32s; }

  .timer-track { height: 5px; background: rgba(255,255,255,0.07); border-radius: 4px; margin: 4px 6px 14px; overflow: hidden; }
  .timer-fill { height: 100%; background: linear-gradient(90deg, #7ad7ff, #b58aff, #ff8ad0); width: 100%; transition: width 80ms linear; box-shadow: 0 0 10px rgba(181, 138, 255, 0.5); }

  .tap-zone { flex: 1; min-height: 280px; border-radius: 28px; background: radial-gradient(circle at 50% 45%, rgba(122, 215, 255, 0.10), rgba(180, 138, 255, 0.04) 55%, transparent 75%); border: 2px solid rgba(122, 215, 255, 0.22); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; transition: background 0.15s, border-color 0.15s, box-shadow 0.2s; }
  .tap-zone.pressing { background: radial-gradient(circle at 50% 45%, rgba(255, 217, 106, 0.22), rgba(255, 140, 80, 0.06) 55%, transparent 75%); border-color: rgba(255, 217, 106, 0.65); box-shadow: inset 0 0 60px rgba(255, 217, 106, 0.15); }
  .tap-hint { color: rgba(220, 230, 255, 0.45); font-size: 13px; letter-spacing: 0.18em; pointer-events: none; transition: opacity 0.2s; }

  .hold-bar { position: absolute; bottom: 14%; left: 12%; right: 12%; height: 16px; background: rgba(255,255,255,0.05); border-radius: 999px; overflow: visible; opacity: 0; transition: opacity 0.15s; }
  .hold-bar.show { opacity: 1; }
  .hold-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #7ad7ff 0%, #ffd96a 55%, #ff8a4c 100%); border-radius: 999px; box-shadow: 0 0 14px rgba(255, 217, 106, 0.6); }
  .hold-marker { position: absolute; top: -5px; bottom: -5px; width: 2px; background: rgba(255,255,255,0.85); border-radius: 2px; }
  .hold-marker.short { left: 28%; }
  .hold-marker.long { left: 60%; }
  .hold-bar::after { content: '·  ─'; position: absolute; top: -22px; left: 14%; right: 14%; display: flex; justify-content: space-between; color: rgba(255,255,255,0.5); font-size: 14px; letter-spacing: 0.1em; }

  .ripple { position: absolute; border-radius: 50%; pointer-events: none; border: 2px solid #ffd96a; width: 24px; height: 24px; animation: ripple 0.55s ease-out forwards; }
  @keyframes ripple { from { transform: translate(-50%,-50%) scale(0.4); opacity: 0.9; } to { transform: translate(-50%,-50%) scale(8); opacity: 0; } }
  @keyframes shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-5px); } 40% { transform: translateX(5px); } 60% { transform: translateX(-3px); } 80% { transform: translateX(3px); } }

  .particle { position: absolute; border-radius: 50%; pointer-events: none; }

  .flash { position: absolute; inset: 0; pointer-events: none; opacity: 0; }
  .flash.success { background: radial-gradient(circle, rgba(106, 255, 176, 0.32), transparent 65%); animation: flashAnim 0.42s; }
  .flash.fail { background: radial-gradient(circle, rgba(255, 94, 122, 0.42), transparent 65%); animation: flashAnim 0.42s; }
  @keyframes flashAnim { 0% { opacity: 0; } 25% { opacity: 1; } 100% { opacity: 0; } }

  .overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(10, 12, 26, 0.97), rgba(20, 25, 60, 0.97)); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; padding: 28px; text-align: center; }
  .overlay h1 { font-size: 34px; margin-bottom: 8px; background: linear-gradient(135deg, #7ad7ff, #ffd96a 50%, #ff8ad0); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: 0.04em; }
  .overlay p { opacity: 0.78; font-size: 13px; margin: 8px 0 4px; line-height: 1.7; }
  .overlay .legend { display: flex; gap: 36px; margin: 20px 0 26px; }
  .overlay .legend > div { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 14px 18px; border-radius: 16px; border: 1px solid rgba(122, 215, 255, 0.25); background: rgba(122, 215, 255, 0.04); }
  .overlay .legend .lg { font-size: 38px; color: #ffd96a; line-height: 0.9; text-shadow: 0 0 16px rgba(255, 217, 106, 0.6); }
  .overlay .legend small { opacity: 0.7; font-size: 10px; letter-spacing: 0.16em; }
  .overlay button { padding: 14px 38px; background: linear-gradient(135deg, #7ad7ff, #b58aff); color: #0a0c1a; border: none; font-weight: 800; font-size: 15px; letter-spacing: 0.12em; border-radius: 999px; cursor: pointer; box-shadow: 0 8px 24px rgba(122, 215, 255, 0.3); }
  .overlay button:active { transform: translateY(1px); }
  .overlay .score-big { font-size: 40px; color: #ffd96a; font-weight: 800; margin: 6px 0 2px; }
  .overlay .sub { font-size: 12px; opacity: 0.55; margin-bottom: 18px; }
</style>
</head>
<body>
<div id="app">
  <div class="top">
    <a class="back" href="../../index.html">‹ ギャラリー</a>
    <div class="stats">
      <span>SCORE<b id="score">0</b></span>
      <span>LV<b id="lv">1</b></span>
      <span>♥<b id="lives" class="lives">3</b></span>
    </div>
  </div>

  <div class="pattern-area">
    <div class="pattern" id="pattern"></div>
  </div>

  <div class="timer-track"><div class="timer-fill" id="timer"></div></div>

  <div class="tap-zone" id="zone">
    <span class="tap-hint" id="hint">TAP &nbsp;OR&nbsp; HOLD</span>
    <div class="hold-bar" id="holdBar">
      <div class="hold-fill" id="holdFill"></div>
      <div class="hold-marker short"></div>
      <div class="hold-marker long"></div>
    </div>
  </div>

  <div class="flash" id="flash"></div>

  <div class="overlay" id="overlay">
    <h1>CIPHER TAP</h1>
    <p>表示された記号を上から順に送信せよ。</p>
    <div class="legend">
      <div><span class="lg">·</span><small>SHORT TAP</small></div>
      <div><span class="lg">─</span><small>HOLD</small></div>
    </div>
    <p style="font-size:11px; opacity:0.55; margin: 0 0 22px;">バー中央の白線2本が短／長の境目。</p>
    <button id="startBtn">START</button>
  </div>
</div>

<script>
(() => {
  const SHORT_MAX = 230;
  const HOLD_MIN  = 380;
  const BAR_FULL  = 600;

  const $ = id => document.getElementById(id);

  let state = {
    score: 0, level: 1, lives: 3,
    pattern: [], idx: 0,
    timeBudget: 0, timerStart: 0,
    pressStart: 0, holding: false, holdRAF: 0,
    timerRAF: 0, running: false,
    lastTouch: null
  };

  function genPattern(level) {
    const len = Math.min(3 + Math.floor((level - 1) / 2), 8);
    const arr = [];
    let prev = null, run = 0;
    for (let i = 0; i < len; i++) {
      let pick = Math.random() < 0.55 ? 'short' : 'long';
      if (pick === prev && run >= 2) pick = (pick === 'short') ? 'long' : 'short';
      if (pick === prev) run++; else { prev = pick; run = 1; }
      arr.push(pick);
    }
    return arr;
  }

  function renderPattern() {
    const el = $('pattern');
    el.innerHTML = '';
    state.pattern.forEach((s, i) => {
      const g = document.createElement('span');
      g.className = 'glyph';
      g.textContent = s === 'short' ? '·' : '─';
      if (i < state.idx) g.classList.add('done');
      else if (i === state.idx) g.classList.add('active');
      el.appendChild(g);
    });
  }

  function startLevel() {
    state.pattern = genPattern(state.level);
    state.idx = 0;
    const base = 4200 + state.pattern.length * 850;
    state.timeBudget = Math.max(2800, base - state.level * 130);
    state.timerStart = performance.now();
    renderPattern();
    if (state.timerRAF) cancelAnimationFrame(state.timerRAF);
    tickTimer();
  }

  function tickTimer() {
    const elapsed = performance.now() - state.timerStart;
    const ratio = Math.max(0, 1 - elapsed / state.timeBudget);
    $('timer').style.width = (ratio * 100) + '%';
    if (ratio <= 0) {
      onTimeout();
      return;
    }
    state.timerRAF = requestAnimationFrame(tickTimer);
  }

  function onTimeout() {
    flash('fail');
    vibrate(120);
    loseLife();
    if (state.running) startLevel();
  }

  function loseLife() {
    state.lives--;
    $('lives').textContent = state.lives;
    if (state.lives <= 0) gameOver();
  }

  function gameOver() {
    state.running = false;
    if (state.timerRAF) cancelAnimationFrame(state.timerRAF);
    const o = $('overlay');
    o.innerHTML = `
      <h1>SIGNAL LOST</h1>
      <div class="score-big">${state.score}</div>
      <div class="sub">到達レベル ${state.level}</div>
      <button id="startBtn">RETRY</button>
    `;
    o.style.display = 'flex';
    $('startBtn').addEventListener('click', startGame);
  }

  function startGame() {
    state.score = 0; state.level = 1; state.lives = 3; state.running = true;
    $('score').textContent = '0';
    $('lv').textContent = '1';
    $('lives').textContent = '3';
    $('overlay').style.display = 'none';
    startLevel();
  }

  function vibrate(p) {
    if (navigator.vibrate) {
      try { navigator.vibrate(p); } catch (e) {}
    }
  }

  function flash(type) {
    const f = $('flash');
    f.className = 'flash';
    void f.offsetWidth;
    f.className = 'flash ' + type;
  }

  function ripple(x, y) {
    const z = $('zone');
    const r = z.getBoundingClientRect();
    const el = document.createElement('div');
    el.className = 'ripple';
    el.style.left = (x - r.left) + 'px';
    el.style.top = (y - r.top) + 'px';
    z.appendChild(el);
    setTimeout(() => el.remove(), 580);
  }

  function burst(x, y, color) {
    const z = $('zone');
    const r = z.getBoundingClientRect();
    const cx = x - r.left, cy = y - r.top;
    const N = 10;
    for (let i = 0; i < N; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = 4 + Math.random() * 5;
      p.style.width = p.style.height = size + 'px';
      p.style.background = color;
      p.style.left = cx + 'px';
      p.style.top = cy + 'px';
      p.style.boxShadow = `0 0 8px ${color}`;
      z.appendChild(p);
      const ang = (i / N) * Math.PI * 2 + Math.random() * 0.6;
      const dist = 40 + Math.random() * 70;
      const dx = Math.cos(ang) * dist;
      const dy = Math.sin(ang) * dist;
      p.animate([
        { transform: 'translate(-50%,-50%)', opacity: 1 },
        { transform: `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`, opacity: 0 }
      ], { duration: 520 + Math.random() * 200, easing: 'cubic-bezier(.2,.7,.3,1)' });
      setTimeout(() => p.remove(), 760);
    }
  }

  function startPress(x, y) {
    if (!state.running) return;
    state.pressStart = performance.now();
    state.holding = true;
    state.lastTouch = { x, y };
    $('zone').classList.add('pressing');
    $('holdBar').classList.add('show');
    $('hint').style.opacity = '0';
    drawHold();
  }

  function drawHold() {
    if (!state.holding) return;
    const dt = performance.now() - state.pressStart;
    const ratio = Math.min(1, dt / BAR_FULL);
    $('holdFill').style.width = (ratio * 100) + '%';
    state.holdRAF = requestAnimationFrame(drawHold);
  }

  function endPress() {
    if (!state.holding) return;
    state.holding = false;
    cancelAnimationFrame(state.holdRAF);
    $('zone').classList.remove('pressing');
    $('holdBar').classList.remove('show');
    setTimeout(() => { $('holdFill').style.width = '0%'; }, 150);
    $('hint').style.opacity = '';

    const dur = performance.now() - state.pressStart;
    let kind;
    if (dur <= SHORT_MAX) kind = 'short';
    else if (dur >= HOLD_MIN) kind = 'long';
    else kind = 'mid';

    const expected = state.pattern[state.idx];
    const t = state.lastTouch;

    if (kind === expected) {
      state.idx++;
      const gain = (kind === 'short') ? 12 : 16;
      state.score += gain;
      $('score').textContent = state.score;
      vibrate(kind === 'long' ? 35 : 18);
      if (t) { ripple(t.x, t.y); burst(t.x, t.y, '#ffd96a'); }
      renderPattern();

      if (state.idx >= state.pattern.length) {
        const remain = parseFloat($('timer').style.width) || 0;
        const bonus = Math.round(remain) + state.level * 5;
        state.score += bonus;
        $('score').textContent = state.score;
        flash('success');
        vibrate([20, 50, 30]);
        state.level++;
        $('lv').textContent = state.level;
        cancelAnimationFrame(state.timerRAF);
        // ステージクリア演出
        document.querySelectorAll('.glyph').forEach((g, i) => {
          setTimeout(() => g.classList.add('done'), i * 50);
        });
        setTimeout(startLevel, 480);
      }
    } else {
      const el = document.querySelectorAll('.glyph')[state.idx];
      if (el) {
        el.classList.add('miss');
        setTimeout(() => el.classList.remove('miss'), 320);
      }
      flash('fail');
      vibrate(150);
      if (t) burst(t.x, t.y, '#ff5e7a');
      // ペナルティ: 残り時間を減らす
      state.timerStart -= 700;
      // 連続ミスでライフ減
      state.misses = (state.misses || 0) + 1;
      if (state.misses >= 2) {
        state.misses = 0;
        loseLife();
        if (state.running) startLevel();
      }
    }
  }

  const z = $('zone');
  z.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    startPress(t.clientX, t.clientY);
  }, { passive: false });
  z.addEventListener('touchend', e => {
    e.preventDefault();
    endPress();
  }, { passive: false });
  z.addEventListener('touchcancel', () => endPress());
  z.addEventListener('mousedown', e => startPress(e.clientX, e.clientY));
  document.addEventListener('mouseup', () => endPress());

  $('startBtn').addEventListener('click', startGame);
})();
</script>
</body>
</html>
