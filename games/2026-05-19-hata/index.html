<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Hata 旗</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; background:#0c0a1a;
    touch-action:manipulation; -webkit-tap-highlight-color:transparent;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif; }
  #c { display:block; width:100vw; height:100vh; touch-action:none; }
  #back { position:fixed; top:env(safe-area-inset-top,8px); left:10px; z-index:10;
    color:#9b8fc0; text-decoration:none; font-size:15px; padding:8px 10px;
    background:rgba(22,16,38,.5); border-radius:12px; backdrop-filter:blur(4px); }
  #back:active { color:#fff; }
</style>
</head>
<body>
<a id="back" href="../../index.html">&larr; 戻る</a>
<canvas id="c"></canvas>
<script>
(function(){
"use strict";
var cv=document.getElementById("c"), ctx=cv.getContext("2d");
var W=0,H=0,DPR=1;

function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2.5);
  W=window.innerWidth; H=window.innerHeight;
  cv.width=W*DPR; cv.height=H*DPR;
  cv.style.width=W+"px"; cv.style.height=H+"px";
  ctx.setTransform(DPR,0,0,DPR,0,0);
  layout();
}
window.addEventListener("resize",resize);

// ---- colours ----
var C_W=[244,240,231], C_R=[226,66,92], GOLD=[255,206,92];
function rgb(c){ return "rgb("+(c[0]|0)+","+(c[1]|0)+","+(c[2]|0)+")"; }
function rgba(c,a){ return "rgba("+(c[0]|0)+","+(c[1]|0)+","+(c[2]|0)+","+a+")"; }

// ---- layout ----
var flags=[], pad={x:0,y:0,r:0,press:0}, poleTop=0,poleBot=0, bannerY=0;
function layout(){
  bannerY=H*0.205;
  poleTop=H*0.355; poleBot=H*0.855;
  flags=[
    { side:"L", lab:"白", col:C_W, x:W*0.255, up:false, y:0, vy:0, drag:0, hit:0, ftr:Math.random()*6 },
    { side:"R", lab:"赤", col:C_R, x:W*0.745, up:true,  y:1, vy:0, drag:0, hit:0, ftr:Math.random()*6 }
  ];
  pad.r=Math.min(W,H)*0.108; pad.x=W*0.5; pad.y=H*0.665;
}

function vib(p){ if(navigator.vibrate){ try{navigator.vibrate(p);}catch(e){} } }

// ---- state ----
var GS_PLAY=0, GS_OVER=1;
var state, score, best=0, lives, combo, correctN, level;
var cmd=null;            // {fi,act,neg,token,stroop}
var rt, rtMax, banAnim, judging;
var parts=[], floats=[], ripples=[], shake=0, vign=0, vignCol=[0,0,0], greenP=0;
var startMsg=true, lastMs=0;

function reset(){
  state=GS_PLAY; score=0; lives=3; combo=0; correctN=0; level=1;
  parts=[]; floats=[]; ripples=[]; shake=0; vign=0; greenP=0;
  flags[0].up=false; flags[0].y=0; flags[1].up=true; flags[1].y=1;
  newRound(true);
}

function newRound(first){
  var fi=Math.random()<0.5?0:1;
  var act=Math.random()<0.5?"up":"down";
  var negP = level<2 ? 0 : Math.min(0.42, 0.16+level*0.045);
  var neg = (!first) && Math.random()<negP;
  var stroop = (!neg) && level>=4 && Math.random()<0.30;
  var token = neg ? "S" : (fi===0?"W":"R")+(act==="up"?"U":"D");
  // make affirmative meaningful: set the flag opposite to the asked state
  if(!neg){
    var f=flags[fi];
    var want = act==="up";
    if(f.up===want){ f.up=!want; }      // ensure a real move is needed
  }
  cmd={ fi:fi, act:act, neg:neg, token:token, stroop:stroop };
  rtMax = Math.max(0.82, 1.95 - level*0.075);
  rt = rtMax; banAnim=0; judging=false;
  startMsg = first && level===1;
}

// ---- judging ----
function resolve(input){       // input token string or "TO" timeout
  if(state!==GS_PLAY || judging || !cmd) return;
  judging=true;
  var ok = (input===cmd.token);
  if(ok){
    correctN++;
    var spd = Math.round((rt/rtMax)*70);
    var gain = 60 + spd + combo*22;
    score += gain; combo++;
    level = 1 + Math.floor(correctN/3);
    floats.push({ x:W/2, y:bannerY+34, t:0, s:"+"+gain });
    greenP=1; vib([0,14,26,14]);
    // animate the named flag to its target on affirmative
    if(!cmd.neg){
      var f=flags[cmd.fi];
      f.up=(cmd.act==="up");
      sparkle(f.x, flagHandY(f), f.col, 16);
    } else {
      ripples.push({ x:pad.x, y:pad.y, r:pad.r*0.5, a:0.6, c:GOLD });
      sparkle(pad.x, pad.y, GOLD, 14);
    }
    setTimeout(function(){ if(state===GS_PLAY) newRound(false); }, 230);
  } else {
    lives--; combo=0;
    shake=1; vign=1; vignCol=[200,40,60];
    vib([0,45,45,45]);
    if(input==="W"||input==="R"){ var ff=flags[input==="W"?0:1]; ff.hit=1; }
    else if(input!=="TO" && input!=="S"){ var s2=input.charAt(0); flags[s2==="W"?0:1].hit=1; }
    if(lives<=0){
      state=GS_OVER; if(score>best)best=score;
    } else {
      setTimeout(function(){ if(state===GS_PLAY) newRound(false); }, 620);
    }
  }
}

function sparkle(x,y,col,n){
  for(var i=0;i<n;i++){
    var a=Math.random()*Math.PI*2, sp=1.5+Math.random()*4.2;
    parts.push({ x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,
      life:1,col:col.slice(),sz:2+Math.random()*3 });
  }
}

// ---- input ----
function pt(e){
  var t=e.touches&&e.touches[0]?e.touches[0]:(e.changedTouches&&e.changedTouches[0]?e.changedTouches[0]:e);
  var rc=cv.getBoundingClientRect();
  return { x:t.clientX-rc.left, y:t.clientY-rc.top };
}
var gx=0,gy=0,gside=null,gpad=false,gactive=false,gmoved=false;

function onDown(e){
  if(e.target&&e.target.id==="back") return;
  e.preventDefault();
  var p=pt(e);
  if(state===GS_OVER){ reset(); return; }
  gactive=true; gmoved=false; gx=p.x; gy=p.y;
  var dxp=p.x-pad.x, dyp=p.y-pad.y;
  if(dxp*dxp+dyp*dyp < (pad.r*1.15)*(pad.r*1.15)){
    gpad=true; gside=null; pad.press=1;
    ripples.push({ x:pad.x,y:pad.y,r:pad.r*0.4,a:0.45,c:[180,170,220] });
    vib(8);
  } else {
    gpad=false; gside = p.x<W/2 ? 0 : 1;
    flags[gside].drag=0.0001;
  }
}
function onMove(e){
  if(!gactive) return;
  e.preventDefault();
  var p=pt(e);
  var dy=p.y-gy, dx=p.x-gx;
  if(gpad){
    var dxp=p.x-pad.x, dyp=p.y-pad.y;
    if(dxp*dxp+dyp*dyp > (pad.r*1.7)*(pad.r*1.7)){ pad.press=0; gpad=false; }
    return;
  }
  if(gside!=null){
    flags[gside].drag = Math.max(-1,Math.min(1, -dy/120 ));
    if(Math.abs(dy)>40 && Math.abs(dy)>Math.abs(dx)*0.55 && !gmoved){
      gmoved=true;
      var dir=dy<0?"U":"D";
      var tok=(gside===0?"W":"R")+dir;
      flags[gside].drag=0;
      flags[gside].vy += dir==="U" ? -0.9 : 0.9;
      resolve(tok);
      gactive=false; gside=null;
    }
  }
}
function onUp(e){
  if(!gactive){ return; }
  e.preventDefault();
  if(gpad){
    if(state===GS_PLAY && !gmoved) resolve("S");
    pad.press=0; gpad=false; gactive=false; return;
  }
  if(gside!=null && !gmoved){
    var p=pt(e), dy=p.y-gy;
    flags[gside].drag=0;
    if(Math.abs(dy)>26){
      var dir=dy<0?"U":"D";
      flags[gside].vy += dir==="U"?-0.8:0.8;
      resolve((gside===0?"W":"R")+dir);
    } else {
      resolve(gside===0?"W":"R");   // tapped a side without a clear swipe → wrong
    }
  }
  gactive=false; gside=null;
}
cv.addEventListener("touchstart",onDown,{passive:false});
cv.addEventListener("touchmove",onMove,{passive:false});
cv.addEventListener("touchend",onUp,{passive:false});
cv.addEventListener("mousedown",onDown,{passive:false});
cv.addEventListener("mousemove",onMove,{passive:false});
cv.addEventListener("mouseup",onUp,{passive:false});

// ---- helpers ----
function flagHandY(f){ return poleBot + (poleTop-poleBot)*f.y; }

// ---- update ----
function update(dt){
  if(state===GS_PLAY && !judging && cmd){
    rt -= dt;
    if(rt<=0){ rt=0; resolve("TO"); }
  }
  banAnim += (1-banAnim)*Math.min(1,dt*9);
  greenP += (0-greenP)*Math.min(1,dt*3.2);
  shake  += (0-shake )*Math.min(1,dt*4.5);
  vign   += (0-vign  )*Math.min(1,dt*2.6);
  if(pad.press>0 && !gpad) pad.press+= (0-pad.press)*Math.min(1,dt*8);

  for(var i=0;i<flags.length;i++){
    var f=flags[i], tgt=f.up?1:0;
    if(gactive && gside===i && !gpad){
      f.y += ((tgt+f.drag*0.5)-f.y)*Math.min(1,dt*16);
    } else {
      var k=120;                       // spring to state with overshoot
      f.vy += (tgt-f.y)*k*dt;
      f.vy *= Math.pow(0.0023,dt);
      f.y += f.vy*dt;
    }
    f.ftr += dt*(3.2+Math.abs(f.vy)*0.6);
    f.hit += (0-f.hit)*Math.min(1,dt*5);
  }
  for(var i=parts.length-1;i>=0;i--){
    var p=parts[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.16; p.vx*=0.98;
    p.life-=dt*1.5; if(p.life<=0)parts.splice(i,1);
  }
  for(var i=floats.length-1;i>=0;i--){
    var fl=floats[i]; fl.t+=dt; fl.y-=dt*44; if(fl.t>1.2)floats.splice(i,1);
  }
  for(var i=ripples.length-1;i>=0;i--){
    var rp=ripples[i]; rp.r+=dt*pad.r*3.0; rp.a-=dt*1.3;
    if(rp.a<=0)ripples.splice(i,1);
  }
}

// ---- draw ----
function drawFlag(f){
  var hx=f.x, hy=flagHandY(f);
  var shk = f.hit*Math.sin(performance.now()*0.05)*7;
  hx+=shk;
  // pole
  ctx.strokeStyle="rgba(255,255,255,.07)"; ctx.lineWidth=4; ctx.lineCap="round";
  ctx.beginPath(); ctx.moveTo(f.x,poleBot+14); ctx.lineTo(f.x,poleTop-8); ctx.stroke();
  ctx.fillStyle="rgba(255,255,255,.05)";
  ctx.beginPath(); ctx.ellipse(f.x,poleBot+20,16,5,0,0,Math.PI*2); ctx.fill();
  // arm + hand
  ctx.strokeStyle="rgba(150,140,180,.5)"; ctx.lineWidth=7;
  ctx.beginPath(); ctx.moveTo(f.x,poleBot+10); ctx.lineTo(hx,hy); ctx.stroke();
  ctx.fillStyle="#c8bee0";
  ctx.beginPath(); ctx.arc(hx,hy,10,0,Math.PI*2); ctx.fill();
  // stick
  var dir=f.side==="L"?-1:1;
  var stk=Math.min(W*0.20,118);
  ctx.strokeStyle="#a99ccb"; ctx.lineWidth=4; ctx.lineCap="round";
  ctx.beginPath(); ctx.moveTo(hx,hy); ctx.lineTo(hx+dir*stk,hy-stk*0.16); ctx.stroke();
  // cloth (fluttering triangle pennant)
  var bx=hx+dir*14, by=hy-2;
  var tx=hx+dir*stk, ty=hy-stk*0.16;
  var fw=Math.sin(f.ftr)*5 + Math.sin(f.ftr*1.7)*3;
  ctx.beginPath();
  ctx.moveTo(bx,by-18);
  ctx.quadraticCurveTo((bx+tx)/2, by-26+fw, tx, ty-2+fw*0.5);
  ctx.quadraticCurveTo((bx+tx)/2, by+10+fw*0.6, bx, by+20);
  ctx.closePath();
  var g=ctx.createLinearGradient(bx,by,tx,ty);
  g.addColorStop(0,rgb(f.col));
  g.addColorStop(1,rgb([f.col[0]*0.72+10,f.col[1]*0.72+10,f.col[2]*0.72+10]));
  ctx.fillStyle=g; ctx.fill();
  ctx.strokeStyle="rgba(255,255,255,.18)"; ctx.lineWidth=1.5; ctx.stroke();
  // label on cloth
  ctx.fillStyle = f.lab==="白" ? "#3a2f4a" : "#fff";
  ctx.font="700 17px 'Hiragino Sans',sans-serif"; ctx.textAlign="center";
  ctx.fillText(f.lab, bx+dir*22, by+5+fw*0.3);
}

function draw(){
  var sx=(Math.random()-0.5)*shake*9, sy=(Math.random()-0.5)*shake*9;
  ctx.save(); ctx.translate(sx,sy);

  var bg=ctx.createRadialGradient(W/2,H*0.32,0,W/2,H*0.32,Math.max(W,H)*0.85);
  bg.addColorStop(0,"#1a142e"); bg.addColorStop(1,"#090714");
  ctx.fillStyle=bg; ctx.fillRect(-20,-20,W+40,H+40);

  // HUD
  ctx.textAlign="left"; ctx.font="700 19px sans-serif"; ctx.fillStyle="#d3c7ec";
  ctx.fillText(score, W*0.5-26, H*0.075);
  ctx.textAlign="right";
  for(var i=0;i<3;i++){
    ctx.fillStyle = i<lives ? rgb(C_R) : "rgba(255,255,255,.13)";
    ctx.font="16px sans-serif";
    ctx.fillText("●", W-16-i*22, H*0.075);
  }
  if(combo>1){
    ctx.textAlign="center"; ctx.fillStyle=rgba(GOLD,.9); ctx.font="700 15px sans-serif";
    ctx.fillText(combo+" れんぱつ", W/2, H*0.115);
  }

  // command banner
  if(cmd){
    var sc=0.7+banAnim*0.3;
    ctx.save(); ctx.translate(W/2,bannerY); ctx.scale(sc,sc);
    ctx.globalAlpha=banAnim;
    var fcol = cmd.fi===0?C_W:C_R;
    var wcol = cmd.stroop ? (cmd.fi===0?C_R:C_W) : fcol;
    var actTxt = cmd.act==="up"?"あげて":"さげて";
    var negTxt = cmd.neg?"ないで":"";
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.font="800 44px 'Hiragino Sans',sans-serif";
    var fw = cmd.fi===0?"白":"赤";
    var w1=ctx.measureText(fw).width;
    ctx.font="800 36px 'Hiragino Sans',sans-serif";
    var w2=ctx.measureText(actTxt+negTxt).width;
    var gap=14, tot=w1+gap+w2, x0=-tot/2;
    ctx.font="800 44px 'Hiragino Sans',sans-serif";
    ctx.fillStyle=rgb(wcol);
    ctx.fillText(fw, x0+w1/2, 0);
    ctx.font="800 36px 'Hiragino Sans',sans-serif";
    ctx.fillStyle = cmd.neg ? "#ff7d97" : "#e8e0ff";
    ctx.fillText(actTxt+negTxt, x0+w1+gap+w2/2, 2);
    ctx.restore();
    ctx.globalAlpha=1;
    // timer arc
    var fr=Math.max(0,rt/rtMax);
    ctx.beginPath();
    ctx.arc(W/2,bannerY,46,-Math.PI/2,-Math.PI/2+Math.PI*2*fr);
    ctx.strokeStyle = fr<0.35 ? "#ff5f7d" : rgba(GOLD,.7);
    ctx.lineWidth=4; ctx.lineCap="round"; ctx.stroke();
  }

  // flags
  for(var i=0;i<flags.length;i++) drawFlag(flags[i]);

  // ripples
  for(var i=0;i<ripples.length;i++){
    var rp=ripples[i];
    ctx.beginPath(); ctx.arc(rp.x,rp.y,rp.r,0,Math.PI*2);
    ctx.strokeStyle=rgba(rp.c,rp.a); ctx.lineWidth=3; ctx.stroke();
  }

  // 待て pad
  var pp=pad.press;
  ctx.save();
  ctx.translate(pad.x,pad.y+pp*4);
  var glow=cmd&&cmd.neg?0.5:0.18;
  var pg=ctx.createRadialGradient(0,-pad.r*0.3,2,0,0,pad.r);
  pg.addColorStop(0, "rgba(120,108,160,"+(0.5+glow)+")");
  pg.addColorStop(1, "rgba(46,38,72,.65)");
  ctx.beginPath(); ctx.arc(0,0,pad.r,0,Math.PI*2); ctx.fillStyle=pg; ctx.fill();
  ctx.lineWidth=2;
  ctx.strokeStyle = cmd&&cmd.neg ? rgba(GOLD,.75) : "rgba(255,255,255,.16)";
  ctx.stroke();
  ctx.fillStyle="#e9e2ff"; ctx.font="700 22px 'Hiragino Sans',sans-serif";
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText("待て",0,1);
  ctx.restore();
  ctx.textBaseline="alphabetic";

  // particles
  for(var i=0;i<parts.length;i++){
    var p=parts[i];
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=rgb(p.col);
    ctx.beginPath(); ctx.arc(p.x,p.y,p.sz,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  // floats
  for(var i=0;i<floats.length;i++){
    var fl=floats[i];
    ctx.globalAlpha=Math.max(0,1-fl.t/1.2);
    ctx.fillStyle=rgb(GOLD); ctx.font="700 22px sans-serif"; ctx.textAlign="center";
    ctx.fillText(fl.s, fl.x, fl.y);
  }
  ctx.globalAlpha=1;

  // green correct pulse
  if(greenP>0.01){
    ctx.fillStyle="rgba(120,230,160,"+greenP*0.16+")";
    ctx.fillRect(-20,-20,W+40,H+40);
  }
  // hint
  if(startMsg){
    ctx.fillStyle="rgba(190,180,220,.78)"; ctx.font="14px sans-serif"; ctx.textAlign="center";
    ctx.fillText("コマンド通りに旗をスワイプ", W/2, H*0.30);
    ctx.fillStyle="rgba(255,206,92,.85)"; ctx.font="13px sans-serif";
    ctx.fillText("「ないで」が付いたら 中央の 待て を押さえる", W/2, H*0.30+22);
  }

  ctx.restore();

  // vignette
  if(vign>0.01){
    var vg=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.3,W/2,H/2,Math.max(W,H)*0.7);
    vg.addColorStop(0,"rgba(0,0,0,0)");
    vg.addColorStop(1,rgba(vignCol,vign*0.5));
    ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
  }

  // game over
  if(state===GS_OVER){
    ctx.fillStyle="rgba(8,6,18,.8)"; ctx.fillRect(0,0,W,H);
    ctx.textAlign="center";
    ctx.fillStyle="#fff"; ctx.font="800 30px 'Hiragino Sans',sans-serif";
    ctx.fillText("おしまい", W/2, H*0.40);
    ctx.fillStyle=rgb(GOLD); ctx.font="800 46px sans-serif";
    ctx.fillText(score, W/2, H*0.40+58);
    ctx.fillStyle="#bcaee0"; ctx.font="16px sans-serif";
    ctx.fillText("成功 "+correctN+" 回 ・ 最高 "+Math.max(best,score), W/2, H*0.40+92);
    ctx.fillStyle="#d6cbf0"; ctx.font="600 17px sans-serif";
    ctx.fillText("タップでもう一度", W/2, H*0.40+134);
  }
}

var raf;
function loop(now){
  var dt=(now-lastMs)/1000; if(dt>0.05)dt=0.05; lastMs=now;
  update(dt); draw();
  raf=requestAnimationFrame(loop);
}

resize();
reset();
lastMs=performance.now();
raf=requestAnimationFrame(loop);
})();
</script>
</body>
</html>
