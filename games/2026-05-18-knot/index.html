<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#070912">
<title>Knot</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:#070912;
    font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif; }
  #wrap { position:fixed; inset:0; touch-action:none; }
  canvas { display:block; width:100%; height:100%; }

  .hud { position:fixed; top:0; left:0; right:0; padding:14px 18px;
    display:flex; align-items:center; justify-content:space-between;
    color:#cfe8ff; font-size:15px; letter-spacing:.04em; pointer-events:none;
    text-shadow:0 0 8px rgba(80,200,255,.5); z-index:5; }
  .hud a { pointer-events:auto; color:#9fd0ff; text-decoration:none;
    font-size:14px; opacity:.8; padding:6px 4px; }
  .hud .stat { font-weight:700; }
  .bar-wrap { position:fixed; top:46px; left:18px; right:18px; height:5px;
    border-radius:3px; background:rgba(255,255,255,.08); overflow:hidden; z-index:5;
    pointer-events:none; }
  #bar { height:100%; width:100%; border-radius:3px;
    background:linear-gradient(90deg,#3df0ff,#7a6bff);
    box-shadow:0 0 10px rgba(90,200,255,.7); transition:width .12s linear; }

  .screen { position:fixed; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; z-index:10;
    background:radial-gradient(ellipse at 50% 40%,rgba(20,30,55,.55),rgba(7,9,18,.92));
    color:#eaf4ff; padding:30px; transition:opacity .3s; }
  .screen.hide { opacity:0; pointer-events:none; }
  .title { font-size:54px; font-weight:800; letter-spacing:.12em;
    background:linear-gradient(90deg,#5cf0ff,#9b8bff);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 0 18px rgba(110,190,255,.5)); }
  .sub { margin-top:18px; font-size:16px; color:#a9c4e6; line-height:1.7; }
  .big { margin-top:8px; font-size:20px; color:#eaf4ff; font-weight:700; }
  .cta { margin-top:34px; font-size:15px; color:#7fb6e8; letter-spacing:.18em;
    animation:pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.35} 50%{opacity:1} }
  .demo { margin-top:30px; }
</style>
</head>
<body>
<div id="wrap"><canvas id="cv"></canvas></div>

<div class="hud">
  <a href="../../index.html">← ギャラリー</a>
  <span class="stat" id="lvl">結び目 1</span>
  <span class="stat" id="cnt">0</span>
</div>
<div class="bar-wrap"><div id="bar"></div></div>

<div class="screen" id="start">
  <div class="title">KNOT</div>
  <svg class="demo" width="120" height="70" viewBox="0 0 120 70">
    <line x1="20" y1="15" x2="100" y2="55" stroke="#ff6a6a" stroke-width="3"/>
    <line x1="20" y1="55" x2="100" y2="15" stroke="#ff6a6a" stroke-width="3"/>
    <circle cx="20" cy="35" r="8" fill="#5cf0ff"/>
    <circle cx="60" cy="35" r="8" fill="#5cf0ff"/>
    <circle cx="100" cy="35" r="8" fill="#5cf0ff"/>
  </svg>
  <div class="sub">光の点をつまんでずらし<br>糸が交わらない形に<b>ほどく</b></div>
  <div class="cta">タップして はじめる</div>
</div>

<div class="screen hide" id="over">
  <div class="title" style="font-size:40px">TIME UP</div>
  <div class="big" id="result">ほどいた結び目 0</div>
  <div class="sub" id="best">自己ベスト 0</div>
  <div class="cta">タップして もう一度</div>
</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let W=0, H=0, DPR=1;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2.5);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W*DPR; cv.height = H*DPR;
  cv.style.width = W+'px'; cv.style.height = H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize', resize);
resize();

const startEl=document.getElementById('start');
const overEl=document.getElementById('over');
const barEl=document.getElementById('bar');
const lvlEl=document.getElementById('lvl');
const cntEl=document.getElementById('cnt');
const resultEl=document.getElementById('result');
const bestEl=document.getElementById('best');

const TOTAL=90;          // 制限時間(秒)
const SOLVE_BONUS=6;     // 1問ほどくごとの加算秒
let nodes=[], edges=[];
let cleared=0, level=0;
let timeLeft=TOTAL, running=false, lastT=0;
let dragIdx=-1, solving=false, solveT=0;
let particles=[];

function bounds(){
  return { x0:34, y0:120, x1:W-34, y1:H-46 };
}

// --- レベル生成: 環(ポリゴン)をシャッフルし、必ず交差が残る配置に ---
function buildLevel(){
  const n = Math.min(5 + level, 13);
  const b = bounds();
  edges = [];
  for(let i=0;i<n;i++) edges.push([i,(i+1)%n]);
  let tries=0;
  do{
    nodes = [];
    for(let i=0;i<n;i++){
      nodes.push({
        x: b.x0 + Math.random()*(b.x1-b.x0),
        y: b.y0 + Math.random()*(b.y1-b.y0),
        bornR:0, grab:0
      });
    }
    tries++;
  } while(crossingCount()===0 && tries<40);
  solving=false; solveT=0;
  lvlEl.textContent='結び目 '+(cleared+1);
}

// 線分 p1p2 と p3p4 が交差するか(端点共有は別処理で除外)
function ccw(a,b,c){ return (c.y-a.y)*(b.x-a.x) > (b.y-a.y)*(c.x-a.x); }
function segCross(a,b,c,d){
  return ccw(a,c,d)!==ccw(b,c,d) && ccw(a,b,c)!==ccw(a,b,d);
}
function adjacent(i,j){
  const [a1,a2]=edges[i], [b1,b2]=edges[j];
  return a1===b1||a1===b2||a2===b1||a2===b2;
}
let crossSet=new Set();
function crossingCount(){
  crossSet=new Set();
  let c=0;
  for(let i=0;i<edges.length;i++){
    for(let j=i+1;j<edges.length;j++){
      if(adjacent(i,j)) continue;
      const a=nodes[edges[i][0]], b=nodes[edges[i][1]];
      const cN=nodes[edges[j][0]], dN=nodes[edges[j][1]];
      if(segCross(a,b,cN,dN)){ c++; crossSet.add(i); crossSet.add(j); }
    }
  }
  return c;
}

function spawnBurst(x,y,col,num){
  for(let k=0;k<num;k++){
    const a=Math.random()*Math.PI*2, sp=1+Math.random()*3.4;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      life:1, col, r:1.5+Math.random()*2.5});
  }
}

function start(){
  cleared=0; level=0; timeLeft=TOTAL; particles=[];
  buildLevel();
  cntEl.textContent='0';
  startEl.classList.add('hide');
  overEl.classList.add('hide');
  running=true; lastT=performance.now();
  requestAnimationFrame(loop);
}

function gameOver(){
  running=false;
  const best=Math.max(cleared, +(localStorage.getItem('knot_best')||0));
  localStorage.setItem('knot_best', best);
  resultEl.textContent='ほどいた結び目 '+cleared;
  bestEl.textContent='自己ベスト '+best;
  overEl.classList.remove('hide');
}

// --- 入力 ---
function pt(e){
  const t=e.touches?e.touches[0]:e;
  return {x:t.clientX, y:t.clientY};
}
function grabRadius(){ return Math.max(34, Math.min(W,H)*0.07); }

function onDown(e){
  if(!running){ return; }
  if(solving) return;
  const p=pt(e);
  let best=-1, bd=grabRadius()*grabRadius();
  for(let i=0;i<nodes.length;i++){
    const dx=nodes[i].x-p.x, dy=nodes[i].y-p.y, d=dx*dx+dy*dy;
    if(d<bd){ bd=d; best=i; }
  }
  if(best>=0){
    dragIdx=best;
    nodes[best].grab=1;
    nodes[best].bornR=1;
    spawnBurst(nodes[best].x,nodes[best].y,'140,230,255',8);
    if(navigator.vibrate) navigator.vibrate(8);
  }
}
function onMove(e){
  if(dragIdx<0) return;
  e.preventDefault();
  const p=pt(e), b=bounds();
  nodes[dragIdx].x=Math.max(b.x0,Math.min(b.x1,p.x));
  nodes[dragIdx].y=Math.max(b.y0,Math.min(b.y1,p.y));
}
function onUp(){
  if(dragIdx>=0){ nodes[dragIdx].grab=0; dragIdx=-1; }
}

const wrap=document.getElementById('wrap');
wrap.addEventListener('touchstart', e=>{e.preventDefault();onDown(e);}, {passive:false});
wrap.addEventListener('touchmove', onMove, {passive:false});
wrap.addEventListener('touchend', e=>{e.preventDefault();onUp();}, {passive:false});
wrap.addEventListener('mousedown', onDown);
wrap.addEventListener('mousemove', e=>{ if(dragIdx>=0) onMove(e); });
wrap.addEventListener('mouseup', onUp);

startEl.addEventListener('click', start);
overEl.addEventListener('click', start);

// --- 描画ループ ---
function loop(now){
  if(!running) return;
  const dt=Math.min((now-lastT)/1000, 0.05);
  lastT=now;

  if(!solving){
    timeLeft-=dt;
    if(timeLeft<=0){ timeLeft=0; draw(); gameOver(); return; }
  }

  const xc = crossingCount();

  if(!solving && xc===0){
    solving=true; solveT=0;
    cleared++; level++;
    cntEl.textContent=cleared;
    timeLeft=Math.min(TOTAL, timeLeft+SOLVE_BONUS);
    for(const nd of nodes) spawnBurst(nd.x,nd.y,'150,255,220',14);
    if(navigator.vibrate) navigator.vibrate([18,40,22]);
  }
  if(solving){
    solveT+=dt;
    if(solveT>0.95) buildLevel();
  }

  // particles
  for(const p of particles){
    p.x+=p.vx; p.y+=p.vy; p.vx*=0.94; p.vy*=0.94; p.life-=dt*1.7;
  }
  particles=particles.filter(p=>p.life>0);

  for(const nd of nodes){
    if(nd.bornR>0) nd.bornR=Math.max(0,nd.bornR-dt*2.2);
    nd.grab += ((dragIdx>=0&&nodes[dragIdx]===nd?1:0)-nd.grab)*Math.min(1,dt*14);
  }

  draw(xc);
  barEl.style.width=(timeLeft/TOTAL*100)+'%';
  requestAnimationFrame(loop);
}

function draw(xc){
  // 背景
  const g=ctx.createRadialGradient(W/2,H*0.42,40, W/2,H*0.42, Math.max(W,H)*0.85);
  g.addColorStop(0,'#10182c'); g.addColorStop(1,'#070912');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  const solved = solving;
  const pulse = solved ? (1+Math.sin(performance.now()*0.012)*0.25) : 1;

  // edges
  ctx.lineCap='round';
  for(let i=0;i<edges.length;i++){
    const a=nodes[edges[i][0]], b=nodes[edges[i][1]];
    const bad = !solved && crossSet.has(i);
    ctx.beginPath();
    ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
    if(bad){
      ctx.strokeStyle='rgba(255,98,98,0.95)';
      ctx.lineWidth=4; ctx.shadowColor='rgba(255,70,70,0.9)'; ctx.shadowBlur=14;
    } else if(solved){
      ctx.strokeStyle='rgba(150,255,210,0.95)';
      ctx.lineWidth=4.5*pulse; ctx.shadowColor='rgba(120,255,200,0.9)'; ctx.shadowBlur=20;
    } else {
      ctx.strokeStyle='rgba(96,206,255,0.85)';
      ctx.lineWidth=3.2; ctx.shadowColor='rgba(80,190,255,0.7)'; ctx.shadowBlur=12;
    }
    ctx.stroke();
  }
  ctx.shadowBlur=0;

  // nodes
  for(const nd of nodes){
    if(nd.bornR>0){
      ctx.beginPath();
      ctx.arc(nd.x,nd.y, 18+(1-nd.bornR)*42, 0, Math.PI*2);
      ctx.strokeStyle='rgba(140,230,255,'+(nd.bornR*0.5)+')';
      ctx.lineWidth=2; ctx.stroke();
    }
    const r=13 + nd.grab*7;
    const rg=ctx.createRadialGradient(nd.x,nd.y,1, nd.x,nd.y, r+12);
    rg.addColorStop(0, solved?'#d6ffe9':'#dff4ff');
    rg.addColorStop(0.45, solved?'#6effb9':'#5cd6ff');
    rg.addColorStop(1,'rgba(60,150,220,0)');
    ctx.fillStyle=rg;
    ctx.beginPath(); ctx.arc(nd.x,nd.y, r+12, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(nd.x,nd.y, r, 0, Math.PI*2);
    ctx.fillStyle= solved?'#bfffe0':'#eaf8ff'; ctx.fill();
  }

  // particles
  for(const p of particles){
    ctx.beginPath();
    ctx.arc(p.x,p.y, p.r*p.life+0.5, 0, Math.PI*2);
    ctx.fillStyle='rgba('+p.col+','+p.life+')';
    ctx.fill();
  }
}
</script>
</body>
</html>
