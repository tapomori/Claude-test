<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0518">
<title>Lotus Bloom</title>
<style>
:root { color-scheme: dark; }
* {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #0a0518;
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans", sans-serif;
  color: #fff;
  touch-action: manipulation;
  user-select: none;
  -webkit-user-select: none;
  overscroll-behavior: none;
}
canvas {
  display: block;
  width: 100vw; height: 100vh;
  touch-action: none;
}
.hud {
  position: fixed;
  top: calc(env(safe-area-inset-top, 0px) + 14px);
  left: 0; right: 0;
  text-align: center;
  font-size: 11px;
  letter-spacing: 0.4em;
  color: #9b82d8;
  pointer-events: none;
  z-index: 5;
}
.hud .score {
  font-size: 42px;
  font-weight: 200;
  color: #fff;
  letter-spacing: 0.04em;
  margin-top: 2px;
  text-shadow: 0 0 24px rgba(255, 140, 220, 0.55);
  font-variant-numeric: tabular-nums;
}
.back {
  position: fixed;
  top: calc(env(safe-area-inset-top, 0px) + 12px);
  left: 14px;
  color: #c9b6ff;
  font-size: 12px;
  text-decoration: none;
  background: rgba(20, 10, 40, 0.55);
  border: 1px solid #3e2c66;
  border-radius: 18px;
  padding: 7px 13px;
  z-index: 10;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  letter-spacing: 0.1em;
}
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(8, 4, 22, 0.78);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  transition: opacity 0.35s ease;
  padding: 24px;
}
.overlay h1 {
  font-size: 30px;
  font-weight: 200;
  letter-spacing: 0.45em;
  margin-bottom: 18px;
  color: #ffc7ea;
  text-shadow: 0 0 30px rgba(255, 120, 200, 0.6);
}
.overlay p {
  color: #b5a0e8;
  font-size: 13px;
  line-height: 1.8;
  text-align: center;
  letter-spacing: 0.08em;
  max-width: 280px;
}
.overlay .big {
  font-size: 64px;
  font-weight: 100;
  color: #fff;
  letter-spacing: 0.04em;
  margin: 8px 0 0;
  font-variant-numeric: tabular-nums;
  text-shadow: 0 0 32px rgba(255, 140, 220, 0.6);
}
.overlay .sublabel {
  color: #8a7ab8;
  font-size: 10px;
  letter-spacing: 0.4em;
  margin-bottom: 26px;
}
.overlay .best {
  color: #ffd9a8;
  font-size: 12px;
  letter-spacing: 0.25em;
  margin-bottom: 28px;
}
.overlay button {
  background: linear-gradient(135deg, #ff80c8, #a070ff);
  color: #fff;
  border: none;
  border-radius: 30px;
  padding: 14px 42px;
  font-size: 13px;
  letter-spacing: 0.35em;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 10px 30px rgba(255, 128, 200, 0.45);
  margin-top: 20px;
}
.overlay button:active { transform: scale(0.95); }
.hidden { opacity: 0; pointer-events: none; }
.hint {
  margin-top: 18px;
  color: #9182c2;
  font-size: 11px;
  letter-spacing: 0.18em;
}
</style>
</head>
<body>
<a class="back" href="../../index.html">‹ もどる</a>
<div class="hud">
  <div>L O T U S &nbsp; B L O O M</div>
  <div class="score" id="score">0</div>
</div>
<canvas id="c"></canvas>

<div class="overlay" id="start">
  <h1>L O T U S</h1>
  <p>枯れかけた花弁を タップして<br>蓮を 咲かせ続けて</p>
  <button id="startBtn">はじめる</button>
  <div class="hint">ぎりぎりで救うほど 高得点</div>
</div>

<div class="overlay hidden" id="over">
  <h1>WILTED</h1>
  <div class="big" id="finalScore">0</div>
  <div class="sublabel">S C O R E</div>
  <div class="best" id="bestLine"></div>
  <button id="retryBtn">もう一度</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, DPR;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2.5);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resize();
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 100));

const STATE = { IDLE: 0, PLAY: 1, OVER: 2 };
let state = STATE.IDLE;

let petals = [];
let particles = [];
let ripples = [];
let sparkles = [];
let backgroundMotes = [];

let score = 0;
let elapsed = 0;
let spawnTimer = 5;
let lastTime = 0;
let shake = 0;
let bestScore = parseInt(localStorage.getItem('lotusBloomBest') || '0', 10);

function center() {
  return { x: W / 2, y: H * 0.55 };
}

const PETAL_ROOT_R = 56;
const PETAL_MAX_LEN = 110;
const PETAL_HIT_R = 62;

for (let i = 0; i < 24; i++) {
  backgroundMotes.push({
    x: Math.random(),
    y: Math.random(),
    vy: 0.005 + Math.random() * 0.015,
    size: 0.5 + Math.random() * 1.5,
    hue: 270 + Math.random() * 80,
    phase: Math.random() * Math.PI * 2
  });
}

function nextAngle() {
  if (petals.length === 0) return -Math.PI / 2;
  const angles = petals.map(p => ((p.angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2)).sort((a, b) => a - b);
  let bestGap = -1, bestAng = -Math.PI / 2;
  for (let i = 0; i < angles.length; i++) {
    const a1 = angles[i];
    const a2 = i === angles.length - 1 ? angles[0] + Math.PI * 2 : angles[i + 1];
    const gap = a2 - a1;
    if (gap > bestGap) {
      bestGap = gap;
      bestAng = a1 + gap / 2;
    }
  }
  return bestAng;
}

function makePetal(angle, fullyOpen) {
  const hue = 290 + Math.random() * 70;
  return {
    angle,
    openness: fullyOpen ? 100 : 0,
    decay: 7 + Math.min(9, elapsed * 0.18),
    hue,
    pulse: fullyOpen ? 0 : 0.6,
    age: fullyOpen ? 1.5 : 0,
    sway: Math.random() * Math.PI * 2,
    swaySpeed: 0.45 + Math.random() * 0.5,
    wasCritical: false
  };
}

function spawnPetal() {
  petals.push(makePetal(nextAngle(), false));
}

function startGame() {
  petals = [];
  particles = [];
  ripples = [];
  sparkles = [];
  score = 0;
  elapsed = 0;
  spawnTimer = 6;
  shake = 0;
  for (let i = 0; i < 5; i++) {
    const p = makePetal(-Math.PI / 2 + (i / 5) * Math.PI * 2, true);
    p.hue = 290 + (i / 5) * 65;
    petals.push(p);
  }
  state = STATE.PLAY;
  document.getElementById('start').classList.add('hidden');
  document.getElementById('over').classList.add('hidden');
  lastTime = performance.now();
}

function gameOver() {
  if (state === STATE.OVER) return;
  state = STATE.OVER;
  shake = 18;
  const sc = Math.floor(score);
  let newBest = false;
  if (sc > bestScore) {
    bestScore = sc;
    localStorage.setItem('lotusBloomBest', String(bestScore));
    newBest = true;
  }
  document.getElementById('finalScore').textContent = sc;
  document.getElementById('bestLine').textContent = newBest ? '★ NEW BEST ' + bestScore : 'BEST ' + bestScore;
  setTimeout(() => {
    document.getElementById('over').classList.remove('hidden');
  }, 700);
  if (navigator.vibrate) navigator.vibrate([40, 60, 80]);
}

function addParticles(x, y, hue, n, speed) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const v = speed * (0.35 + Math.random() * 0.9);
    particles.push({
      x, y,
      vx: Math.cos(a) * v,
      vy: Math.sin(a) * v - 0.6,
      life: 1,
      decay: 0.015 + Math.random() * 0.022,
      hue: hue + (Math.random() - 0.5) * 30,
      size: 2 + Math.random() * 3
    });
  }
}

function addRipple(x, y, hue) {
  ripples.push({ x, y, r: 8, life: 1, hue });
}

function addSparkle(x, y, hue) {
  for (let i = 0; i < 7; i++) {
    sparkles.push({
      x: x + (Math.random() - 0.5) * 36,
      y: y + (Math.random() - 0.5) * 36,
      vy: -0.4 - Math.random() * 0.8,
      life: 1,
      hue: hue + (Math.random() - 0.5) * 20,
      size: 1.5 + Math.random() * 2.5,
      phase: Math.random() * Math.PI * 2
    });
  }
}

function petalMid(p) {
  const c = center();
  const grow = Math.min(1, p.age / 0.5);
  const len = PETAL_MAX_LEN * grow * (0.35 + 0.65 * (p.openness / 100));
  const sway = Math.sin(elapsed * p.swaySpeed + p.sway) * 0.07;
  const ang = p.angle + sway;
  const midR = PETAL_ROOT_R + len * 0.5;
  return {
    x: c.x + Math.cos(ang) * midR,
    y: c.y + Math.sin(ang) * midR,
    ang,
    len
  };
}

function tapAt(x, y) {
  if (state !== STATE.PLAY) return;
  let bestI = -1, bestD = PETAL_HIT_R * PETAL_HIT_R;
  for (let i = 0; i < petals.length; i++) {
    const pp = petalMid(petals[i]);
    const dx = pp.x - x, dy = pp.y - y;
    const d = dx * dx + dy * dy;
    if (d < bestD) { bestD = d; bestI = i; }
  }
  if (bestI >= 0) {
    const p = petals[bestI];
    const pp = petalMid(p);
    const restoreAmount = 100 - p.openness;
    const dangerBonus = p.openness < 25 ? 25 : (p.openness < 50 ? 10 : 0);
    p.openness = 100;
    p.pulse = 1;
    p.wasCritical = false;
    addParticles(pp.x, pp.y, p.hue, 14, 4);
    addRipple(pp.x, pp.y, p.hue);
    if (restoreAmount > 55) addSparkle(pp.x, pp.y, p.hue);
    score += 4 + Math.floor(restoreAmount * 0.35) + dangerBonus;
    if (navigator.vibrate) navigator.vibrate(dangerBonus > 0 ? 22 : 9);
  } else {
    addRipple(x, y, 260);
    ripples[ripples.length - 1].weak = true;
  }
}

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  for (const t of e.changedTouches) {
    tapAt(t.clientX - r.left, t.clientY - r.top);
  }
}, { passive: false });

canvas.addEventListener('mousedown', (e) => {
  const r = canvas.getBoundingClientRect();
  tapAt(e.clientX - r.left, e.clientY - r.top);
});

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('retryBtn').addEventListener('click', startGame);

function update(dt) {
  elapsed += dt;
  if (shake > 0) shake = Math.max(0, shake - dt * 40);

  spawnTimer -= dt;
  const targetCount = Math.min(8, 5 + Math.floor(elapsed / 16));
  if (spawnTimer <= 0 && petals.length < targetCount) {
    spawnPetal();
    spawnTimer = 5 + Math.random() * 2;
  }

  for (let i = petals.length - 1; i >= 0; i--) {
    const p = petals[i];
    p.age += dt;
    if (p.age > 0.5) {
      const decay = p.decay + elapsed * 0.05;
      p.openness -= decay * dt;
    }
    if (p.openness <= 0) {
      const pp = petalMid(p);
      addParticles(pp.x, pp.y, p.hue, 26, 3);
      addParticles(pp.x, pp.y, 0, 12, 2);
      gameOver();
      return;
    }
    p.pulse *= Math.pow(0.0008, dt);
    if (p.openness < 22 && !p.wasCritical) {
      p.wasCritical = true;
    }
  }

  score += dt * 2.5;

  for (let i = particles.length - 1; i >= 0; i--) {
    const pt = particles[i];
    pt.x += pt.vx;
    pt.y += pt.vy;
    pt.vx *= 0.955;
    pt.vy = pt.vy * 0.955 + 0.05;
    pt.life -= pt.decay;
    if (pt.life <= 0) particles.splice(i, 1);
  }

  for (let i = ripples.length - 1; i >= 0; i--) {
    const r = ripples[i];
    r.r += dt * 240;
    r.life -= dt * 1.7;
    if (r.life <= 0) ripples.splice(i, 1);
  }

  for (let i = sparkles.length - 1; i >= 0; i--) {
    const s = sparkles[i];
    s.life -= dt * 0.85;
    s.y += s.vy;
    s.vy *= 0.97;
    s.phase += dt * 8;
    if (s.life <= 0) sparkles.splice(i, 1);
  }

  for (const m of backgroundMotes) {
    m.y -= m.vy * dt;
    m.phase += dt * 0.8;
    if (m.y < -0.05) { m.y = 1.05; m.x = Math.random(); }
  }
}

function drawBackground() {
  const c = center();
  const bg = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, Math.max(W, H) * 0.9);
  bg.addColorStop(0, '#221036');
  bg.addColorStop(0.55, '#0d0626');
  bg.addColorStop(1, '#04020c');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  for (const m of backgroundMotes) {
    const x = m.x * W;
    const y = m.y * H;
    const a = 0.15 + 0.15 * Math.sin(m.phase);
    ctx.fillStyle = `hsla(${m.hue}, 80%, 75%, ${a})`;
    ctx.beginPath();
    ctx.arc(x, y, m.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawPetal(p) {
  const c = center();
  const grow = Math.min(1, p.age / 0.5);
  const open = p.openness / 100;
  const len = PETAL_MAX_LEN * grow * (0.35 + 0.65 * open);
  const wid = 36 * grow * (0.45 + 0.55 * open);
  const sway = Math.sin(elapsed * p.swaySpeed + p.sway) * 0.07;
  const ang = p.angle + sway;
  const rootX = c.x + Math.cos(ang) * PETAL_ROOT_R;
  const rootY = c.y + Math.sin(ang) * PETAL_ROOT_R;

  const pulseScale = 1 + p.pulse * 0.35;

  ctx.save();
  ctx.translate(rootX, rootY);
  ctx.rotate(ang + Math.PI / 2);
  ctx.scale(pulseScale, pulseScale);

  const sat = 60 + open * 35;
  const lig = 32 + open * 35;

  ctx.shadowBlur = 18 + p.pulse * 28 + (1 - open) * 4;
  ctx.shadowColor = `hsla(${p.hue}, ${sat}%, ${lig + 12}%, 0.95)`;

  const grad = ctx.createLinearGradient(0, 0, 0, len);
  grad.addColorStop(0, `hsla(${p.hue}, ${sat}%, ${lig + 28}%, 0.98)`);
  grad.addColorStop(0.6, `hsla(${p.hue}, ${sat}%, ${lig + 8}%, 0.92)`);
  grad.addColorStop(1, `hsla(${p.hue - 10}, ${sat}%, ${lig - 4}%, 0.72)`);
  ctx.fillStyle = grad;

  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(wid, len * 0.25, wid * 0.65, len * 0.9, 0, len);
  ctx.bezierCurveTo(-wid * 0.65, len * 0.9, -wid, len * 0.25, 0, 0);
  ctx.fill();

  ctx.shadowBlur = 0;
  if (open < 0.55) {
    const veinAlpha = (0.55 - open) * 1.6;
    ctx.strokeStyle = `rgba(40, 8, 30, ${veinAlpha})`;
    ctx.lineWidth = 1.6;
    ctx.beginPath();
    ctx.moveTo(0, len * 0.1);
    ctx.lineTo(0, len * 0.95);
    ctx.stroke();
  }

  if (open < 0.32) {
    const blink = (Math.sin(elapsed * 14) + 1) * 0.5;
    ctx.strokeStyle = `rgba(255, 90, 130, ${0.35 + blink * 0.45})`;
    ctx.lineWidth = 2.2;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(wid, len * 0.25, wid * 0.65, len * 0.9, 0, len);
    ctx.bezierCurveTo(-wid * 0.65, len * 0.9, -wid, len * 0.25, 0, 0);
    ctx.stroke();
  }

  const highlight = ctx.createRadialGradient(0, len * 0.3, 0, 0, len * 0.3, wid * 0.6);
  highlight.addColorStop(0, `rgba(255, 255, 255, ${0.18 * open})`);
  highlight.addColorStop(1, 'rgba(255, 255, 255, 0)');
  ctx.fillStyle = highlight;
  ctx.beginPath();
  ctx.ellipse(0, len * 0.3, wid * 0.55, len * 0.35, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawCore() {
  const c = center();
  const pulse = 1 + Math.sin(elapsed * 2.5) * 0.06;
  const glow = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, 70 * pulse);
  glow.addColorStop(0, 'rgba(255, 240, 220, 0.7)');
  glow.addColorStop(0.45, 'rgba(255, 180, 220, 0.3)');
  glow.addColorStop(1, 'rgba(255, 140, 200, 0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(c.x, c.y, 70 * pulse, 0, Math.PI * 2);
  ctx.fill();

  ctx.shadowBlur = 22;
  ctx.shadowColor = '#fff8e0';
  ctx.fillStyle = '#fff8e0';
  ctx.beginPath();
  ctx.arc(c.x, c.y, 9 * pulse, 0, Math.PI * 2);
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.fillStyle = '#ffe7a8';
  for (let i = 0; i < 7; i++) {
    const a = i * (Math.PI * 2 / 7) + elapsed * 0.2;
    const r = 18 + Math.sin(elapsed * 1.5 + i) * 1.4;
    const sx = c.x + Math.cos(a) * r;
    const sy = c.y + Math.sin(a) * r;
    ctx.beginPath();
    ctx.arc(sx, sy, 2.2, 0, Math.PI * 2);
    ctx.fill();
  }
}

function draw() {
  ctx.save();
  if (shake > 0) {
    ctx.translate(
      (Math.random() - 0.5) * shake,
      (Math.random() - 0.5) * shake
    );
  }

  drawBackground();

  for (const r of ripples) {
    const alpha = (r.weak ? 0.3 : 0.55) * r.life;
    ctx.strokeStyle = `hsla(${r.hue}, 80%, 78%, ${alpha})`;
    ctx.lineWidth = 2 * r.life;
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
    ctx.stroke();
  }

  drawCore();

  for (const p of petals) {
    drawPetal(p);
  }

  ctx.shadowBlur = 0;

  for (const pt of particles) {
    ctx.fillStyle = `hsla(${pt.hue}, 90%, 78%, ${pt.life})`;
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, pt.size * Math.max(0.3, pt.life), 0, Math.PI * 2);
    ctx.fill();
  }

  for (const s of sparkles) {
    const a = s.life * (0.6 + 0.4 * Math.sin(s.phase));
    ctx.fillStyle = `hsla(${s.hue}, 95%, 85%, ${a})`;
    ctx.shadowBlur = 8;
    ctx.shadowColor = `hsla(${s.hue}, 95%, 85%, ${a})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.shadowBlur = 0;

  if (state === STATE.PLAY) {
    document.getElementById('score').textContent = Math.floor(score);
  }

  ctx.restore();
}

function loop(t) {
  const dt = Math.min(0.05, (t - lastTime) / 1000);
  lastTime = t;
  if (state === STATE.PLAY) update(dt);
  else {
    elapsed += dt * 0.4;
    for (const m of backgroundMotes) {
      m.y -= m.vy * dt;
      m.phase += dt * 0.8;
      if (m.y < -0.05) { m.y = 1.05; m.x = Math.random(); }
    }
    for (let i = particles.length - 1; i >= 0; i--) {
      const pt = particles[i];
      pt.x += pt.vx;
      pt.y += pt.vy;
      pt.vx *= 0.96;
      pt.vy = pt.vy * 0.96 + 0.05;
      pt.life -= pt.decay;
      if (pt.life <= 0) particles.splice(i, 1);
    }
    if (shake > 0) shake = Math.max(0, shake - dt * 40);
  }
  draw();
  requestAnimationFrame(loop);
}
lastTime = performance.now();
requestAnimationFrame(loop);
</script>
</body>
</html>
