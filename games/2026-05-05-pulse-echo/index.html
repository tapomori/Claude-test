<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Pulse Echo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #0a0612;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    overflow: hidden;
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 20% 0%, rgba(107,58,255,0.15), transparent 50%),
      radial-gradient(circle at 80% 100%, rgba(255,95,163,0.10), transparent 50%);
    pointer-events: none;
  }
  #app {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 14px 16px 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: #a99fbf;
    z-index: 2;
  }
  header a {
    color: #b8a9e6;
    text-decoration: none;
    padding: 7px 12px;
    border: 1px solid #2a2540;
    border-radius: 10px;
    font-size: 12px;
    background: rgba(20,12,36,0.5);
  }
  #info {
    display: flex;
    gap: 16px;
    align-items: center;
  }
  #info span { color: #fff; font-size: 14px; letter-spacing: 0.05em; }
  #info b { color: #ffd84b; }
  #info .lv b { color: #4bd6ff; }

  #beatBar {
    height: 3px;
    background: rgba(40, 30, 70, 0.6);
    margin: 6px 16px 0;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  #beatPulse {
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, #6b3aff 40%, #ff5fa3 60%, transparent);
    transform: translateX(-100%);
  }

  #status {
    text-align: center;
    padding: 10px 10px 4px;
    font-size: 13px;
    letter-spacing: 0.25em;
    color: #7d6f9e;
    min-height: 30px;
    transition: color 0.2s ease;
  }
  #status.show {
    color: #fff;
    text-shadow: 0 0 12px rgba(255,255,255,0.4);
  }

  #beatDots {
    display: flex;
    justify-content: center;
    gap: 7px;
    padding: 4px 16px 6px;
    flex-wrap: wrap;
    min-height: 14px;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #2a2040;
    transition: all 0.15s ease;
  }
  .dot.active {
    background: #fff;
    transform: scale(1.6);
    box-shadow: 0 0 10px #fff;
  }
  .dot.done {
    background: #6effa0;
    box-shadow: 0 0 6px rgba(110,255,160,0.6);
  }

  #pads {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 14px;
    padding: 14px;
  }
  .pad {
    position: relative;
    border-radius: 22px;
    overflow: hidden;
    transform: scale(1);
    transition: transform 0.08s ease;
    cursor: pointer;
  }
  .pad .face {
    position: absolute;
    inset: 0;
    border-radius: 22px;
    opacity: 0.22;
    transition: opacity 0.15s ease;
  }
  .pad .glow {
    position: absolute;
    inset: 0;
    border-radius: 22px;
    opacity: 0;
    transition: opacity 0.2s ease;
    pointer-events: none;
  }
  .pad.lit .face { opacity: 1; }
  .pad.lit .glow { opacity: 1; }
  .pad.lit { transform: scale(0.97); }

  .pad[data-c="0"] .face { background: radial-gradient(circle at 35% 30%, #ff8ec4, #b21d6a 75%); }
  .pad[data-c="0"] .glow { box-shadow: 0 0 50px 4px #ff5fa3 inset, 0 0 30px 2px #ff5fa3; }
  .pad[data-c="1"] .face { background: radial-gradient(circle at 35% 30%, #7eedff, #1162a8 75%); }
  .pad[data-c="1"] .glow { box-shadow: 0 0 50px 4px #4bd6ff inset, 0 0 30px 2px #4bd6ff; }
  .pad[data-c="2"] .face { background: radial-gradient(circle at 35% 30%, #ffe57a, #b27a14 75%); }
  .pad[data-c="2"] .glow { box-shadow: 0 0 50px 4px #ffd84b inset, 0 0 30px 2px #ffd84b; }
  .pad[data-c="3"] .face { background: radial-gradient(circle at 35% 30%, #a3ffc4, #149a55 75%); }
  .pad[data-c="3"] .glow { box-shadow: 0 0 50px 4px #6effa0 inset, 0 0 30px 2px #6effa0; }

  .pad::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 22px;
    border: 1px solid rgba(255,255,255,0.06);
    pointer-events: none;
  }

  .ripple {
    position: absolute;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    pointer-events: none;
    background: radial-gradient(circle, rgba(255,255,255,0.7), rgba(255,255,255,0) 70%);
    animation: ripple 0.65s cubic-bezier(0.2, 0.6, 0.3, 1) forwards;
    transform: translate(-50%, -50%) scale(0);
  }
  @keyframes ripple {
    from { transform: translate(-50%, -50%) scale(0.2); opacity: 1; }
    to   { transform: translate(-50%, -50%) scale(8);   opacity: 0; }
  }

  .spark {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #fff;
    pointer-events: none;
    animation: spark 0.55s ease-out forwards;
  }
  @keyframes spark {
    to { transform: translate(var(--dx), var(--dy)) scale(0.2); opacity: 0; }
  }

  #toast {
    position: absolute;
    top: 38%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.9);
    font-size: 26px;
    font-weight: 800;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.18s ease, transform 0.4s cubic-bezier(0.2,1.5,0.5,1);
    text-shadow: 0 0 20px currentColor;
    letter-spacing: 0.08em;
    z-index: 3;
  }
  #toast.show {
    opacity: 1;
    transform: translate(-50%, -80%) scale(1);
  }

  #overlay {
    position: absolute;
    inset: 0;
    background: rgba(8, 4, 16, 0.94);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    z-index: 10;
    padding: 24px;
    text-align: center;
  }
  #overlay h1 {
    font-size: 38px;
    font-weight: 900;
    background: linear-gradient(90deg, #ff5fa3, #4bd6ff, #ffd84b, #6effa0);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: 0.06em;
  }
  #overlay p {
    font-size: 14px;
    color: #b8a9e6;
    line-height: 1.7;
    max-width: 280px;
  }
  #overlay button {
    background: linear-gradient(90deg, #6b3aff, #ff5fa3);
    color: #fff;
    border: none;
    padding: 14px 36px;
    border-radius: 30px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.18em;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(107, 58, 255, 0.4);
    margin-top: 6px;
  }
  #overlay button:active { transform: translateY(1px); }
  #overlay.hidden { display: none; }

  .mini-pads {
    display: flex;
    gap: 6px;
    margin-top: 4px;
  }
  .mini {
    width: 18px;
    height: 18px;
    border-radius: 6px;
    opacity: 0.5;
  }
  .mini.c0 { background: #ff5fa3; }
  .mini.c1 { background: #4bd6ff; }
  .mini.c2 { background: #ffd84b; }
  .mini.c3 { background: #6effa0; }
</style>
</head>
<body>
<div id="app">
  <header>
    <a href="../../index.html">← 戻る</a>
    <div id="info">
      <span class="lv">Lv <b id="level">1</b></span>
      <span>♥ <b id="lives">3</b></span>
    </div>
  </header>
  <div id="beatBar"><div id="beatPulse"></div></div>
  <div id="status">READY</div>
  <div id="beatDots"></div>
  <div id="pads">
    <div class="pad" data-c="0"><div class="face"></div><div class="glow"></div></div>
    <div class="pad" data-c="1"><div class="face"></div><div class="glow"></div></div>
    <div class="pad" data-c="2"><div class="face"></div><div class="glow"></div></div>
    <div class="pad" data-c="3"><div class="face"></div><div class="glow"></div></div>
  </div>
  <div id="toast"></div>
</div>
<div id="overlay">
  <h1>PULSE ECHO</h1>
  <p>光るパッドの順番を覚えて、<br>同じビートに乗せて返そう。<br>速く・正確に叩くほど高評価。</p>
  <div class="mini-pads">
    <div class="mini c0"></div>
    <div class="mini c1"></div>
    <div class="mini c2"></div>
    <div class="mini c3"></div>
  </div>
  <button id="startBtn">START</button>
</div>

<script>
(() => {
  const pads = [...document.querySelectorAll('.pad')];
  const statusEl = document.getElementById('status');
  const levelEl = document.getElementById('level');
  const livesEl = document.getElementById('lives');
  const toast = document.getElementById('toast');
  const overlay = document.getElementById('overlay');
  const overlayH1 = overlay.querySelector('h1');
  const overlayP = overlay.querySelector('p');
  const startBtn = document.getElementById('startBtn');
  const beatPulse = document.getElementById('beatPulse');
  const beatDots = document.getElementById('beatDots');

  const COLORS = ['#ff5fa3', '#4bd6ff', '#ffd84b', '#6effa0'];

  let level = 0;
  let lives = 3;
  let sequence = [];
  let userIndex = 0;
  let mode = 'idle';
  let beatMs = 620;
  let lastTapTime = 0;
  let beatTimer = null;
  let acceptInput = false;

  function setStatus(text, on=true) {
    statusEl.textContent = text;
    statusEl.classList.toggle('show', on);
  }

  function showToast(text, color='#fff', dur=650) {
    toast.textContent = text;
    toast.style.color = color;
    toast.classList.remove('show');
    void toast.offsetWidth;
    toast.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toast.classList.remove('show'), dur);
  }

  function ripple(pad, x, y) {
    const r = document.createElement('div');
    r.className = 'ripple';
    const rect = pad.getBoundingClientRect();
    r.style.left = (x - rect.left) + 'px';
    r.style.top = (y - rect.top) + 'px';
    pad.appendChild(r);
    setTimeout(() => r.remove(), 700);
  }

  function sparks(pad, x, y, color) {
    const rect = pad.getBoundingClientRect();
    const lx = x - rect.left;
    const ly = y - rect.top;
    const n = 8;
    for (let i = 0; i < n; i++) {
      const s = document.createElement('div');
      s.className = 'spark';
      s.style.left = lx + 'px';
      s.style.top = ly + 'px';
      s.style.background = color;
      s.style.boxShadow = `0 0 8px ${color}`;
      const ang = (Math.PI * 2 * i) / n + Math.random() * 0.4;
      const dist = 40 + Math.random() * 40;
      s.style.setProperty('--dx', Math.cos(ang) * dist + 'px');
      s.style.setProperty('--dy', Math.sin(ang) * dist + 'px');
      pad.appendChild(s);
      setTimeout(() => s.remove(), 600);
    }
  }

  function flashPad(idx, dur=300) {
    const pad = pads[idx];
    pad.classList.add('lit');
    const rect = pad.getBoundingClientRect();
    ripple(pad, rect.left + rect.width / 2, rect.top + rect.height / 2);
    setTimeout(() => pad.classList.remove('lit'), dur);
  }

  function vibrate(p) {
    if (navigator.vibrate) {
      try { navigator.vibrate(p); } catch (e) {}
    }
  }

  function animateBeat() {
    beatPulse.style.transition = 'none';
    beatPulse.style.transform = 'translateX(-100%)';
    void beatPulse.offsetWidth;
    beatPulse.style.transition = `transform ${beatMs}ms linear`;
    beatPulse.style.transform = 'translateX(100%)';
  }

  function buildDots(n) {
    beatDots.innerHTML = '';
    for (let i = 0; i < n; i++) {
      const d = document.createElement('div');
      d.className = 'dot';
      beatDots.appendChild(d);
    }
  }

  function setDot(i, state) {
    const d = beatDots.children[i];
    if (!d) return;
    d.className = 'dot' + (state ? ' ' + state : '');
  }

  const wait = ms => new Promise(r => setTimeout(r, ms));

  async function playSequence() {
    mode = 'playing';
    acceptInput = false;
    setStatus('WATCH', true);
    buildDots(sequence.length);
    await wait(450);
    for (let i = 0; i < sequence.length; i++) {
      setDot(i, 'active');
      animateBeat();
      flashPad(sequence[i], Math.min(beatMs * 0.55, 320));
      await wait(beatMs);
      setDot(i, 'done');
    }
    await wait(180);
    setStatus('YOUR TURN', true);
    mode = 'echoing';
    userIndex = 0;
    buildDots(sequence.length);
    lastTapTime = performance.now();
    acceptInput = true;
    armBeatTimer();
  }

  function armBeatTimer() {
    clearBeatTimer();
    beatTimer = setTimeout(() => {
      if (mode !== 'echoing') return;
      handleMiss('TOO SLOW');
    }, beatMs * 1.6);
  }

  function clearBeatTimer() {
    if (beatTimer) clearTimeout(beatTimer);
    beatTimer = null;
  }

  function handleMiss(reason) {
    clearBeatTimer();
    acceptInput = false;
    mode = 'idle';
    lives--;
    livesEl.textContent = lives;
    vibrate([60, 40, 60]);
    showToast(reason, '#ff5fa3');
    setStatus('•••', false);
    if (lives <= 0) {
      setTimeout(() => gameOver(), 700);
    } else {
      setTimeout(() => playSequence(), 1100);
    }
  }

  async function nextRound() {
    level++;
    levelEl.textContent = level;
    sequence.push(Math.floor(Math.random() * 4));
    beatMs = Math.max(280, 620 - (level - 1) * 18);
    await playSequence();
  }

  function startGame() {
    level = 0;
    lives = 3;
    livesEl.textContent = lives;
    sequence = [];
    overlay.classList.add('hidden');
    setTimeout(() => nextRound(), 250);
  }

  function handleHit(idx, x, y) {
    const pad = pads[idx];
    flashPad(idx, 240);
    sparks(pad, x, y, COLORS[idx]);

    if (!acceptInput || mode !== 'echoing') return;

    const expected = sequence[userIndex];
    const now = performance.now();
    const elapsed = now - lastTapTime;

    if (idx !== expected) {
      handleMiss('MISS');
      return;
    }

    let judge, color;
    if (userIndex === 0) {
      judge = 'GO';
      color = '#fff';
      vibrate(15);
    } else {
      const dev = Math.abs(elapsed - beatMs);
      if (dev < beatMs * 0.18) {
        judge = 'PERFECT';
        color = '#ffd84b';
        vibrate(25);
      } else if (dev < beatMs * 0.4) {
        judge = 'GOOD';
        color = '#6effa0';
        vibrate(15);
      } else {
        judge = elapsed > beatMs ? 'LATE' : 'EARLY';
        color = '#a99fbf';
        vibrate(8);
      }
    }

    setDot(userIndex, 'done');
    showToast(judge, color, 500);

    userIndex++;
    lastTapTime = now;
    clearBeatTimer();
    animateBeat();

    if (userIndex >= sequence.length) {
      acceptInput = false;
      mode = 'idle';
      setStatus('CLEAR', true);
      setTimeout(() => nextRound(), 700);
    } else {
      armBeatTimer();
    }
  }

  function gameOver() {
    overlayH1.textContent = 'GAME OVER';
    overlayP.innerHTML = `到達レベル <b style="color:#ffd84b;font-size:20px">${level}</b><br>もう一度挑戦しよう`;
    startBtn.textContent = 'RETRY';
    overlay.classList.remove('hidden');
  }

  pads.forEach((pad, idx) => {
    const onPress = (x, y) => handleHit(idx, x, y);
    pad.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const t = e.touches[0];
      onPress(t.clientX, t.clientY);
    }, { passive: false });
    pad.addEventListener('mousedown', (e) => {
      onPress(e.clientX, e.clientY);
    });
  });

  startBtn.addEventListener('click', startGame);
})();
</script>
</body>
</html>
